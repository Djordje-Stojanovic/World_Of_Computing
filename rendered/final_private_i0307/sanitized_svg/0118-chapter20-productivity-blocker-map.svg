<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Coding-Agent Productivity Claim Blocker Map</title>
  <desc id="desc">A Chapter 20 visual separating supported coding-agent workflow claims from blocked productivity, adoption, and enterprise outcome claims.</desc>
  <style>.bg{fill:#f7f5ef}.ink{fill:#20242a}.muted{fill:#5e6670}.ok{fill:#e7f1e5;stroke:#4b7a44;stroke-width:3}.gate{fill:#e8f1f4;stroke:#2b6573;stroke-width:3}.deny{fill:#f7e5dc;stroke:#a14f34;stroke-width:3}.line{stroke:#3f4650;stroke-width:3;fill:none;marker-end:url(#arrow)}.title{font-family:Arial,Helvetica,sans-serif;font-size:38px;font-weight:700}.label{font-family:Arial,Helvetica,sans-serif;font-size:24px;font-weight:700}.small{font-family:Arial,Helvetica,sans-serif;font-size:17px}.tiny{font-family:Arial,Helvetica,sans-serif;font-size:14px}</style>
  <defs><marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 Z" fill="#3f4650"/></marker></defs>
  <rect class="bg" width="1200" height="760"/><text class="title ink" x="60" y="72">Productivity Claim Blocker Map</text><text class="small muted" x="60" y="108">Chapter 20 may show work-loop mechanics now. Outcome claims need stronger evidence later.</text>
  <rect class="ok" x="75" y="175" width="300" height="355" rx="8"/><text class="label ink" x="115" y="220">Allowed now</text><text class="small ink" x="115" y="270">Repository-task workflow</text><text class="small ink" x="115" y="310">Benchmark-as-lens</text><text class="small ink" x="115" y="350">Context and permission</text><text class="small ink" x="115" y="390">human review burden</text><text class="small ink" x="115" y="430">diff/test/check loop</text><text class="tiny muted" x="115" y="485">S-0022; S-0035; S-0037; S-0050</text>
  <path class="line" d="M390 350 H500"/>
  <rect class="gate" x="520" y="175" width="300" height="355" rx="8"/><text class="label ink" x="560" y="220">Needs evidence</text><text class="small ink" x="560" y="270">task population</text><text class="small ink" x="560" y="310">baseline developer skill</text><text class="small ink" x="560" y="350">review and defect cost</text><text class="small ink" x="560" y="390">maintenance burden</text><text class="small ink" x="560" y="430">customer-side outcomes</text><text class="tiny muted" x="560" y="485">Row extraction before prose</text>
  <path class="line" d="M835 350 H945"/>
  <rect class="deny" x="965" y="175" width="170" height="355" rx="8"/><text class="label ink" x="995" y="220">Blocked</text><text class="small ink" x="995" y="270">productivity</text><text class="small ink" x="995" y="310">revenue</text><text class="small ink" x="995" y="350">adoption</text><text class="small ink" x="995" y="390">replacement</text><text class="small ink" x="995" y="430">universal safety</text>
  <rect class="deny" x="75" y="610" width="1060" height="78" rx="8"/><text class="small ink" x="105" y="650">Rule: do not turn a benchmark score, vendor workflow page, or demo into deployed productivity or enterprise outcome prose.</text><text class="tiny muted" x="105" y="675">Sources: C-0013, CH20AGENT-003, CH20AGENT-004, CH20AGENT-005.</text>
</svg>
