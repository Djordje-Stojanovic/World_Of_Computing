      .sub{font-family:Inter,Arial,sans-serif;font-size:16px;fill:#52616f}
      .src{font-family:Inter,Arial,sans-serif;font-size:15px;font-weight:700;fill:#0f8b6f}
      .caveat{font-family:Inter,Arial,sans-serif;font-size:15px;fill:#c2412d}
      .small{font-family:Inter,Arial,sans-serif;font-size:14px;fill:#52616f}
    </style>
  </defs>

  <g>
