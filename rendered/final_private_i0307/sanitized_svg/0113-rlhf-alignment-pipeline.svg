  <text x="234" y="624" class="label">Red teams, system cards, evals, deployment observation</text>
  <text x="234" y="655" class="sub">The loop widens after release: probe failures, document risks, patch behavior, update specs, test again.</text>
  <text x="234" y="680" class="src">S-0005; S-0076; S-0077</text>
