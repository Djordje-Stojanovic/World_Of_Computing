<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Figure 6.1 - Alignment As A Product Stack</title>
  <desc id="desc">A sourced Chapter 6 diagram showing how pretraining, demonstrations, preference comparisons, reward modeling, reinforcement learning, constitutional AI, product policy, red teams, and evaluations shape assistant behavior with caveats.</desc>
  <rect width="1600" height="900" fill="#f7f4ee"/>
  <rect x="64" y="58" width="1472" height="784" rx="0" fill="#fffdfa" stroke="#c8c1b5" stroke-width="2"/>
  <text x="92" y="116" font-family="Inter, Arial, sans-serif" font-size="38" font-weight="700" fill="#1f2933">Figure 6.1 - Alignment As A Product Stack</text>
  <text x="92" y="154" font-family="Inter, Arial, sans-serif" font-size="20" fill="#52616f">Assistant behavior is built from layers: training signals, principle paths, product rules, and evaluation loops.</text>
  <defs>
