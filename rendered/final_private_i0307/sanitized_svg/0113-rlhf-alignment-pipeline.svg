  <rect x="92" y="742" width="1416" height="68" fill="#f7f4ee" stroke="#e0d8cc" stroke-width="1"/>
  <text x="112" y="772" class="caveat">Caveat: this diagram explains product shaping, not solved alignment. Reward models are proxies; principles and policies are institutional choices; evals are partial.</text>
  <text x="112" y="798" class="small">Companion data: data/rlhf_alignment_pipeline_i0023.tsv. Direct quotations and exact policy wording still require source snapshots before final prose.</text>
