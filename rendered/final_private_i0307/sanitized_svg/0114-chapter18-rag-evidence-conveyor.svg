<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">RAG Evidence Conveyor</title>
  <desc id="desc">A Chapter 18 diagram showing retrieval augmented generation as a pipeline with failure and audit gates from user question through citations.</desc>
  <style>
    .bg{fill:#f7f4ee}.ink{fill:#1f2933;font-family:Arial,Helvetica,sans-serif}.muted{fill:#5d6470;font-family:Arial,Helvetica,sans-serif}.title{font-size:38px;font-weight:800}.sub{font-size:19px}.label{font-size:19px;font-weight:800}.small{font-size:14px}.tiny{font-size:12px}.box{fill:#fffdf7;stroke:#c8c1b5;stroke-width:2}.data{fill:#e8f5ef;stroke:#0f8b6f;stroke-width:3}.model{fill:#e7efff;stroke:#2563eb;stroke-width:3}.risk{fill:#fff0ec;stroke:#c2412d;stroke-width:2}.line{fill:none;stroke:#1f2933;stroke-width:4;marker-end:url(#arrow)}
  </style>
  <defs><marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 Z" fill="#1f2933"/></marker></defs>
  <rect class="bg" width="1200" height="760"/>
  <text class="ink title" x="58" y="72">RAG Evidence Conveyor</text>
  <text class="muted sub" x="58" y="108">Chapter 18 mechanism: the model writes with borrowed evidence; each stage can be checked or can fail.</text>
  <rect class="box" x="55" y="180" width="140" height="92" rx="8"/><text class="ink label" x="78" y="215">Question</text><text class="muted small" x="76" y="242">user intent</text>
  <rect class="data" x="240" y="170" width="150" height="112" rx="8"/><text class="ink label" x="266" y="205">Rewrite</text><text class="muted small" x="265" y="232">query terms,</text><text class="muted small" x="265" y="252">filters</text>
  <rect class="data" x="435" y="170" width="150" height="112" rx="8"/><text class="ink label" x="462" y="205">Retrieve</text><text class="muted small" x="462" y="232">chunks from</text><text class="muted small" x="462" y="252">index</text>
  <rect class="data" x="630" y="170" width="150" height="112" rx="8"/><text class="ink label" x="654" y="205">Rank + ACL</text><text class="muted small" x="658" y="232">freshness,</text><text class="muted small" x="658" y="252">permissions</text>
  <rect class="model" x="825" y="170" width="150" height="112" rx="8"/><text class="ink label" x="850" y="205">Generate</text><text class="muted small" x="852" y="232">answer from</text><text class="muted small" x="852" y="252">packed context</text>
  <rect class="box" x="1020" y="180" width="130" height="92" rx="8"/><text class="ink label" x="1048" y="215">Cite</text><text class="muted small" x="1040" y="242">audit trail</text>
  <path class="line" d="M195 226 H235"/><path class="line" d="M390 226 H430"/><path class="line" d="M585 226 H625"/><path class="line" d="M780 226 H820"/><path class="line" d="M975 226 H1015"/>
  <rect class="risk" x="118" y="365" width="185" height="82" rx="8"/><text class="ink small" x="138" y="394">Can fail:</text><text class="muted tiny" x="138" y="417">ambiguous query</text><text class="muted tiny" x="138" y="437">missing corpus</text>
  <rect class="risk" x="322" y="365" width="185" height="82" rx="8"/><text class="ink small" x="342" y="394">Can fail:</text><text class="muted tiny" x="342" y="417">wrong chunk</text><text class="muted tiny" x="342" y="437">stale source</text>
  <rect class="risk" x="526" y="365" width="185" height="82" rx="8"/><text class="ink small" x="546" y="394">Can fail:</text><text class="muted tiny" x="546" y="417">permission leak</text><text class="muted tiny" x="546" y="437">bad ranking</text>
  <rect class="risk" x="730" y="365" width="185" height="82" rx="8"/><text class="ink small" x="750" y="394">Can fail:</text><text class="muted tiny" x="750" y="417">ignores evidence</text><text class="muted tiny" x="750" y="437">invented glue</text>
  <rect class="risk" x="934" y="365" width="185" height="82" rx="8"/><text class="ink small" x="954" y="394">Can fail:</text><text class="muted tiny" x="954" y="417">citation theater</text><text class="muted tiny" x="954" y="437">unread source</text>
  <rect class="box" x="82" y="555" width="1036" height="75" rx="8"/>
  <text class="ink small" x="110" y="585">Use rule: this figure supports RAG as an evidence-assembly mechanism, not a truth guarantee or human-like memory.</text>
  <text class="muted tiny" x="110" y="610">Figure A-0060. Sources: S-0038; CH18AGENT-001. Blockers: hallucination, faithfulness, freshness, and permission claims need separate evidence.</text>
</svg>
