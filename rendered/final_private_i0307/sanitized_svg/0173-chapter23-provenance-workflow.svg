<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Chapter 23 Provenance Workflow</title>
  <desc id="desc">Workflow showing how a claim becomes auditable evidence instead of unsupported fluent prose.</desc>
  <rect width="1200" height="760" fill="#f9fafb"/>
  <text x="70" y="72" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#111827">From answer to auditable claim</text>
  <text x="70" y="108" font-family="Arial, sans-serif" font-size="17" fill="#4b5563">The trust chapter's provenance workflow separates useful generation from publishable evidence.</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>
  <g font-family="Arial, sans-serif">
    <rect x="70" y="190" width="170" height="100" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="3"/>
    <text x="100" y="232" font-size="20" font-weight="700" fill="#1e3a8a">Question</text>
    <text x="100" y="260" font-size="14" fill="#1f2937">user intent + scope</text>
    <path d="M245 240 H330" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
    <rect x="335" y="190" width="170" height="100" rx="8" fill="#ffffff" stroke="#16a34a" stroke-width="3"/>
    <text x="365" y="232" font-size="20" font-weight="700" fill="#14532d">Retrieve</text>
    <text x="365" y="260" font-size="14" fill="#1f2937">sources + permissions</text>
    <path d="M510 240 H595" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
    <rect x="600" y="190" width="170" height="100" rx="8" fill="#ffffff" stroke="#d97706" stroke-width="3"/>
    <text x="630" y="232" font-size="20" font-weight="700" fill="#78350f">Generate</text>
    <text x="630" y="260" font-size="14" fill="#1f2937">draft answer</text>
    <path d="M775 240 H860" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
    <rect x="865" y="190" width="220" height="100" rx="8" fill="#ffffff" stroke="#7c3aed" stroke-width="3"/>
    <text x="895" y="232" font-size="20" font-weight="700" fill="#4c1d95">Audit</text>
    <text x="895" y="260" font-size="14" fill="#1f2937">source says? claim scope?</text>
    <path d="M975 295 V365" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
    <rect x="865" y="370" width="220" height="105" rx="8" fill="#ffffff" stroke="#475569" stroke-width="3"/>
    <text x="895" y="412" font-size="20" font-weight="700" fill="#1f2937">Decide status</text>
    <text x="895" y="440" font-size="14" fill="#1f2937">supported / blocked / cite later</text>
    <path d="M860 423 H775" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
    <rect x="600" y="370" width="170" height="105" rx="8" fill="#ffffff" stroke="#be123c" stroke-width="3"/>
    <text x="630" y="412" font-size="20" font-weight="700" fill="#881337">Block leaps</text>
    <text x="630" y="440" font-size="14" fill="#1f2937">rates, prevalence, safety</text>
    <path d="M595 423 H510" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
    <rect x="335" y="370" width="170" height="105" rx="8" fill="#ffffff" stroke="#0891b2" stroke-width="3"/>
    <text x="365" y="412" font-size="20" font-weight="700" fill="#164e63">Record</text>
    <text x="365" y="440" font-size="14" fill="#1f2937">claim row + source row</text>
    <path d="M330 423 H245" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
    <rect x="70" y="370" width="170" height="105" rx="8" fill="#ffffff" stroke="#111827" stroke-width="3"/>
    <text x="100" y="412" font-size="20" font-weight="700" fill="#111827">Publish</text>
    <text x="100" y="440" font-size="14" fill="#1f2937">only scoped claims</text>
    <rect x="70" y="550" width="1015" height="72" rx="8" fill="#111827"/>
    <text x="100" y="594" font-size="18" font-weight="700" fill="#ffffff">Guardrail:</text>
    <text x="205" y="594" font-size="17" fill="#fef3c7">a fluent answer is not a fact until the source, date, scope, and blocker are recorded.</text>
  </g>
  <text x="70" y="700" font-family="Arial, sans-serif" font-size="14" fill="#6b7280">Sources: S-0038; S-0076; S-0077; S-0110; CH23TRUST-003/009/010. Workflow diagram, not a compliance guarantee.</text>
</svg>
