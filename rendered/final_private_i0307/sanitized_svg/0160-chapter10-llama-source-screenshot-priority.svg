<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="780" viewBox="0 0 1200 780" role="img" aria-labelledby="title desc">
  <title id="title">Figure 10.4 - Llama Screenshot Priorities</title>
  <desc id="desc">Priority board for future Llama screenshot acquisition: GitHub repository, LLaMA launch page, Llama 3 launch page, and Llama 3.1 page, with caption blockers.</desc>
  <rect width="1200" height="780" fill="#f8f5ed"/>
  <text x="70" y="70" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#1f2933">Llama Screenshot Priorities</text>
  <text x="70" y="106" font-family="Arial, sans-serif" font-size="17" fill="#52606d">Use source surfaces sparingly: one developer artifact plus one release surface is enough for Chapter 10.</text>
  <g font-family="Arial, sans-serif">
    <rect x="70" y="150" width="1060" height="440" rx="8" fill="#ffffff" stroke="#52606d" stroke-width="2"/>
    <rect x="90" y="188" width="230" height="330" rx="8" fill="#d9e8e2" stroke="#52606d" stroke-width="2"/>
    <rect x="350" y="188" width="230" height="330" rx="8" fill="#eef0d4" stroke="#52606d" stroke-width="2"/>
    <rect x="610" y="188" width="230" height="330" rx="8" fill="#e8dfca" stroke="#52606d" stroke-width="2"/>
    <rect x="870" y="188" width="230" height="330" rx="8" fill="#d7e2ef" stroke="#52606d" stroke-width="2"/>
    <g font-size="22" font-weight="700" fill="#1f2933">
      <text x="205" y="244" text-anchor="middle">A-0047</text>
      <text x="465" y="244" text-anchor="middle">A-0044</text>
      <text x="725" y="244" text-anchor="middle">A-0045</text>
      <text x="985" y="244" text-anchor="middle">A-0046</text>
    </g>
    <g font-size="18" fill="#1f2933">
      <text x="205" y="294" text-anchor="middle">Llama GitHub</text>
      <text x="205" y="320" text-anchor="middle">developer surface</text>
      <text x="465" y="294" text-anchor="middle">LLaMA launch</text>
      <text x="465" y="320" text-anchor="middle">research-release surface</text>
      <text x="725" y="294" text-anchor="middle">Llama 3 launch</text>
      <text x="725" y="320" text-anchor="middle">platform surface</text>
      <text x="985" y="294" text-anchor="middle">Llama 3.1 page</text>
      <text x="985" y="320" text-anchor="middle">scale/context surface</text>
    </g>
    <g font-size="15" fill="#52606d">
      <text x="205" y="388" text-anchor="middle">First priority</text>
      <text x="205" y="414" text-anchor="middle">Proves artifact surface,</text>
      <text x="205" y="436" text-anchor="middle">not stars or adoption.</text>
      <text x="465" y="388" text-anchor="middle">Second priority</text>
      <text x="465" y="414" text-anchor="middle">Proves release framing,</text>
      <text x="465" y="436" text-anchor="middle">not current license state.</text>
      <text x="725" y="388" text-anchor="middle">Use only if needed</text>
      <text x="725" y="414" text-anchor="middle">Blocks benchmark and</text>
      <text x="725" y="436" text-anchor="middle">adoption overclaims.</text>
      <text x="985" y="388" text-anchor="middle">Use only if needed</text>
      <text x="985" y="414" text-anchor="middle">Exact spec claims need</text>
      <text x="985" y="436" text-anchor="middle">row extraction.</text>
    </g>
  </g>
  <rect x="70" y="650" width="1060" height="64" rx="8" fill="#1f2933"/>
  <text x="96" y="681" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#ffffff">Blocked leap</text>
  <text x="224" y="681" font-family="Arial, sans-serif" font-size="16" fill="#ffffff">Screenshots prove source surfaces and provenance, not popularity, deployment, safety, quality, or ecosystem size.</text>
  <text x="96" y="706" font-family="Arial, sans-serif" font-size="14" fill="#d9e8e2">Source role: prioritization board for existing acquisition slots A-0044 through A-0047.</text>
</svg>
