<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="780" viewBox="0 0 1200 780" role="img" aria-labelledby="title desc">
  <title id="title">Figure 24.4 - Human Judgment Loop</title>
  <desc id="desc">Loop from human intent to model tokens, tools, evidence trace, audit, and human judgment, with a blocker note that human-in-the-loop design does not guarantee correctness or safety.</desc>
  <rect width="1200" height="780" fill="#f5f2ea"/>
  <text x="72" y="70" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#1f2933">Human Judgment Loop</text>
  <text x="72" y="106" font-family="Arial, sans-serif" font-size="17" fill="#52606d">The final interface is negotiated among intent, tokens, tools, evidence, audit, and decision.</text>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#52606d"/>
    </marker>
  </defs>
  <g font-family="Arial, sans-serif">
    <g fill="#ffffff" stroke="#52606d" stroke-width="2">
      <rect x="96" y="250" width="180" height="96" rx="8"/>
      <rect x="326" y="250" width="180" height="96" rx="8"/>
      <rect x="556" y="250" width="180" height="96" rx="8"/>
      <rect x="786" y="250" width="180" height="96" rx="8"/>
      <rect x="556" y="456" width="180" height="96" rx="8"/>
      <rect x="326" y="456" width="180" height="96" rx="8"/>
    </g>
    <g font-size="22" font-weight="700" fill="#1f2933">
      <text x="186" y="288" text-anchor="middle">human</text>
      <text x="186" y="316" text-anchor="middle">intent</text>
      <text x="416" y="288" text-anchor="middle">model</text>
      <text x="416" y="316" text-anchor="middle">tokens</text>
      <text x="646" y="288" text-anchor="middle">tools and</text>
      <text x="646" y="316" text-anchor="middle">actions</text>
      <text x="876" y="288" text-anchor="middle">evidence</text>
      <text x="876" y="316" text-anchor="middle">trace</text>
      <text x="646" y="494" text-anchor="middle">audit and</text>
      <text x="646" y="522" text-anchor="middle">blockers</text>
      <text x="416" y="494" text-anchor="middle">human</text>
      <text x="416" y="522" text-anchor="middle">judgment</text>
    </g>
    <g font-size="14" fill="#52606d">
      <text x="186" y="366" text-anchor="middle">goals, risk, context</text>
      <text x="416" y="366" text-anchor="middle">probable continuation</text>
      <text x="646" y="366" text-anchor="middle">retrieval, code, APIs</text>
      <text x="876" y="366" text-anchor="middle">sources and logs</text>
      <text x="646" y="572" text-anchor="middle">scope and permission</text>
      <text x="416" y="572" text-anchor="middle">accept, revise, refuse</text>
    </g>
  </g>
  <g fill="none" stroke="#52606d" stroke-width="4" marker-end="url(#arrow)">
    <path d="M276 298 L326 298"/>
    <path d="M506 298 L556 298"/>
    <path d="M736 298 L786 298"/>
    <path d="M876 346 C876 430, 790 504, 738 504"/>
    <path d="M556 504 L506 504"/>
    <path d="M326 504 C210 504, 180 430, 180 348"/>
  </g>
  <rect x="78" y="650" width="1044" height="64" rx="8" fill="#1f2933"/>
  <text x="104" y="681" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#ffffff">Blocked leap</text>
  <text x="232" y="681" font-family="Arial, sans-serif" font-size="16" fill="#ffffff">A loop with humans, tools, and audits does not guarantee correctness, safety, accountability, or autonomy.</text>
  <text x="104" y="706" font-family="Arial, sans-serif" font-size="14" fill="#d9e8e2">Source role: synthesis from tool-use, coding-agent, trust, and Chapter 24 scaffold rows.</text>
</svg>
