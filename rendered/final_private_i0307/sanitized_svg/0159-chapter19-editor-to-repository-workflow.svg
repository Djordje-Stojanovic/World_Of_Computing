<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Chapter 19 editor-to-repository workflow</title>
  <desc id="desc">A workflow diagram showing Copilot-style editor assistance moving through human review, tests, and repository integration, with blocked adoption and productivity claims.</desc>
  <rect width="1200" height="760" fill="#fbfaf7"/>
  <text x="64" y="72" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#202124">The Assistant Entered At The Cursor</text>
  <text x="64" y="108" font-family="Arial, sans-serif" font-size="17" fill="#4b5563">Copilot-style products changed the local work loop: context, suggestion, review, tests, and patch judgment.</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1f2937"/>
    </marker>
  </defs>
  <g font-family="Arial, sans-serif">
    <rect x="78" y="206" width="190" height="128" rx="10" fill="#e8f0fe" stroke="#4285f4" stroke-width="3"/>
    <text x="173" y="250" text-anchor="middle" font-size="21" font-weight="700" fill="#174ea6">Editor context</text>
    <text x="173" y="282" text-anchor="middle" font-size="14" fill="#374151">File, cursor, imports, comments</text>
    <rect x="332" y="206" width="190" height="128" rx="10" fill="#e6f4ea" stroke="#34a853" stroke-width="3"/>
    <text x="427" y="250" text-anchor="middle" font-size="21" font-weight="700" fill="#137333">Suggestion</text>
    <text x="427" y="282" text-anchor="middle" font-size="14" fill="#374151">Line, function, test, helper</text>
    <rect x="586" y="206" width="190" height="128" rx="10" fill="#fef7e0" stroke="#fbbc04" stroke-width="3"/>
    <text x="681" y="250" text-anchor="middle" font-size="21" font-weight="700" fill="#8a5a00">Human review</text>
    <text x="681" y="282" text-anchor="middle" font-size="14" fill="#374151">Accept, steer, edit, delete</text>
    <rect x="840" y="206" width="190" height="128" rx="10" fill="#fce8e6" stroke="#ea4335" stroke-width="3"/>
    <text x="935" y="250" text-anchor="middle" font-size="21" font-weight="700" fill="#a50e0e">Repository</text>
    <text x="935" y="282" text-anchor="middle" font-size="14" fill="#374151">Tests, CI, review, merge</text>
    <line x1="268" y1="270" x2="332" y2="270" stroke="#1f2937" stroke-width="3" marker-end="url(#arrow)"/>
    <line x1="522" y1="270" x2="586" y2="270" stroke="#1f2937" stroke-width="3" marker-end="url(#arrow)"/>
    <line x1="776" y1="270" x2="840" y2="270" stroke="#1f2937" stroke-width="3" marker-end="url(#arrow)"/>
    <path d="M935 334 C930 446, 500 446, 427 334" fill="none" stroke="#5f6368" stroke-width="3" stroke-dasharray="9 7" marker-end="url(#arrow)"/>
    <text x="666" y="436" font-size="15" fill="#374151" text-anchor="middle">Failures and review comments loop back into the next attempt.</text>
    <rect x="166" y="522" width="868" height="86" rx="9" fill="#f1f3f4" stroke="#5f6368" stroke-width="2"/>
    <text x="600" y="558" text-anchor="middle" font-size="20" font-weight="700" fill="#202124">Product claim boundary</text>
    <text x="600" y="586" text-anchor="middle" font-size="15" fill="#374151">This shows a workflow surface, not active users, paid seats, productivity, code quality, security quality, or broad developer acceptance.</text>
  </g>
  <rect x="64" y="680" width="1072" height="44" rx="8" fill="#111827"/>
  <text x="84" y="708" font-family="Arial, sans-serif" font-size="15" fill="#ffffff">Sources: S-0070; S-0132. Claim row: CH19CODE-003.</text>
</svg>
