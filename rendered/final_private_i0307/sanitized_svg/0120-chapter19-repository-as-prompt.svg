<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Chapter 19 repository-as-prompt schematic</title>
  <desc id="desc">A schematic showing a repository as prompt material for a coding model: files, tests, docs, issues, errors, and human instructions feed a model, but review and responsibility remain outside the model.</desc>
  <rect width="1200" height="760" fill="#fbfaf7"/>
  <text x="64" y="72" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#202124">The Repository Became The Prompt</text>
  <text x="64" y="108" font-family="Arial, sans-serif" font-size="17" fill="#4b5563">The codebase supplies context, but not all meaning. Human framing and review still carry authority.</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1f2937"/>
    </marker>
  </defs>
  <g font-family="Arial, sans-serif">
    <rect x="84" y="172" width="276" height="366" rx="12" fill="#e8f0fe" stroke="#4285f4" stroke-width="3"/>
    <text x="222" y="214" text-anchor="middle" font-size="23" font-weight="700" fill="#174ea6">Repository context</text>
    <text x="128" y="262" font-size="16" fill="#202124">Files and symbols</text>
    <text x="128" y="302" font-size="16" fill="#202124">README and docs</text>
    <text x="128" y="342" font-size="16" fill="#202124">Issues and stack traces</text>
    <text x="128" y="382" font-size="16" fill="#202124">Tests and CI failures</text>
    <text x="128" y="422" font-size="16" fill="#202124">Conventions and config</text>
    <text x="128" y="462" font-size="16" fill="#202124">Missing tribal knowledge</text>
    <rect x="462" y="240" width="276" height="188" rx="12" fill="#e6f4ea" stroke="#34a853" stroke-width="3"/>
    <text x="600" y="288" text-anchor="middle" font-size="24" font-weight="700" fill="#137333">Coding model</text>
    <text x="600" y="326" text-anchor="middle" font-size="16" fill="#374151">Reads context, proposes patch,</text>
    <text x="600" y="354" text-anchor="middle" font-size="16" fill="#374151">explains risk, loops on failures.</text>
    <rect x="838" y="172" width="276" height="366" rx="12" fill="#fef7e0" stroke="#fbbc04" stroke-width="3"/>
    <text x="976" y="214" text-anchor="middle" font-size="23" font-weight="700" fill="#8a5a00">Human and system gates</text>
    <text x="882" y="262" font-size="16" fill="#202124">Task framing</text>
    <text x="882" y="302" font-size="16" fill="#202124">Permissions</text>
    <text x="882" y="342" font-size="16" fill="#202124">Diff review</text>
    <text x="882" y="382" font-size="16" fill="#202124">Regression tests</text>
    <text x="882" y="422" font-size="16" fill="#202124">Architecture judgment</text>
    <text x="882" y="462" font-size="16" fill="#202124">Responsibility</text>
    <line x1="360" y1="334" x2="462" y2="334" stroke="#1f2937" stroke-width="3" marker-end="url(#arrow)"/>
    <line x1="738" y1="334" x2="838" y2="334" stroke="#1f2937" stroke-width="3" marker-end="url(#arrow)"/>
    <path d="M976 538 C920 638, 300 638, 222 538" fill="none" stroke="#5f6368" stroke-width="3" stroke-dasharray="9 7" marker-end="url(#arrow)"/>
    <text x="600" y="628" text-anchor="middle" font-size="15" fill="#374151">Review and test results can become more context, but they do not remove human accountability.</text>
  </g>
  <rect x="64" y="682" width="1072" height="44" rx="8" fill="#111827"/>
  <text x="84" y="710" font-family="Arial, sans-serif" font-size="15" fill="#ffffff">Sources: S-0035; S-0037; S-0053. Blocked: autonomous engineering, secure deployment, replacement, and productivity claims.</text>
</svg>
