<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc"> <title id="title">Chronology rail prototype</title> <desc id="desc">A visual grammar prototype for timeline figures in Next Token.</desc> <rect width="1200" height="675" fill="#f7f4ee"/> <text x="80" y="82" font-family="Arial, Helvetica, sans-serif" font-size="34" fill="#1f2933" font-weight="700">Chronology Rail</text> <text x="80" y="120" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#52606d">Use for launches, papers, model families, hardware roadmaps, and cutoff-bounded sequences.</text> <line x1="110" y1="340" x2="1090" y2="340" stroke="#1f2933" stroke-width="4"/> <line x1="1010" y1="270" x2="1010" y2="410" stroke="#c2412d" stroke-width="3" stroke-dasharray="10 8"/> <text x="970" y="438" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#c2412d" font-weight="700">CUT OFF</text> <g font-family="Arial, Helvetica, sans-serif"> <circle cx="190" cy="340" r="14" fill="#2563eb"/> <text x="160" y="300" font-size="16" fill="#1f2933" font-weight="700">Paper</text> <text x="145" y="322" font-size="14" fill="#52606d">primary</text> <circle cx="390" cy="340" r="14" fill="#0f8b6f"/> <text x="350" y="385" font-size="16" fill="#1f2933" font-weight="700">Model</text> <text x="342" y="407" font-size="14" fill="#52606d">versioned</text> <circle cx="610" cy="340" r="14" fill="#b7791f"/> <text x="572" y="300" font-size="16" fill="#1f2933" font-weight="700">Product</text> <text x="560" y="322" font-size="14" fill="#52606d">public use</text> <circle cx="820" cy="340" r="14" fill="#6d5bd0"/> <text x="768" y="385" font-size="16" fill="#1f2933" font-weight="700">Platform</text> <text x="755" y="407" font-size="14" fill="#52606d">tools + APIs</text> <circle cx="1010" cy="340" r="14" fill="#c2412d"/> </g> <rect x="80" y="535" width="1040" height="58" fill="none" stroke="#c8c1b5" stroke-width="2"/> <text x="105" y="570" font-family=