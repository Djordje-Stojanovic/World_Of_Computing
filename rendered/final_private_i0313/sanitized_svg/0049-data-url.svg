<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc"> <title id="title">Chapter 9 research-to-product conversion timeline</title> <desc id="desc">A source-bounded timeline showing Google research, model, and product conversion milestones from Transformer to Gemini 2.5, with blockers for adoption and benchmark claims.</desc> <rect width="1200" height="760" fill="#fbfaf7"/> <text x="64" y="72" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#202124">Research Became Product In Stages</text> <text x="64" y="108" font-family="Arial, sans-serif" font-size="17" fill="#4b5563">Google/DeepMind chronology supports conversion pressure, not a neutral claim of market leadership.</text> <line x1="112" y1="410" x2="1088" y2="410" stroke="#1f2937" stroke-width="4"/> <g font-family="Arial, sans-serif"> <g> <circle cx="132" cy="410" r="16" fill="#4285f4"/> <rect x="64" y="196" width="178" height="148" rx="8" fill="#e8f0fe" stroke="#4285f4" stroke-width="2"/> <text x="82" y="230" font-size="23" font-weight="700" fill="#174ea6">2017</text> <text x="82" y="264" font-size="17" font-weight="700" fill="#202124">Transformer</text> <text x="82" y="292" font-size="14" fill="#374151">Architecture root</text> <text x="82" y="318" font-size="13" fill="#374151"></text> <line x1="132" y1="344" x2="132" y2="394" stroke="#4285f4" stroke-width="2"/> </g> <g> <circle cx="268" cy="410" r="16" fill="#34a853"/> <rect x="184" y="486" width="190" height="150" rx="8" fill="#e6f4ea" stroke="#34a853" stroke-width="2"/> <text x="204" y="520" font-size="23" font-weight="700" fill="#137333">2022</text> <text x="204" y="554" font-size="17" font-weight="700" fill="#202124">PaLM + Pathways</text> <text x="204" y="582" font-size="14" fill="#374151">540B model, systems frame</text> <text x="204" y="608" font-size="13" fill="#374151"></text> <line x1="268" y1="426" x2="268" y2="486" stroke="#34a853" stroke-width="2"/> </g> <g> <circle cx="420" cy="410" r="16" fill="#fbbc04"/> <rect x="342" y="196" width="198" height="148" rx="8" fill="#fef7e0" stroke="#fbbc04" stroke-width="2"/> <text x="362" y="230" font-size="23" font-weight="700" fill="#8a5a00">Mar 2023</text> <text x="362" y="264" font-size="17" font-weight="700" fill="#202124">Bard</text> <text x="362" y="292" font-size="14" fill="#374151">Early experiment, Search complement</text> <text x="362" y="318" font-size="13" fill="#374151"></text> <line x1="420" y1="344" x2="420" y2="394" stroke="#fbbc04" stroke-width="2"/> </g> <g> <circle cx="584" cy="410" r="16" fill="#a142f4"/> <rect x="506" y="486" width="212" height="150" rx="8" fill="#f3e8ff" stroke="#a142f4" stroke-width="2"/> <text x="526" y="520" font-size="23" font-weight="700" fill="#6f2da8">Dec 2023</text> <text x="526" y="554" font-size="17" font-weight="700" fill="#202124">Gemini banner</text> <text x="526" y="582" font-size="14" fill="#374151">Ultra, Pro, Nano family</text> <text x="526" y="608" font-size="13" fill="#374151"></text> <line x1="584" y1="426" x2="584" y2="486" stroke="#a142f4" stroke-width="2"/> </g> <g> <circle cx="746" cy="410" r="16" fill="#ea4335"/> <rect x="668" y="196" width="214" height="148" rx="8" fill="#fce8e6" stroke="#ea4335" stroke-width="2"/> <text x="688" y="230" font-size="23" font-weight="700" fill="#a50e0e">Feb 2024</text> <text x="688" y="264" font-size="17" font-weight="700" fill="#202124">Bard becomes Gemini</text> <text x="688" y="292" font-size="14" fill="#374151">Consumer app and Advanced</text> <text x="688" y="318" font-size="13" fill="#374151"></text> <line x1="746" y1="344" x2="746" y2="394" stroke="#ea4335" stroke-width="2"/> </g> <g> <circle cx="910" cy="410" r="16" fill="#0f766e"/> <rect x="818" y="486" width="218" height="150" rx="8" fill="#ccfbf1" stroke="#0f766e" stroke-width="2"/> <text x="838" y="520" font-size="23" font-weight="700" fill="#115e59">2024</text> <text x="838" y="554" font-size="17" font-weight="700" fill="#202124">Gemini 1.5 context</text> <text x="838" y="582" font-size="14" fill="#374151">1M consumer, 2M dev/cloud paths</text> <text x="838" y="608" font-size="13" fill="#374151"></text> <line x1="910" y1="426" x2="910" y2="486" stroke="#0f766e" stroke-width="2"/> </g> <g> <circle cx="1056" cy="410" r="16" fill="#5f6368"/> <rect x="976" y="196" width="158" height="148" rx="8" fill="#f1f3f4" stroke="#5f6368" stroke-width="2"/> <text x="996" y="230" font-size="23" font-weight="700" fill="#3c4043">2025</text> <text x="996" y="264" font-size="17" font-weight="700" fill="#202124">Gemini 2.5</text> <text x="996" y="292" font-size="14" fill="#374151">Thinking frame</text> <text x="996" y="318" font-size="13" fill="#374151"></text> <line x1="1056" y1="344" x2="1056" y2="394" stroke="#5f6368" stroke-width="2"/> </g> </g> <rect x="64" y="672" width="1070" height="44" rx="8" fill="#111827"/> <text x="84" y="700" font-family="Arial, sans-serif" font-size="15" fill="#ffffff">Blocked: adoption totals, subscriber counts, revenue impact, exact benchmark superiority, TPU-vs-GPU cost/performance, and Search click economics.</text>
</svg>