<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc"> <title id="title">Safety And Productivity Blocker Grid</title> <desc id="desc">A grid separating sourced Anthropic/Claude evidence from blocked safety, productivity, ranking, pricing, adoption, and memory claims.</desc> <rect width="1200" height="720" fill="#f6f2ee"/> <text x="70" y="70" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#1b222c">The tempting Claude claims are not the sourced ones</text> <text x="70" y="108" font-family="Arial, sans-serif" font-size="16" fill="#55606d">Launch pages, docs, model cards, benchmarks, and pricing rows license different claims.</text> <g font-family="Arial, sans-serif" font-size="15"> <rect x="70" y="155" width="1060" height="60" fill="#1b222c"/> <text x="95" y="193" fill="#ffffff" font-weight="700">Evidence surface</text> <text x="390" y="193" fill="#ffffff" font-weight="700">Allowed use</text> <text x="760" y="193" fill="#ffffff" font-weight="700">Blocked leap</text> <g> <rect x="70" y="215" width="1060" height="72" fill="#ffffff" stroke="#d0c7bd"/> <text x="95" y="249" fill="#1b222c" font-weight="700">Model card / system material</text> <text x="390" y="249" fill="#4f5c68">Risk categories and evaluation framing</text> <text x="760" y="249" fill="#8a3d36">Solved safety or deployed reliability</text> </g> <g> <rect x="70" y="287" width="1060" height="72" fill="#fdfaf4" stroke="#d0c7bd"/> <text x="95" y="321" fill="#1b222c" font-weight="700">Claude 4 launch benchmarks</text> <text x="390" y="321" fill="#4f5c68">Vendor-attributed positioning</text> <text x="760" y="321" fill="#8a3d36">Best coding model or live rank</text> </g> <g> <rect x="70" y="359" width="1060" height="72" fill="#ffffff" stroke="#d0c7bd"/> <text x="95" y="393" fill="#1b222c" font-weight="700">Pricing/context rows</text> <text x="390" y="393" fill="#4f5c68">Caveated provider data</text> <text x="760" y="393" fill="#8a3d36">Price-quality frontier or cheapest/best</text> </g> <g> <rect x="70" y="431" width="1060" height="72" fill="#fdfaf4" stroke="#d0c7bd"/> <text x="95" y="465" fill="#1b222c" font-weight="700">Claude Code docs</text> <text x="390" y="465" fill="#4f5c68">Workflow and permission structure</text> <text x="760" y="465" fill="#8a3d36">Productivity lift or developer replacement</text> </g> <g> <rect x="70" y="503" width="1060" height="72" fill="#ffffff" stroke="#d0c7bd"/> <text x="95" y="537" fill="#1b222c" font-weight="700">Local-file / memory-like claims</text> <text x="390" y="537" fill="#4f5c68">Conditioned on granted file access</text> <text x="760" y="537" fill="#8a3d36">General memory or autonomous private access</text> </g> <rect x="70" y="610" width="1060" height="56" rx="8" fill="#1b222c"/> <text x="95" y="645" font-size="17" fill="#ffffff">Use the source role in the caption before turning any Claude claim into a chart, rank, or outcome.</text> </g>
</svg>