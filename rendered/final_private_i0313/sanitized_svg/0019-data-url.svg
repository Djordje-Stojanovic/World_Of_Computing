<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc"> <title id="title">Chapter 21 Reasoning-Budget Routing Map</title> <desc id="desc">Schematic routing map showing how different requests deserve different reasoning budgets and escalation paths.</desc> <rect width="1200" height="760" fill="#f9fafb"/> <text x="70" y="72" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#111827">The product question: how much thinking is this worth?</text> <text x="70" y="108" font-family="Arial, sans-serif" font-size="17" fill="#4b5563">Reasoning turns inference into routing: fast paths, search paths, tool paths, and human review.</text> <g font-family="Arial, sans-serif"> <rect x="85" y="165" width="220" height="390" rx="10" fill="#ffffff" stroke="#2563eb" stroke-width="3"/> <text x="120" y="210" font-size="22" font-weight="700" fill="#1e3a8a">Fast path</text> <text x="120" y="248" font-size="16" fill="#1f2937">simple recall</text> <text x="120" y="276" font-size="16" fill="#1f2937">low-risk rewrite</text> <text x="120" y="304" font-size="16" fill="#1f2937">cheap classification</text> <rect x="120" y="370" width="150" height="32" fill="#dbeafe"/> <text x="137" y="392" font-size="14" fill="#1e3a8a">low latency</text> <rect x="335" y="165" width="220" height="390" rx="10" fill="#ffffff" stroke="#d97706" stroke-width="3"/> <text x="370" y="210" font-size="22" font-weight="700" fill="#78350f">Think path</text> <text x="370" y="248" font-size="16" fill="#1f2937">math reasoning</text> <text x="370" y="276" font-size="16" fill="#1f2937">multi-step planning</text> <text x="370" y="304" font-size="16" fill="#1f2937">sample + verify</text> <rect x="370" y="370" width="150" height="32" fill="#fef3c7"/> <text x="385" y="392" font-size="14" fill="#78350f">higher cost</text> <rect x="585" y="165" width="220" height="390" rx="10" fill="#ffffff" stroke="#16a34a" stroke-width="3"/> <text x="620" y="210" font-size="22" font-weight="700" fill="#14532d">Tool path</text> <text x="620" y="248" font-size="16" fill="#1f2937">retrieval</text> <text x="620" y="276" font-size="16" fill="#1f2937">code execution</text> <text x="620" y="304" font-size="16" fill="#1f2937">browser / calculator</text> <rect x="620" y="370" width="150" height="32" fill="#dcfce7"/> <text x="638" y="392" font-size="14" fill="#14532d">authority gates</text> <rect x="835" y="165" width="280" height="390" rx="10" fill="#ffffff" stroke="#be123c" stroke-width="3"/> <text x="870" y="210" font-size="22" font-weight="700" fill="#881337">Escalate / refuse</text> <text x="870" y="248" font-size="16" fill="#1f2937">high-stakes uncertainty</text> <text x="870" y="276" font-size="16" fill="#1f2937">unsafe action</text> <text x="870" y="304" font-size="16" fill="#1f2937">missing evidence</text> <rect x="870" y="370" width="190" height="32" fill="#ffe4e6"/> <text x="885" y="392" font-size="14" fill="#881337">human owns outcome</text> <path d="M305 360 H335" stroke="#6b7280" stroke-width="3"/> <path d="M555 360 H585" stroke="#6b7280" stroke-width="3"/> <path d="M805 360 H835" stroke="#6b7280" stroke-width="3"/> <rect x="85" y="595" width="1030" height="62" rx="8" fill="#111827"/> <text x="115" y="633" font-size="17" font-weight="700" fill="#ffffff">Blocked:</text> <text x="195" y="633" font-size="16" fill="#fef3c7">no exact routing policy, production behavior, cost curve, latency curve, or solved reasoning claim.</text> </g> <text x="70" y="710" font-family="Arial, sans-serif" font-size="14" fill="#6b7280">Sources: /004/005/006/007/010.</text>
</svg>