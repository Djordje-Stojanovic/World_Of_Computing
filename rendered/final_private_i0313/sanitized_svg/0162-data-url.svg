<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc"> <title id="title">Coding Agent Harness Loop</title> <desc id="desc">A Chapter 20 visual showing how a coding agent benchmark or workflow wraps a model in issue context, repository files, tools, tests, retries, and human review.</desc> <style>.bg{fill:#f7f5ef}.ink{fill:#20242a}.muted{fill:#5e6670}.panel{fill:#fff;stroke:#242a31;stroke-width:2}.human{fill:#f3ead7;stroke:#9a6b20;stroke-width:3}.model{fill:#e7eff8;stroke:#2f6392;stroke-width:3}.tool{fill:#e7f3ed;stroke:#32745c;stroke-width:3}.warn{fill:#f7e5dc;stroke:#a14f34;stroke-width:3}.line{stroke:#3f4650;stroke-width:3;fill:none;marker-end:url(#arrow)}.dash{stroke:#3f4650;stroke-width:3;fill:none;stroke-dasharray:8 7;marker-end:url(#arrow)}.title{font-family:Arial,Helvetica,sans-serif;font-size:38px;font-weight:700}.label{font-family:Arial,Helvetica,sans-serif;font-size:25px;font-weight:700}.small{font-family:Arial,Helvetica,sans-serif;font-size:18px}.tiny{font-family:Arial,Helvetica,sans-serif;font-size:15px} </style> <defs><marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 Z" fill="#3f4650"/></marker></defs> <rect class="bg" width="1200" height="760"/> <text class="title ink" x="58" y="72">Coding Agent Harness Loop</text> <text class="small muted" x="58" y="108">A benchmark result measures a model plus scaffold: issue, repo, tools, tests, retries, and review.</text> <rect class="human" x="70" y="178" width="205" height="115" rx="8"/><text class="label ink" x="110" y="225">Issue or task</text><text class="small muted" x="110" y="255">Bug report, spec,</text><text class="small muted" x="110" y="280">or work order</text> <rect class="panel" x="350" y="160" width="215" height="150" rx="8"/><text class="label ink" x="395" y="208">Context pack</text><text class="small muted" x="390" y="238">Repo files</text><text class="small muted" x="390" y="264">Instructions</text><text class="small muted" x="390" y="290">Prior state</text> <rect class="model" x="640" y="160" width="210" height="150" rx="8"/><text class="label ink" x="690" y="208">Model</text><text class="small muted" x="680" y="238">Plans, edits,</text><text class="small muted" x="680" y="264">summarizes,</text><text class="small muted" x="680" y="290">asks or acts</text> <rect class="tool" x="930" y="178" width="200" height="115" rx="8"/><text class="label ink" x="975" y="225">Tools</text><text class="small muted" x="965" y="255">Files, shell,</text><text class="small muted" x="965" y="280">tests, logs</text> <path class="line" d="M275 235 H345"/><path class="line" d="M565 235 H635"/><path class="line" d="M850 235 H925"/> <rect class="panel" x="625" y="410" width="250" height="135" rx="8"/><text class="label ink" x="676" y="455">Check result</text><text class="small muted" x="665" y="486">Pass, fail, trace,</text><text class="small muted" x="665" y="514">or changed diff</text> <path class="dash" d="M1030 295 C1025 380 920 450 880 470"/> <path class="dash" d="M625 475 C470 475 455 345 455 314"/> <rect class="warn" x="70" y="615" width="1060" height="78" rx="8"/><text class="small ink" x="100" y="650">Guardrail: a benchmark score is not only a model score unless the harness, scaffold, tool permissions, sample budget, and retry rules are named.</text><text class="tiny muted" x="100" y="675">Sources:,,,,, through.</text>
</svg>