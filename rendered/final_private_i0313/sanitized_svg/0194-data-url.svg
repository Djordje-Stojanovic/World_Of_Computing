<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc"> <title id="title">CUDA Stack: The Moat Under the Moat</title> <desc id="desc">A Chapter 14 layered diagram showing CUDA as a stack from frameworks and libraries down to kernels, runtime, drivers, GPUs, and cloud operations, with blocker notes.</desc> <style>.bg{fill:#f7f4ee}.ink{fill:#1f2933;font-family:Arial,Helvetica,sans-serif}.muted{fill:#5d6470;font-family:Arial,Helvetica,sans-serif}.title{font-size:38px;font-weight:800}.sub{font-size:18px}.label{font-size:20px;font-weight:800}.small{font-size:15px}.tiny{font-size:12px}.card{fill:#fffdf7;stroke:#c8c1b5;stroke-width:2}.software{fill:#e8f5ef;stroke:#0f8b6f;stroke-width:3}.runtime{fill:#e7efff;stroke:#2563eb;stroke-width:3}.hardware{fill:#fff3d8;stroke:#b7791f;stroke-width:3}.risk{fill:#fff0ec;stroke:#c2412d;stroke-width:3}.line{fill:none;stroke:#1f2933;stroke-width:4;marker-end:url(#arrow)} </style> <defs><marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 Z" fill="#1f2933"/></marker></defs> <rect class="bg" width="1200" height="760"/> <text class="ink title" x="60" y="72">CUDA Stack: The Moat Under The Moat</text> <text class="muted sub" x="60" y="108">NVIDIA's LLM advantage is a layered operating habit, not only a chip spec.</text> <rect class="software" x="130" y="150" width="940" height="70" rx="8"/> <text class="ink label" x="170" y="193">Model frameworks and user code</text> <text class="muted small" x="520" y="193">PyTorch/JAX-style tensor programs, training scripts, inference services</text> <path class="line" d="M600 225 V254"/> <rect class="software" x="130" y="260" width="940" height="70" rx="8"/> <text class="ink label" x="170" y="303">Libraries and tuned primitives</text> <text class="muted small" x="520" y="303">cuDNN, TensorRT-LLM, collective communication, attention kernels</text> <path class="line" d="M600 335 V364"/> <rect class="runtime" x="130" y="370" width="940" height="70" rx="8"/> <text class="ink label" x="170" y="413">CUDA programming model</text> <text class="muted small" x="520" y="413">kernels, threads, blocks, streams, memory spaces, runtime, driver</text> <path class="line" d="M600 445 V474"/> <rect class="hardware" x="130" y="480" width="940" height="70" rx="8"/> <text class="ink label" x="170" y="523">Accelerators and systems</text> <text class="muted small" x="520" y="523">Tensor Cores, HBM, NVLink/NVSwitch, servers, racks, cloud capacity</text> <rect class="risk" x="145" y="605" width="910" height="74" rx="8"/> <text class="ink label" x="175" y="638">Blocked claim lane</text> <text class="muted small" x="175" y="662">This is a mechanism stack, not proof of market dominance, antitrust claims, TCO, broad framework dominance, or universal developer preference.</text> <text class="muted tiny" x="150" y="718">Figure. Sources:. Notes: /002/006/007.</text>
</svg>