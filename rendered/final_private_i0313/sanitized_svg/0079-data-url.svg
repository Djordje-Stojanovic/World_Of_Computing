<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="780" viewBox="0 0 1200 780" role="img" aria-labelledby="title desc"> <title id="title">Figure 24.3 - Unsettled Claims Board</title> <desc id="desc">Grid of tempting end-of-book claims and the evidence still required by the cutoff, preventing the final chapter from turning into prophecy.</desc> <rect width="1200" height="780" fill="#f8f5ed"/> <text x="72" y="70" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#1f2933">Unsettled By The Cutoff</text> <text x="72" y="106" font-family="Arial, sans-serif" font-size="17" fill="#52606d">A negative-control board for the claims the book refuses to settle without same-scope evidence.</text> <g font-family="Arial, sans-serif" font-size="16"> <rect x="72" y="150" width="1056" height="470" rx="8" fill="#ffffff" stroke="#52606d" stroke-width="2"/> <g fill="#1f2933" font-weight="700"> <text x="110" y="196">Tempting claim</text> <text x="420" y="196">Evidence still required</text> <text x="850" y="196">Cutoff stance</text> </g> <line x1="72" y1="218" x2="1128" y2="218" stroke="#52606d" stroke-width="2"/> <g fill="#3e4c59"> <text x="110" y="258">Best model was settled</text> <text x="420" y="258">same-date benchmark normalization</text> <text x="850" y="258">blocked</text> <text x="110" y="304">Revenue or ROI proved value</text> <text x="420" y="304">company/customer financial evidence</text> <text x="850" y="304">blocked</text> <text x="110" y="350">Productivity gains were broad</text> <text x="420" y="350">independent task and workplace studies</text> <text x="850" y="350">blocked</text> <text x="110" y="396">Energy cost was knowable</text> <text x="420" y="396">site, workload, time, and grid scope</text> <text x="850" y="396">blocked</text> <text x="110" y="442">Safety or trust was solved</text> <text x="420" y="442">deployed failure and mitigation evidence</text> <text x="850" y="442">blocked</text> <text x="110" y="488">Agents became autonomous</text> <text x="420" y="488">scaffold, task, permissions, retries, review</text> <text x="850" y="488">blocked</text> <text x="110" y="534">Labor replacement was proven</text> <text x="420" y="534">market-wide role and wage evidence</text> <text x="850" y="534">blocked</text> <text x="110" y="580">One path became inevitable</text> <text x="420" y="580">longitudinal adoption and economics</text> <text x="850" y="580">blocked</text> </g> <g stroke="#d7dde2" stroke-width="1"> <line x1="72" y1="276" x2="1128" y2="276"/> <line x1="72" y1="322" x2="1128" y2="322"/> <line x1="72" y1="368" x2="1128" y2="368"/> <line x1="72" y1="414" x2="1128" y2="414"/> <line x1="72" y1="460" x2="1128" y2="460"/> <line x1="72" y1="506" x2="1128" y2="506"/> <line x1="72" y1="552" x2="1128" y2="552"/> </g> </g> <rect x="72" y="660" width="1056" height="54" rx="8" fill="#1f2933"/> <text x="100" y="694" font-family="Arial, sans-serif" font-size="16" fill="#ffffff">The grid protects the ending from hype and anti-hype: powerful interface under construction, not settled endpoint.</text>
</svg>