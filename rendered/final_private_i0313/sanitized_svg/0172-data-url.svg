<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc"> <title id="title">Enterprise Claim Blocker Map</title> <desc id="desc">Chapter 8 visual separating supported Microsoft/OpenAI enterprise access and product-surface claims from blocked revenue, productivity, customer outcome, and adoption claims.</desc> <style>.bg{fill:#f7f4ee}.ink{fill:#1f2933;font-family:Arial,Helvetica,sans-serif}.muted{fill:#5d6470;font-family:Arial,Helvetica,sans-serif}.title{font-size:38px;font-weight:800}.sub{font-size:19px}.label{font-size:24px;font-weight:800}.small{font-size:17px}.tiny{font-size:13px}.ok{fill:#e8f5ef;stroke:#0f8b6f;stroke-width:3}.maybe{fill:#fff3d8;stroke:#b7791f;stroke-width:3}.no{fill:#fff0ec;stroke:#c2412d;stroke-width:3}.line{stroke:#1f2933;stroke-width:3;marker-end:url(#arrow)} </style> <defs><marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 Z" fill="#1f2933"/></marker></defs> <rect class="bg" width="1200" height="760"/> <text class="ink title" x="60" y="72">Enterprise Claim Blocker Map</text> <text class="muted sub" x="60" y="108">Chapter 8 can show access routes and product surfaces now. Business outcomes need stronger evidence later.</text> <rect class="ok" x="70" y="170" width="315" height="360" rx="8"/><text class="ink label" x="110" y="215">Allowed now</text><text class="ink small" x="110" y="265">Azure OpenAI Service GA</text><text class="ink small" x="110" y="305">ChatGPT on Azure</text><text class="ink small" x="110" y="345">Microsoft 365 Copilot intro</text><text class="ink small" x="110" y="385">GitHub Copilot preview</text><text class="ink small" x="110" y="425">enterprise access-route framing</text><text class="muted tiny" x="110" y="485"></text> <line class="line" x1="400" y1="350" x2="500" y2="350"/> <rect class="maybe" x="515" y="170" width="315" height="360" rx="8"/><text class="ink label" x="555" y="215">Needs rows</text><text class="ink small" x="555" y="265">customer-side studies</text><text class="ink small" x="555" y="305">filings or audited metrics</text><text class="ink small" x="555" y="345">seat and active-use definitions</text><text class="ink small" x="555" y="385">baseline and review cost</text><text class="ink small" x="555" y="425">model-serving economics</text><text class="muted tiny" x="555" y="485">/010/011/012</text> <line class="line" x1="845" y1="350" x2="945" y2="350"/> <rect class="no" x="960" y="170" width="170" height="360" rx="8"/><text class="ink label" x="995" y="215">Blocked</text><text class="ink small" x="995" y="265">revenue</text><text class="ink small" x="995" y="305">ROI</text><text class="ink small" x="995" y="345">productivity</text><text class="ink small" x="995" y="385">adoption</text><text class="ink small" x="995" y="425">search share</text><text class="ink small" x="995" y="465">margin</text> <rect class="no" x="70" y="610" width="1060" height="72" rx="8"/> <text class="ink small" x="100" y="647">Rule: product announcements show surfaces and routes. They do not prove enterprise transformation, revenue, active use, or customer productivity.</text> <text class="muted tiny" x="100" y="670">Figure. Sources and blockers in data/chapter8_microsoft_openai_visual_package_i0118.tsv.</text>
</svg>