<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc"> <title id="title">Constitutional AI Behavior Loop</title> <desc id="desc">A schematic of Constitutional AI as behavior grammar, with blocker captions for solved alignment and moral guarantee claims.</desc> <rect width="1200" height="720" fill="#f7f3ea"/> <text x="70" y="70" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#18202a">Constitutional AI as behavior grammar</text> <text x="70" y="108" font-family="Arial, sans-serif" font-size="16" fill="#4d5968">Source lane:. This diagram explains a training pattern, not solved alignment.</text> <defs> <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"> <path d="M0,0 L8,3 L0,6 Z" fill="#2f5d62"/> </marker> </defs> <g font-family="Arial, sans-serif"> <rect x="70" y="180" width="190" height="96" rx="8" fill="#ffffff" stroke="#2f5d62" stroke-width="3"/> <text x="95" y="218" font-size="20" font-weight="700" fill="#18202a">Principles</text> <text x="95" y="247" font-size="14" fill="#4d5968">Written behavior frame</text> <rect x="340" y="180" width="190" height="96" rx="8" fill="#ffffff" stroke="#2f5d62" stroke-width="3"/> <text x="365" y="218" font-size="20" font-weight="700" fill="#18202a">Draft answer</text> <text x="365" y="247" font-size="14" fill="#4d5968">Assistant response</text> <rect x="610" y="180" width="190" height="96" rx="8" fill="#ffffff" stroke="#2f5d62" stroke-width="3"/> <text x="635" y="218" font-size="20" font-weight="700" fill="#18202a">Critique</text> <text x="635" y="247" font-size="14" fill="#4d5968">Model-generated review</text> <rect x="880" y="180" width="190" height="96" rx="8" fill="#ffffff" stroke="#2f5d62" stroke-width="3"/> <text x="905" y="218" font-size="20" font-weight="700" fill="#18202a">Revision</text> <text x="905" y="247" font-size="14" fill="#4d5968">Behavior-shaped answer</text> <line x1="260" y1="228" x2="332" y2="228" stroke="#2f5d62" stroke-width="3" marker-end="url(#arrow)"/> <line x1="530" y1="228" x2="602" y2="228" stroke="#2f5d62" stroke-width="3" marker-end="url(#arrow)"/> <line x1="800" y1="228" x2="872" y2="228" stroke="#2f5d62" stroke-width="3" marker-end="url(#arrow)"/> <path d="M970 276 C970 380 225 390 168 276" fill="none" stroke="#86a6a1" stroke-width="3" marker-end="url(#arrow)"/> <rect x="210" y="430" width="300" height="110" rx="8" fill="#e5efe8" stroke="#6b9087" stroke-width="2"/> <text x="235" y="466" font-size="20" font-weight="700" fill="#18202a">AI feedback signal</text> <text x="235" y="496" font-size="14" fill="#304750">Preference-like training data from model critique and revision</text> <rect x="690" y="430" width="300" height="110" rx="8" fill="#fff4d8" stroke="#c69b38" stroke-width="2"/> <text x="715" y="466" font-size="20" font-weight="700" fill="#18202a">Guardrail band</text> <text x="715" y="496" font-size="14" fill="#5a4a1d">Not proof of moral guarantee, deployed safety, or human judgment replacement</text> <line x1="510" y1="485" x2="682" y2="485" stroke="#6b9087" stroke-width="3" marker-end="url(#arrow)"/> <rect x="70" y="610" width="1060" height="56" rx="8" fill="#18202a"/> <text x="95" y="645" font-size="17" fill="#ffffff">Caption contract: supports mechanism framing only. Exact principle lists and outcome claims need row-level extraction.</text> </g>
</svg>