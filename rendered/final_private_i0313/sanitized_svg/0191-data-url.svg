<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc"> <title id="title">Interconnection Queue Schematic</title> <desc id="desc">A Chapter 16 schematic showing the queue between hyperscale power requests and physical grid readiness.</desc> <style>.bg{fill:#f4f6f2}.ink{fill:#20242a}.muted{fill:#5f6872}.box{fill:#fff;stroke:#232931;stroke-width:2}.request{fill:#e5edf7;stroke:#3c6382;stroke-width:2}.wait{fill:#f7e5cf;stroke:#a45a28;stroke-width:2}.ready{fill:#dceccf;stroke:#47733f;stroke-width:2}.line{stroke:#4b5560;stroke-width:3;fill:none;marker-end:url(#arrow)}.title{font-family:Arial,Helvetica,sans-serif;font-size:38px;font-weight:700}.label{font-family:Arial,Helvetica,sans-serif;font-size:25px;font-weight:700}.small{font-family:Arial,Helvetica,sans-serif;font-size:20px}.note{font-family:Arial,Helvetica,sans-serif;font-size:17px;fill:#5f6872} </style> <defs><marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 Z" fill="#4b5560"/></marker></defs> <rect class="bg" width="1200" height="760"/> <text class="title ink" x="60" y="70">The Interconnection Queue</text> <text class="small muted" x="60" y="108">The decisive schedule may be studies, transformers, substations, and local readiness.</text> <rect class="request" x="70" y="185" width="220" height="170" rx="8"/> <text class="label ink" x="100" y="235">Hyperscale</text><text class="label ink" x="100" y="268">request</text> <text class="small ink" x="100" y="315">300-1,000 MW</text> <path class="line" d="M305 270 H405"/> <rect class="wait" x="425" y="160" width="300" height="220" rx="8"/> <text class="label ink" x="460" y="210">Grid readiness queue</text> <text class="small ink" x="460" y="255">interconnection study</text> <text class="small ink" x="460" y="292">substation and transformer</text> <text class="small ink" x="460" y="329">cables, permits, generation</text> <path class="line" d="M740 270 H840"/> <rect class="ready" x="860" y="185" width="270" height="170" rx="8"/> <text class="label ink" x="895" y="235">Usable site power</text> <text class="small ink" x="895" y="285">load can meet racks,</text> <text class="small ink" x="895" y="320">cooling, and operations</text> <rect class="box" x="125" y="450" width="950" height="95" rx="8"/> <text class="label ink" x="160" y="495">Timing mismatch</text> <text class="small ink" x="160" y="530">Accelerator procurement can move on product cadence; grid equipment and local approvals often cannot.</text> <rect class="wait" x="260" y="595" width="680" height="60" rx="8"/> <text class="small ink" x="300" y="633">DOE-SEAB reported one-to-three-year lead times; use as advisory evidence, not a complete database.</text> <text class="note" x="60" y="725">Sources:,, rows through. No named-campus delay claim.</text>
</svg>