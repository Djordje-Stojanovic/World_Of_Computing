<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc"> <title id="title">Agent Loop as Harness</title> <desc id="desc">A Chapter 18 circular agent-loop diagram showing model, tool, observation, policy, memory-like context, and human review as a system property.</desc> <style>.bg{fill:#f7f4ee}.ink{fill:#1f2933;font-family:Arial,Helvetica,sans-serif}.muted{fill:#5d6470;font-family:Arial,Helvetica,sans-serif}.title{font-size:38px;font-weight:800}.sub{font-size:19px}.label{font-size:20px;font-weight:800}.small{font-size:15px}.tiny{font-size:12px}.model{fill:#e7efff;stroke:#2563eb;stroke-width:3}.tool{fill:#fff3d8;stroke:#b7791f;stroke-width:3}.data{fill:#e8f5ef;stroke:#0f8b6f;stroke-width:3}.risk{fill:#fff0ec;stroke:#c2412d;stroke-width:3}.box{fill:#fffdf7;stroke:#c8c1b5;stroke-width:2}.line{fill:none;stroke:#1f2933;stroke-width:4;marker-end:url(#arrow)} </style> <defs><marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 Z" fill="#1f2933"/></marker></defs> <rect class="bg" width="1200" height="760"/> <text class="ink title" x="60" y="72">Agent Loop As Harness</text> <text class="muted sub" x="60" y="108">Agency is a system property: model plus context, tools, policies, observations, and review.</text> <rect class="model" x="475" y="155" width="250" height="92" rx="10"/><text class="ink label" x="535" y="190">Plan / next step</text><text class="muted small" x="520" y="218">model proposes action</text> <rect class="tool" x="780" y="320" width="230" height="92" rx="10"/><text class="ink label" x="855" y="354">Act</text><text class="muted small" x="830" y="382">call tool or UI</text> <rect class="data" x="475" y="500" width="250" height="92" rx="10"/><text class="ink label" x="548" y="535">Observe</text><text class="muted small" x="520" y="563">tool result returns</text> <rect class="risk" x="190" y="320" width="230" height="92" rx="10"/><text class="ink label" x="260" y="354">Gate</text><text class="muted small" x="230" y="382">policy / human review</text> <path class="line" d="M725 204 C835 220 890 260 895 315"/> <path class="line" d="M892 414 C870 498 795 540 730 546"/> <path class="line" d="M472 546 C380 535 300 485 303 417"/> <path class="line" d="M303 318 C315 245 405 207 470 201"/> <rect class="box" x="490" y="310" width="220" height="112" rx="8"/><text class="ink label" x="538" y="345">Harness</text><text class="muted small" x="525" y="374">context packing</text><text class="muted small" x="525" y="396">permissions, retry, stop</text> <rect class="box" x="84" y="640" width="1030" height="54" rx="8"/><text class="muted tiny" x="110" y="690">Figure. Sources: /007.</text>
</svg>