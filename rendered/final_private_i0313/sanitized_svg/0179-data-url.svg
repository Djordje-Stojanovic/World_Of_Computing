<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc"> <title id="title">Chapter 22 Routing Caching Batching Levers</title> <desc id="desc">Schematic economics levers for model routing, caching, batching, and distillation with blocker caption.</desc> <rect width="1200" height="760" fill="#f8fafc"/> <text x="70" y="72" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#0f172a">The bill can be routed before the savings are proven</text> <text x="70" y="108" font-family="Arial, sans-serif" font-size="17" fill="#475569">Economic mechanisms are visible; workload-specific savings still need evidence.</text> <g font-family="Arial, sans-serif"> <rect x="80" y="170" width="230" height="260" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="3"/> <text x="115" y="215" font-size="22" font-weight="700" fill="#1e3a8a">Route</text> <text x="115" y="252" font-size="16" fill="#1f2937">cheap/fast model</text> <text x="115" y="280" font-size="16" fill="#1f2937">reasoning model</text> <text x="115" y="308" font-size="16" fill="#1f2937">tool/retrieval path</text> <rect x="340" y="170" width="230" height="260" rx="8" fill="#ffffff" stroke="#16a34a" stroke-width="3"/> <text x="375" y="215" font-size="22" font-weight="700" fill="#14532d">Cache</text> <text x="375" y="252" font-size="16" fill="#1f2937">reused context</text> <text x="375" y="280" font-size="16" fill="#1f2937">system prompts</text> <text x="375" y="308" font-size="16" fill="#1f2937">document packs</text> <rect x="600" y="170" width="230" height="260" rx="8" fill="#ffffff" stroke="#d97706" stroke-width="3"/> <text x="635" y="215" font-size="22" font-weight="700" fill="#78350f">Batch</text> <text x="635" y="252" font-size="16" fill="#1f2937">defer work</text> <text x="635" y="280" font-size="16" fill="#1f2937">fill capacity</text> <text x="635" y="308" font-size="16" fill="#1f2937">trade latency</text> <rect x="860" y="170" width="230" height="260" rx="8" fill="#ffffff" stroke="#7c3aed" stroke-width="3"/> <text x="895" y="215" font-size="22" font-weight="700" fill="#4c1d95">Distill</text> <text x="895" y="252" font-size="16" fill="#1f2937">smaller model</text> <text x="895" y="280" font-size="16" fill="#1f2937">task-specific path</text> <text x="895" y="308" font-size="16" fill="#1f2937">quality tradeoff</text> <rect x="110" y="505" width="980" height="74" rx="8" fill="#111827"/> <text x="145" y="550" font-size="17" font-weight="700" fill="#ffffff">Blocked:</text> <text x="225" y="550" font-size="16" fill="#fef3c7">actual savings, routing quality, customer ROI, provider margin, utilization, and production behavior.</text> </g> <text x="70" y="705" font-family="Arial, sans-serif" font-size="14" fill="#64748b">Sources/data: provider pricing rows; Mistral pricing rows;;. Schematic levers, not measured savings.</text>
</svg>