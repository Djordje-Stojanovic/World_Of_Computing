<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc"> <title id="title">GPT lineage visual table, 2018 to 2021</title> <desc id="desc">A sourced Chapter 5 visual table showing GPT-1, GPT-2, GPT-3, OpenAI API, Codex, and GitHub Copilot by year, mechanism, interface shift, Sources, and caveat status.</desc> <rect width="1600" height="900" fill="#f7f4ee"/> <rect x="64" y="58" width="1472" height="784" rx="0" fill="#fffdfa" stroke="#c8c1b5" stroke-width="2"/> <text x="92" y="118" font-family="Inter, Arial, sans-serif" font-size="38" font-weight="700" fill="#1f2933">Figure 5.1 - From Pretraining To The Cursor</text> <text x="92" y="155" font-family="Inter, Arial, sans-serif" font-size="20" fill="#52616f">The GPT lineage is an interface story: each step changes what a user can do with next-token prediction.</text> <line x1="128" y1="222" x2="1472" y2="222" stroke="#c8c1b5" stroke-width="3"/> <text x="128" y="202" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#52616f">YEAR</text> <text x="242" y="202" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#52616f">ARTIFACT</text> <text x="472" y="202" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#52616f">MECHANISM</text> <text x="842" y="202" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#52616f">INTERFACE SHIFT</text> <text x="1268" y="202" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#52616f">SOURCE / CAVEAT</text> <g font-family="Inter, Arial, sans-serif"> <g transform="translate(0,248)"> <circle cx="151" cy="31" r="15" fill="#2563eb"/> <text x="128" y="38" font-size="22" font-weight="700" fill="#1f2933">2018</text> <text x="242" y="38" font-size="23" font-weight="700" fill="#1f2933">GPT-1</text> <text x="472" y="25" font-size="19" fill="#1f2933">Generative Transformer pretraining,</text> <text x="472" y="51" font-size="19" fill="#1f2933">then supervised transfer</text> <text x="842" y="25" font-size="19" fill="#1f2933">Unlabeled text becomes reusable</text> <text x="842" y="51" font-size="19" fill="#1f2933">language representation</text> <text x="1268" y="25" font-size="18" font-weight="700" fill="#0f8b6f"></text> <text x="1268" y="51" font-size="16" fill="#52616f">Mechanism milestone</text> </g> <line x1="128" y1="332" x2="1472" y2="332" stroke="#e0d8cc" stroke-width="2"/> <g transform="translate(0,354)"> <circle cx="151" cy="31" r="15" fill="#b7791f"/> <text x="128" y="38" font-size="22" font-weight="700" fill="#1f2933">2019</text> <text x="242" y="38" font-size="23" font-weight="700" fill="#1f2933">GPT-2</text> <text x="472" y="25" font-size="19" fill="#1f2933">Web-trained model, unsupervised</text> <text x="472" y="51" font-size="19" fill="#1f2933">multitask behavior</text> <text x="842" y="25" font-size="19" fill="#1f2933">Prompted continuation starts to</text> <text x="842" y="51" font-size="19" fill="#1f2933">look like task specification</text> <text x="1268" y="25" font-size="18" font-weight="700" fill="#0f8b6f"></text> <text x="1268" y="51" font-size="16" fill="#c2412d">Motives need sourcing</text> </g> <line x1="128" y1="438" x2="1472" y2="438" stroke="#e0d8cc" stroke-width="2"/> <g transform="translate(0,460)"> <circle cx="151" cy="31" r="15" fill="#2563eb"/> <text x="128" y="38" font-size="22" font-weight="700" fill="#1f2933">2020</text> <text x="242" y="38" font-size="23" font-weight="700" fill="#1f2933">GPT-3</text> <text x="472" y="25" font-size="19" fill="#1f2933">Few-shot language model; examples</text> <text x="472" y="51" font-size="19" fill="#1f2933">inside context guide behavior</text> <text x="842" y="25" font-size="19" fill="#1f2933">Prompt becomes a temporary</text> <text x="842" y="51" font-size="19" fill="#1f2933">task program</text> <text x="1268" y="25" font-size="18" font-weight="700" fill="#0f8b6f"></text> <text x="1268" y="51" font-size="16" fill="#c2412d">Adoption needs snapshots</text> </g> <line x1="128" y1="544" x2="1472" y2="544" stroke="#e0d8cc" stroke-width="2"/> <g transform="translate(0,566)"> <circle cx="151" cy="31" r="15" fill="#b7791f"/> <text x="128" y="38" font-size="22" font-weight="700" fill="#1f2933">2020</text> <text x="242" y="38" font-size="23" font-weight="700" fill="#1f2933">OpenAI API</text> <text x="472" y="25" font-size="19" fill="#1f2933">Hosted text-in/text-out access</text> <text x="472" y="51" font-size="19" fill="#1f2933">to OpenAI models</text> <text x="842" y="25" font-size="19" fill="#1f2933">The model becomes callable</text> <text x="842" y="51" font-size="19" fill="#1f2933">infrastructure</text> <text x="1268" y="25" font-size="18" font-weight="700" fill="#0f8b6f"></text> <text x="1268" y="51" font-size="16" fill="#c2412d">Pricing/usage need captures</text> </g> <line x1="128" y1="650" x2="1472" y2="650" stroke="#e0d8cc" stroke-width="2"/> <g transform="translate(0,672)"> <circle cx="151" cy="31" r="15" fill="#2563eb"/> <text x="128" y="38" font-size="22" font-weight="700" fill="#1f2933">2021</text> <text x="242" y="38" font-size="23" font-weight="700" fill="#1f2933">Codex</text> <text x="472" y="25" font-size="19" fill="#1f2933">Code-trained model evaluated</text> <text x="472" y="51" font-size="19" fill="#1f2933">for functional correctness</text> <text x="842" y="25" font-size="19" fill="#1f2933">Prompts can produce executable</text> <text x="842" y="51" font-size="19" fill="#1f2933">artifacts</text> <text x="1268" y="25" font-size="18" font-weight="700" fill="#0f8b6f"></text> <text x="1268" y="51" font-size="16" fill="#c2412d">Benchmark caveats apply</text> </g> <line x1="128" y1="756" x2="1472" y2="756" stroke="#e0d8cc" stroke-width="2"/> <g transform="translate(0,778)"> <circle cx="151" cy="31" r="15" fill="#6d5bd0"/> <text x="128" y="38" font-size="22" font-weight="700" fill="#1f2933">2021</text> <text x="242" y="38" font-size="23" font-weight="700" fill="#1f2933">GitHub Copilot</text> <text x="472" y="25" font-size="19" fill="#1f2933">Codex-powered technical preview</text> <text x="472" y="51" font-size="19" fill="#1f2933">inside Visual Studio Code</text> <text x="842" y="25" font-size="19" fill="#1f2933">The LLM appears at the</text> <text x="842" y="51" font-size="19" fill="#1f2933">developer cursor</text> <text x="1268" y="25" font-size="18" font-weight="700" fill="#0f8b6f"></text> <text x="1268" y="51" font-size="16" fill="#c2412d">Adoption/legal claims need checks</text> </g> </g> <rect x="92" y="806" width="1416" height="36" fill="#f7f4ee"/> <text x="108" y="830" font-family="Inter, Arial, sans-serif" font-size="15" fill="#52616f">Source table: data/gpt_lineage_visual_table.tsv. Use only with caveats shown; exact usage, pricing, productivity, and comparative benchmark claims require snapshots or triangulation.</text>
