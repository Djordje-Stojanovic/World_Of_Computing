<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="780" viewBox="0 0 1200 780" role="img" aria-labelledby="title desc"> <title id="title">Figure 10.3 - What Moves To The Adopter</title> <desc id="desc">Diagram comparing closed API responsibility with open-weight adopter responsibility for hosting, monitoring, updates, evals, security, governance, and incident response.</desc> <rect width="1200" height="780" fill="#f4f1e8"/> <text x="70" y="70" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#1f2933">What Moves To The Adopter</text> <text x="70" y="106" font-family="Arial, sans-serif" font-size="17" fill="#52606d">Open weights reduce one dependency and move more operational responsibility outward.</text> <g font-family="Arial, sans-serif"> <rect x="90" y="170" width="440" height="400" rx="8" fill="#d7e2ef" stroke="#52606d" stroke-width="2"/> <rect x="670" y="170" width="440" height="400" rx="8" fill="#d9e8e2" stroke="#52606d" stroke-width="2"/> <text x="310" y="220" text-anchor="middle" font-size="25" font-weight="700" fill="#1f2933">Closed API service</text> <text x="890" y="220" text-anchor="middle" font-size="25" font-weight="700" fill="#1f2933">Open-weight deployment</text> <g font-size="18" fill="#1f2933"> <text x="130" y="280">Provider manages model hosting</text> <text x="130" y="326">Provider updates service behavior</text> <text x="130" y="372">Provider controls access policies</text> <text x="130" y="418">User buys convenience and support</text> <text x="130" y="464">User accepts less direct control</text> <text x="710" y="280">Adopter chooses serving stack</text> <text x="710" y="326">Adopter monitors and updates</text> <text x="710" y="372">Adopter runs evals and guardrails</text> <text x="710" y="418">Adopter pays hardware and ops costs</text> <text x="710" y="464">Adopter owns more failure modes</text> </g> <path d="M540 370 C585 335, 625 335, 660 370" fill="none" stroke="#b7791f" stroke-width="5"/> <polygon points="660,370 642,358 644,382" fill="#b7791f"/> <text x="600" y="330" text-anchor="middle" font-size="17" font-weight="700" fill="#8a5a0a">responsibility shifts</text> <rect x="235" y="508" width="150" height="38" rx="6" fill="#ffffff" stroke="#52606d"/> <text x="310" y="533" text-anchor="middle" font-size="15" fill="#1f2933">managed access</text> <rect x="815" y="508" width="150" height="38" rx="6" fill="#ffffff" stroke="#52606d"/> <text x="890" y="533" text-anchor="middle" font-size="15" fill="#1f2933">local control</text> </g> <rect x="80" y="650" width="1040" height="64" rx="8" fill="#1f2933"/> <text x="106" y="681" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#ffffff">Blocked leap</text> <text x="234" y="681" font-family="Arial, sans-serif" font-size="16" fill="#ffffff">This is not a claim that open-weight deployments are cheaper, safer, more adopted, or better performing.</text> <text x="106" y="706" font-family="Arial, sans-serif" font-size="14" fill="#d9e8e2">Source role: structural synthesis from Chapter 10 control-stack prose and audit.</text>
</svg>