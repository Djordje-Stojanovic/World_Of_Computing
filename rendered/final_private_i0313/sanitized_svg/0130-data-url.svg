<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc"> <title id="title">Cooling And Rack Density Note</title> <desc id="desc">A Chapter 16 note visual showing cooling and rack density as facility constraints between power and useful accelerator deployment.</desc> <style>.bg{fill:#f7f4ef}.ink{fill:#20242a}.muted{fill:#5f6872}.box{fill:#fff;stroke:#222831;stroke-width:2}.hot{fill:#f4d7ca;stroke:#a14f34;stroke-width:2}.cool{fill:#dbeef3;stroke:#2b6573;stroke-width:2}.survey{fill:#ece7f3;stroke:#655285;stroke-width:2}.line{stroke:#4b5560;stroke-width:3;fill:none;marker-end:url(#arrow)}.title{font-family:Arial,Helvetica,sans-serif;font-size:38px;font-weight:700}.label{font-family:Arial,Helvetica,sans-serif;font-size:25px;font-weight:700}.small{font-family:Arial,Helvetica,sans-serif;font-size:20px}.note{font-family:Arial,Helvetica,sans-serif;font-size:17px;fill:#5f6872} </style> <defs><marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 Z" fill="#4b5560"/></marker></defs> <rect class="bg" width="1200" height="760"/> <text class="title ink" x="60" y="70">Cooling And Rack Density Are Constraints</text> <text class="small muted" x="60" y="108">The rack is where chip heat, water, real estate, and facility design meet.</text> <rect class="hot" x="80" y="175" width="260" height="185" rx="8"/> <text class="label ink" x="115" y="225">Denser AI racks</text> <text class="small ink" x="115" y="275">more heat per footprint</text> <text class="small ink" x="115" y="312">faster facility stress</text> <path class="line" d="M355 270 H455"/> <rect class="cool" x="475" y="150" width="300" height="235" rx="8"/> <text class="label ink" x="510" y="200">Facility response</text> <text class="small ink" x="510" y="245">advanced cooling</text> <text class="small ink" x="510" y="282">power and water reduction</text> <text class="small ink" x="510" y="319">waste-heat use</text> <text class="small ink" x="510" y="356">onsite supply experiments</text> <path class="line" d="M790 270 H890"/> <rect class="box" x="910" y="175" width="220" height="185" rx="8"/> <text class="label ink" x="945" y="225">Usable</text> <text class="label ink" x="945" y="258">accelerator</text> <text class="label ink" x="945" y="291">capacity</text> <text class="small ink" x="945" y="330">site-dependent</text> <rect class="survey" x="130" y="460" width="940" height="115" rx="8"/> <text class="label ink" x="165" y="505">Operator-survey caution</text> <text class="small ink" x="165" y="542">Uptime reported little average PUE change for a sixth consecutive year and only a small share of facilities above 30 kW per rack.</text> <rect class="hot" x="220" y="620" width="760" height="58" rx="8"/> <text class="small ink" x="250" y="657">Guardrail: do not turn operator-survey signals into universal engineering laws.</text> <text class="note" x="60" y="725">Sources:, rows and. Detailed cooling engineering needs later corroboration.</text>
</svg>