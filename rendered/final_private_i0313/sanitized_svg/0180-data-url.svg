<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc"> <title id="title">Chapter 22 Subscription API Bundle Map</title> <desc id="desc">Map of consumer subscriptions, API metering, enterprise access, and cloud/product bundle routes.</desc> <rect width="1200" height="760" fill="#fffdf8"/> <text x="70" y="72" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#111827">Intelligence is sold through more than one door</text> <text x="70" y="108" font-family="Arial, sans-serif" font-size="17" fill="#4b5563">Product surfaces are evidence of routes to market, not evidence of revenue or ROI.</text> <g font-family="Arial, sans-serif"> <rect x="120" y="175" width="220" height="160" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="3"/> <text x="155" y="220" font-size="22" font-weight="700" fill="#1e3a8a">Subscription</text> <text x="155" y="257" font-size="16" fill="#1f2937">Plus-style seat</text> <text x="155" y="285" font-size="16" fill="#1f2937">consumer access</text> <text x="155" y="313" font-size="13" fill="#6b7280"></text> <rect x="490" y="175" width="220" height="160" rx="8" fill="#ffffff" stroke="#16a34a" stroke-width="3"/> <text x="525" y="220" font-size="22" font-weight="700" fill="#14532d">API meter</text> <text x="525" y="257" font-size="16" fill="#1f2937">tokens and tiers</text> <text x="525" y="285" font-size="16" fill="#1f2937">developer access</text> <text x="525" y="313" font-size="13" fill="#6b7280">pricing rows</text> <rect x="860" y="175" width="220" height="160" rx="8" fill="#ffffff" stroke="#d97706" stroke-width="3"/> <text x="895" y="220" font-size="22" font-weight="700" fill="#78350f">Enterprise</text> <text x="895" y="257" font-size="16" fill="#1f2937">admin + resale</text> <text x="895" y="285" font-size="16" fill="#1f2937">cloud bundles</text> <text x="895" y="313" font-size="13" fill="#6b7280"></text> <path d="M340 255 H490" stroke="#334155" stroke-width="3"/> <path d="M710 255 H860" stroke="#334155" stroke-width="3"/> <rect x="235" y="435" width="730" height="78" rx="8" fill="#111827"/> <text x="270" y="480" font-size="18" font-weight="700" fill="#ffffff">Allowed:</text> <text x="355" y="480" font-size="16" fill="#fef3c7">describe access routes and product-surface conversion.</text> <rect x="235" y="545" width="730" height="78" rx="8" fill="#ffffff" stroke="#be123c" stroke-width="3"/> <text x="270" y="590" font-size="18" font-weight="700" fill="#881337">Blocked:</text> <text x="355" y="590" font-size="16" fill="#111827">subscribers, paid seats, active use, productivity, revenue, margin, ROI.</text> </g> <text x="70" y="705" font-family="Arial, sans-serif" font-size="14" fill="#6b7280">Sources: /002/006.</text>
</svg>