<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc"> <title id="title">Figure 16.1 - Power To Token Flow</title> <desc id="desc">A sourced Chapter 16 flow diagram tracing electricity, grid interconnection, facility cooling, accelerators, inference scheduling, and token output with caveat bands.</desc> <rect width="1280" height="760" fill="#f6f2ea"/> <rect x="38" y="34" width="1204" height="692" rx="18" fill="#fffdf8" stroke="#26323d" stroke-width="2"/> <text x="74" y="86" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700" fill="#1f2933">Power To Token Flow</text> <text x="74" y="118" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#52616f">Chapter 16 mechanism: the visible token is the last mile of a physical stack.</text> <defs> <marker id="arrow" markerWidth="12" markerHeight="10" refX="11" refY="5" orient="auto"> <path d="M0,0 L12,5 L0,10 Z" fill="#26323d"/> </marker> <style>.label{font-family:Arial, Helvetica, sans-serif;font-size:18px;font-weight:700}.body{font-family:Arial, Helvetica, sans-serif;font-size:13.5px}.tag{font-family:Arial, Helvetica, sans-serif;font-size:12px;font-weight:700}.small{font-family:Arial, Helvetica, sans-serif;font-size:11.5px} </style> </defs> <g> <rect x="74" y="164" width="158" height="276" rx="10" fill="#e6eef1" stroke="#2d6f7e" stroke-width="2"/> <text x="94" y="198" class="label" fill="#173f48">Electricity</text> <text x="94" y="224" class="body" fill="#173f48">Global share is small;</text> <text x="94" y="244" class="body" fill="#173f48">growth is fast and</text> <text x="94" y="264" class="body" fill="#173f48">locally concentrated.</text> <rect x="94" y="332" width="116" height="44" rx="6" fill="#f8fbfc" stroke="#8bb6bf"/> <text x="108" y="351" class="tag" fill="#173f48"></text> <text x="108" y="368" class="small" fill="#52616f">IEA scenarios</text> <text x="94" y="414" class="small" fill="#52616f">Caveat: forecast range</text> </g> <line x1="232" y1="302" x2="278" y2="302" stroke="#26323d" stroke-width="2.8" marker-end="url(#arrow)"/> <g> <rect x="278" y="164" width="158" height="276" rx="10" fill="#f1e4d5" stroke="#9a6b31" stroke-width="2"/> <text x="298" y="198" class="label" fill="#5a3912">Interconnect</text> <text x="298" y="224" class="body" fill="#5a3912">Substations, studies,</text> <text x="298" y="244" class="body" fill="#5a3912">transformers, cables,</text> <text x="298" y="264" class="body" fill="#5a3912">and utility queues.</text> <rect x="298" y="332" width="116" height="44" rx="6" fill="#fffaf3" stroke="#c89b63"/> <text x="312" y="351" class="tag" fill="#5a3912">/87</text> <text x="312" y="368" class="small" fill="#6f5a42">local timing</text> <text x="298" y="414" class="small" fill="#6f5a42">Caveat: risk estimate</text> </g> <line x1="436" y1="302" x2="482" y2="302" stroke="#26323d" stroke-width="2.8" marker-end="url(#arrow)"/> <g> <rect x="482" y="164" width="158" height="276" rx="10" fill="#e6eadc" stroke="#677d3e" stroke-width="2"/> <text x="502" y="198" class="label" fill="#344829">Facility</text> <text x="502" y="224" class="body" fill="#344829">Power rooms, backup,</text> <text x="502" y="244" class="body" fill="#344829">cooling loops, water,</text> <text x="502" y="264" class="body" fill="#344829">PUE and rack density.</text> <rect x="502" y="332" width="116" height="44" rx="6" fill="#fbfcf7" stroke="#9aac7a"/> <text x="516" y="351" class="tag" fill="#344829">/88</text> <text x="516" y="368" class="small" fill="#59664a">cooling signal</text> <text x="502" y="414" class="small" fill="#59664a">Caveat: engineering gap</text> </g> <line x1="640" y1="302" x2="686" y2="302" stroke="#26323d" stroke-width="2.8" marker-end="url(#arrow)"/> <g> <rect x="686" y="164" width="158" height="276" rx="10" fill="#e7e2f1" stroke="#67558d" stroke-width="2"/> <text x="706" y="198" class="label" fill="#383059">Accelerators</text> <text x="706" y="224" class="body" fill="#383059">GPUs, CPUs, memory,</text> <text x="706" y="244" class="body" fill="#383059">racks, networks,</text> <text x="706" y="264" class="body" fill="#383059">and serving clusters.</text> <rect x="706" y="332" width="116" height="44" rx="6" fill="#fbfaff" stroke="#aaa0c9"/> <text x="720" y="351" class="tag" fill="#383059"></text> <text x="720" y="368" class="small" fill="#5d5577">company framing</text> <text x="706" y="414" class="small" fill="#5d5577">Caveat: /</text> </g> <line x1="844" y1="302" x2="890" y2="302" stroke="#26323d" stroke-width="2.8" marker-end="url(#arrow)"/> <g> <rect x="890" y="164" width="158" height="276" rx="10" fill="#f0e1e1" stroke="#965252" stroke-width="2"/> <text x="910" y="198" class="label" fill="#572727">Scheduling</text> <text x="910" y="224" class="body" fill="#572727">Utilization, latency,</text> <text x="910" y="244" class="body" fill="#572727">batching, flexibility,</text> <text x="910" y="264" class="body" fill="#572727">and grid services.</text> <rect x="910" y="332" width="116" height="44" rx="6" fill="#fff8f8" stroke="#c89797"/> <text x="924" y="351" class="tag" fill="#572727"></text> <text x="924" y="368" class="small" fill="#735050">limited examples</text> <text x="910" y="414" class="small" fill="#735050">Caveat: not routine</text> </g> <line x1="1048" y1="302" x2="1094" y2="302" stroke="#26323d" stroke-width="2.8" marker-end="url(#arrow)"/> <g> <rect x="1094" y="164" width="112" height="276" rx="10" fill="#eef0f4" stroke="#596374" stroke-width="2"/> <text x="1114" y="198" class="label" fill="#303948">Tokens</text> <text x="1114" y="224" class="body" fill="#303948">Answers,</text> <text x="1114" y="244" class="body" fill="#303948">code,</text> <text x="1114" y="264" class="body" fill="#303948">agents,</text> <text x="1114" y="284" class="body" fill="#303948">workflows.</text> <rect x="1114" y="332" width="72" height="44" rx="6" fill="#fbfcff" stroke="#9ea8b9"/> <text x="1128" y="351" class="tag" fill="#303948"></text> <text x="1128" y="368" class="small" fill="#596374">synthesis</text> <text x="1114" y="414" class="small" fill="#596374">No Wh/token</text> </g> <rect x="74" y="488" width="1132" height="108" rx="12" fill="#fff7e8" stroke="#b08a52" stroke-width="1.6"/> <text x="102" y="523" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="700" fill="#5b3d18">Caveat bands built into the figure</text> <text x="102" y="552" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#5b3d18">Scenario and forecast ranges stay attributed to IEA/LBNL/DOE. Interconnection figures are advisory evidence, not a project-delay census.</text> <text x="102" y="574" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#5b3d18">Cooling and PUE rows need engineering-specific follow-up before final design claims. NVIDIA/GTC stack language remains company framing under /.</text> <rect x="74" y="626" width="1132" height="48" rx="8" fill="#eef3f5" stroke="#9fb4bd" stroke-width="1"/> <text x="96" y="655" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#4f6470">Sources:,,,,,,,,,. Companion data: data/power_to_token_flow_i0042.tsv.</text> <text x="74" y="704" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#66707a">Use before detailed Chapter 16 quantitative claims so readers see the dependency chain before energy, rack, or grid numbers.</text>
</svg>