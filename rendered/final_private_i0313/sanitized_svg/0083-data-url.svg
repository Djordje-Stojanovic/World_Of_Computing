<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="780" viewBox="0 0 1200 780" role="img" aria-labelledby="title desc"> <title id="title">Figure 10.2 - Open-Weight Control Stack</title> <desc id="desc">A control-stack matrix separating weights, license, data transparency, hosting, safety governance, ecosystem work, and benchmark permission.</desc> <rect width="1200" height="780" fill="#f7f3ea"/> <text x="70" y="70" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#1f2933">Open-Weight Control Stack</text> <text x="70" y="106" font-family="Arial, sans-serif" font-size="17" fill="#52606d">Llama made more of the model object available, but "open" is a stack of separate permissions and burdens.</text> <g font-family="Arial, sans-serif"> <rect x="70" y="150" width="1060" height="458" rx="8" fill="#ffffff" stroke="#52606d" stroke-width="2"/> <rect x="70" y="150" width="1060" height="56" rx="8" fill="#1f2933"/> <text x="100" y="186" font-size="17" font-weight="700" fill="#ffffff">Layer</text> <text x="335" y="186" font-size="17" font-weight="700" fill="#ffffff">What access can change</text> <text x="725" y="186" font-size="17" font-weight="700" fill="#ffffff">What remains controlled or unknown</text> <g font-size="16" fill="#1f2933"> <text x="100" y="248" font-weight="700">Weights</text> <text x="335" y="248">run, adapt, quantize, fine-tune</text> <text x="725" y="248">not full training process or safety state</text> <text x="100" y="304" font-weight="700">License</text> <text x="335" y="304">commercial and research permission terms</text> <text x="725" y="304">not permissionless open source by default</text> <text x="100" y="360" font-weight="700">Data</text> <text x="335" y="360">papers and model cards explain some choices</text> <text x="725" y="360">not exact corpus, filters, or contamination</text> <text x="100" y="416" font-weight="700">Hosting</text> <text x="335" y="416">local, cloud, device, or private deployment</text> <text x="725" y="416">adopter pays inference and ops costs</text> <text x="100" y="472" font-weight="700">Safety</text> <text x="335" y="472">outside testing and wrappers become possible</text> <text x="725" y="472">no downstream safety guarantee</text> <text x="100" y="528" font-weight="700">Ecosystem</text> <text x="335" y="528">tools, serving stacks, fine-tunes, evals</text> <text x="725" y="528">not adoption, quality, or popularity proof</text> <text x="100" y="584" font-weight="700">Benchmarks</text> <text x="335" y="584">more parties can test the same object</text> <text x="725" y="584">no live-rank or price-quality crown</text> </g> <g stroke="#d7dde2" stroke-width="1"> <line x1="70" y1="266" x2="1130" y2="266"/> <line x1="70" y1="322" x2="1130" y2="322"/> <line x1="70" y1="378" x2="1130" y2="378"/> <line x1="70" y1="434" x2="1130" y2="434"/> <line x1="70" y1="490" x2="1130" y2="490"/> <line x1="70" y1="546" x2="1130" y2="546"/> <line x1="300" y1="206" x2="300" y2="608"/> <line x1="690" y1="206" x2="690" y2="608"/> </g> </g> <rect x="70" y="650" width="1060" height="64" rx="8" fill="#1f2933"/> <text x="96" y="681" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#ffffff">Blocked leap</text> <text x="224" y="681" font-family="Arial, sans-serif" font-size="16" fill="#ffffff">Open weights are not the same claim as open source, adoption, safety, benchmark superiority, or lower total cost.</text> <text x="96" y="706" font-family="Arial, sans-serif" font-size="14" fill="#d9e8e2">Source role: synthesis from Chapter 10 draft, audit, and Llama source rows,, through.</text>
</svg>