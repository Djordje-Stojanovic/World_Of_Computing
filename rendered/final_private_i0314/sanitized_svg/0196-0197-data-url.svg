<svg xmlns=" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc"> <title id="title">Figure 15.1 - AI Factory Stack</title> <desc id="desc">A sourced block diagram separating NVIDIA's AI factory framing from infrastructure layers: serving, compute, networking, data movement, facilities, and token economics.</desc> <rect width="1200" height="760" fill="#f7f4ee"/> <rect x="36" y="34" width="1128" height="692" rx="18" fill="#fffdf8" stroke="#29323d" stroke-width="2"/> <text x="70" y="84" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700" fill="#1f2933">AI Factory Stack</text> <text x="70" y="117" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#53616f">A Chapter 15 diagram: NVIDIA's stage argument on top, infrastructure layers below, caveats attached.</text> <rect x="70" y="150" width="1060" height="74" rx="10" fill="#f2dfc7" stroke="#8a5a2b" stroke-width="2"/> <text x="92" y="182" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="700" fill="#51310f">NVIDIA framing at GTC 2026</text> <text x="92" y="207" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#51310f">Inference as workload | tokens as commodity | compute as revenue</text> <text x="910" y="190" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#51310f">Company framing, not neutral proof</text> <defs> <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"> <path d="M0,0 L10,4 L0,8 Z" fill="#29323d"/> </marker> </defs> <line x1="600" y1="224" x2="600" y2="268" stroke="#29323d" stroke-width="3" marker-end="url(#arrow)"/> <g font-family="Arial, Helvetica, sans-serif"> <rect x="94" y="280" width="300" height="92" rx="8" fill="#dfecef" stroke="#2d6f7e" stroke-width="2"/> <text x="116" y="312" font-size="18" font-weight="700" fill="#173f48">Model Serving</text> <text x="116" y="339" font-size="14" fill="#173f48">Schedulers, routing, inference</text> <text x="116" y="360" font-size="14" fill="#173f48">servers, eval/safety loops</text> <rect x="450" y="280" width="300" height="92" rx="8" fill="#e7e3f3" stroke="#5f548d" stroke-width="2"/> <text x="472" y="312" font-size="18" font-weight="700" fill="#34305a">Accelerators And Memory</text> <text x="472" y="339" font-size="14" fill="#34305a">GPUs, CPUs, HBM, tensor cores,</text> <text x="472" y="360" font-size="14" fill="#34305a">rack-scale systems</text> <rect x="806" y="280" width="300" height="92" rx="8" fill="#f2e1e1" stroke="#9a4f4f" stroke-width="2"/> <text x="828" y="312" font-size="18" font-weight="700" fill="#5b2828">Networking Fabric</text> <text x="828" y="339" font-size="14" fill="#5b2828">NVLink, Ethernet/InfiniBand,</text> <text x="828" y="360" font-size="14" fill="#5b2828">scale-up and scale-out paths</text> <rect x="94" y="424" width="300" height="92" rx="8" fill="#e4efdc" stroke="#5b7c42" stroke-width="2"/> <text x="116" y="456" font-size="18" font-weight="700" fill="#344829">Data Movement</text> <text x="116" y="483" font-size="14" fill="#344829">Storage, retrieval, context,</text> <text x="116" y="504" font-size="14" fill="#344829">KV/cache and memory traffic</text> <rect x="450" y="424" width="300" height="92" rx="8" fill="#f0ead7" stroke="#81713c" stroke-width="2"/> <text x="472" y="456" font-size="18" font-weight="700" fill="#4d421e">Facility Layer</text> <text x="472" y="483" font-size="14" fill="#4d421e">Power, cooling, facilities,</text> <text x="472" y="504" font-size="14" fill="#4d421e">reference designs</text> <rect x="806" y="424" width="300" height="92" rx="8" fill="#e5e8ee" stroke="#556174" stroke-width="2"/> <text x="828" y="456" font-size="18" font-weight="700" fill="#303948">Token Economics</text> <text x="828" y="483" font-size="14" fill="#303948">Billing, utilization, latency,</text> <text x="828" y="504" font-size="14" fill="#303948">capacity finance, demand</text> </g> <line x1="394" y1="326" x2="450" y2="326" stroke="#29323d" stroke-width="2.5" marker-end="url(#arrow)"/> <line x1="750" y1="326" x2="806" y2="326" stroke="#29323d" stroke-width="2.5" marker-end="url(#arrow)"/> <line x1="244" y1="372" x2="244" y2="424" stroke="#29323d" stroke-width="2.5" marker-end="url(#arrow)"/> <line x1="600" y1="372" x2="600" y2="424" stroke="#29323d" stroke-width="2.5" marker-end="url(#arrow)"/> <line x1="956" y1="372" x2="956" y2="424" stroke="#29323d" stroke-width="2.5" marker-end="url(#arrow)"/> <rect x="96" y="570" width="1008" height="86" rx="10" fill="#fbf3e5" stroke="#b08a52" stroke-width="1.5"/> <text x="122" y="602" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700" fill="#5b3d18">Publication caveat</text> <text x="122" y="630" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#5b3d18">This figure explains the stack implied by Chapter 15 sources. It does not validate NVIDIA throughput, revenue, partner,</text> <text x="122" y="650" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#5b3d18">availability, or deployment claims without /triangulation.</text> 
</svg>