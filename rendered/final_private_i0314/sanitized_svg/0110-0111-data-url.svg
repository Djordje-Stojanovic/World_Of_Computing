<svg xmlns=" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc"> <title id="title">GPU Memory and Interconnect Schematic</title> <desc id="desc">A Chapter 14 schematic showing model shards, GPU HBM, NVLink NVSwitch communication, host orchestration, and blocked performance claims.</desc> <style>.bg{fill:#f7f4ee}.ink{fill:#1f2933;font-family:Arial,Helvetica,sans-serif}.muted{fill:#5d6470;font-family:Arial,Helvetica,sans-serif}.title{font-size:37px;font-weight:800}.sub{font-size:18px}.label{font-size:19px;font-weight:800}.small{font-size:15px}.tiny{font-size:12px}.card{fill:#fffdf7;stroke:#c8c1b5;stroke-width:2}.gpu{fill:#e7efff;stroke:#2563eb;stroke-width:3}.mem{fill:#e8f5ef;stroke:#0f8b6f;stroke-width:3}.net{fill:#fff3d8;stroke:#b7791f;stroke-width:3}.risk{fill:#fff0ec;stroke:#c2412d;stroke-width:3}.line{fill:none;stroke:#1f2933;stroke-width:4}.fast{fill:none;stroke:#b7791f;stroke-width:7;stroke-linecap:round}.arrow{fill:none;stroke:#1f2933;stroke-width:4;marker-end:url(#arrow)} </style> <defs><marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 Z" fill="#1f2933"/></marker></defs> <rect class="bg" width="1200" height="760"/> <text class="ink title" x="56" y="72">GPU Memory and Interconnect: The Traffic Pattern</text> <text class="muted sub" x="56" y="108">Large-model training and serving depend on memory locality and GPU-to-GPU communication, not arithmetic alone.</text> <rect class="card" x="70" y="155" width="210" height="110" rx="8"/> <text class="ink label" x="103" y="197">Host CPU</text> <text class="muted small" x="103" y="226">orchestration, loading,</text> <text class="muted small" x="103" y="247">scheduling, I/O</text> <path class="arrow" d="M285 210 H360"/> <rect class="net" x="380" y="145" width="445" height="58" rx="8"/> <text class="ink label" x="420" y="181">NVLink / NVSwitch fabric</text> <text class="muted tiny" x="635" y="181">qualitative interconnect lane</text> <rect class="gpu" x="360" y="250" width="205" height="150" rx="8"/> <rect class="mem" x="385" y="278" width="155" height="40" rx="6"/><text class="ink small" x="426" y="304">HBM</text> <text class="ink label" x="402" y="350">GPU 1</text><text class="muted small" x="395" y="376">model shard / KV</text> <rect class="gpu" x="635" y="250" width="205" height="150" rx="8"/> <rect class="mem" x="660" y="278" width="155" height="40" rx="6"/><text class="ink small" x="701" y="304">HBM</text> <text class="ink label" x="677" y="350">GPU 2</text><text class="muted small" x="670" y="376">model shard / KV</text> <rect class="gpu" x="360" y="455" width="205" height="150" rx="8"/> <rect class="mem" x="385" y="483" width="155" height="40" rx="6"/><text class="ink small" x="426" y="509">HBM</text> <text class="ink label" x="402" y="555">GPU 3</text><text class="muted small" x="395" y="581">gradients / activations</text> <rect class="gpu" x="635" y="455" width="205" height="150" rx="8"/> <rect class="mem" x="660" y="483" width="155" height="40" rx="6"/><text class="ink small" x="701" y="509">HBM</text> <text class="ink label" x="677" y="555">GPU 4</text><text class="muted small" x="670" y="581">requests / batches</text> <path class="fast" d="M565 325 H635"/><path class="fast" d="M565 530 H635"/><path class="fast" d="M463 400 V455"/><path class="fast" d="M738 400 V455"/> <path class="arrow" d="M825 210 H920"/> <rect class="risk" x="915" y="250" width="215" height="210" rx="8"/> <text class="ink label" x="945" y="290">Blocked</text> <text class="muted small" x="945" y="322">No bandwidth, speedup,</text> <text class="muted small" x="945" y="346">all-GPUs-as-one,</text> <text class="muted small" x="945" y="370">benchmark, supply,</text> <text class="muted small" x="945" y="394">or deployment claim.</text> <rect class="card" x="100" y="660" width="1000" height="52" rx="8"/> 
</svg>