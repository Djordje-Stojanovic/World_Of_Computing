<svg xmlns=" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc"> <title id="title">Web Corpus Filter Funnel</title> <desc id="desc">A Chapter 17 funnel showing Common Crawl style web text flowing through filtering, deduplication, documentation, and blocked legal or cleanliness claims.</desc> <style>.bg{fill:#f7f4ee}.ink{fill:#1f2933;font-family:Arial,Helvetica,sans-serif}.muted{fill:#5d6470;font-family:Arial,Helvetica,sans-serif}.title{font-size:38px;font-weight:800}.sub{font-size:19px}.label{font-size:21px;font-weight:800}.small{font-size:15px}.tiny{font-size:12px}.data{fill:#e8f5ef;stroke:#0f8b6f;stroke-width:3}.filter{fill:#fff3d8;stroke:#b7791f;stroke-width:3}.risk{fill:#fff0ec;stroke:#c2412d;stroke-width:3}.box{fill:#fffdf7;stroke:#c8c1b5;stroke-width:2}.line{fill:none;stroke:#1f2933;stroke-width:4;marker-end:url(#arrow)} </style> <defs><marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 Z" fill="#1f2933"/></marker></defs> <rect class="bg" width="1200" height="760"/> <text class="ink title" x="60" y="72">Web Corpus Filter Funnel</text> <text class="muted sub" x="60" y="108">Common Crawl style data becomes training material only after many non-neutral decisions.</text> <rect class="data" x="110" y="160" width="980" height="80" rx="8"/><text class="ink label" x="145" y="195">Open-web ocean</text><text class="muted small" x="145" y="220">pages, forums, code, spam, boilerplate, mirrors, documents, and fragments</text> <path class="line" d="M600 242 V285"/> <rect class="filter" x="190" y="285" width="820" height="78" rx="8"/><text class="ink label" x="225" y="318">Crawl-derived corpus</text><text class="muted small" x="225" y="343">C4 / FineWeb style processing: language, quality, safety, format, and source filters</text> <path class="line" d="M600 365 V408"/> <rect class="filter" x="285" y="408" width="630" height="78" rx="8"/><text class="ink label" x="320" y="441">Deduplicate + document</text><text class="muted small" x="320" y="466">remove echoes, record recipes, expose notes where possible</text> <path class="line" d="M600 488 V531"/> <rect class="data" x="380" y="531" width="440" height="78" rx="8"/><text class="ink label" x="420" y="564">Training mixture candidate</text><text class="muted small" x="420" y="589">usable only with caveats and audit trails</text> <rect class="risk" x="85" y="432" width="160" height="120" rx="8"/><text class="ink small" x="110" y="462">Blocked</text><text class="muted tiny" x="110" y="486">"clean" means</text><text class="muted tiny" x="110" y="506">legal/ethical/true</text> <rect class="risk" x="955" y="432" width="160" height="120" rx="8"/><text class="ink small" x="980" y="462">Blocked</text><text class="muted tiny" x="980" y="486">exact closed-lab</text><text class="muted tiny" x="980" y="506">corpus shares</text> <rect class="box" x="115" y="660" width="970" height="52" rx="8"/> 
</svg>