<svg xmlns=" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc"> <title id="title">Figure 10.1 - Llama Family Open-Weight Map</title> <desc id="desc">Release-and-claim map for LLaMA, Llama 2, Code Llama, Llama 3, Llama 3.1, and Llama 4 with source and caveat bands.</desc> <rect width="1200" height="760" fill="#f7f7f2"/> <text x="60" y="62" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#161616">Figure 10.1 - Llama Family Open-Weight Map</text> <text x="60" y="96" font-family="Arial, sans-serif" font-size="16" fill="#444">A release chronology and permission map, not a benchmark ranking.</text> <line x1="120" y1="205" x2="1080" y2="205" stroke="#222" stroke-width="3"/> <g font-family="Arial, sans-serif"> <circle cx="140" cy="205" r="12" fill="#246bfe"/> <text x="105" y="170" font-size="18" font-weight="700" fill="#111">LLaMA</text> <text x="86" y="232" font-size="13" fill="#333">2023 research</text> <text x="94" y="250" font-size="13" fill="#333">release</text> <text x="94" y="272" font-size="12" fill="#666"></text> <circle cx="300" cy="205" r="12" fill="#246bfe"/> <text x="265" y="170" font-size="18" font-weight="700" fill="#111">Llama 2</text> <text x="238" y="232" font-size="13" fill="#333">open foundation</text> <text x="257" y="250" font-size="13" fill="#333">and chat</text> <text x="274" y="272" font-size="12" fill="#666"></text> <circle cx="470" cy="205" r="12" fill="#7856ff"/> <text x="426" y="170" font-size="18" font-weight="700" fill="#111">Code Llama</text> <text x="420" y="232" font-size="13" fill="#333">code-specialized</text> <text x="450" y="250" font-size="13" fill="#333">branch</text> <text x="444" y="272" font-size="12" fill="#666"></text> <circle cx="640" cy="205" r="12" fill="#246bfe"/> <text x="604" y="170" font-size="18" font-weight="700" fill="#111">Llama 3</text> <text x="604" y="232" font-size="13" fill="#333">herd / safety</text> <text x="618" y="250" font-size="13" fill="#333">models</text> <text x="613" y="272" font-size="12" fill="#666"></text> <circle cx="810" cy="205" r="12" fill="#246bfe"/> <text x="769" y="170" font-size="18" font-weight="700" fill="#111">Llama 3.1</text> <text x="760" y="232" font-size="13" fill="#333">large open-weight</text> <text x="781" y="250" font-size="13" fill="#333">strategy</text> <text x="783" y="272" font-size="12" fill="#666"></text> <circle cx="990" cy="205" r="12" fill="#0b8f6a"/> <text x="954" y="170" font-size="18" font-weight="700" fill="#111">Llama 4</text> <text x="937" y="232" font-size="13" fill="#333">multimodal / MoE</text> <text x="966" y="250" font-size="13" fill="#333">turn</text> <text x="963" y="272" font-size="12" fill="#666"></text> </g> <g font-family="Arial, sans-serif"> <rect x="80" y="330" width="1040" height="74" rx="8" fill="#ffffff" stroke="#d4d1c8"/> <text x="105" y="358" font-size="18" font-weight="700" fill="#111">What the map permits</text> <text x="105" y="385" font-size="15" fill="#333">Chronology, family branches, Sources, and release-surface changes: research access, open weights, code branch, herd, large-model strategy, multimodal/MoE turn.</text> <rect x="80" y="430" width="1040" height="104" rx="8" fill="#fff8e6" stroke="#e2bd55"/> <text x="105" y="460" font-size="18" font-weight="700" fill="#111">What it blocks</text> <text x="105" y="488" font-size="15" fill="#333">No vertical or horizontal position means model quality. No generic "open source" shorthand. No benchmark, price-quality, adoption, safety, or enterprise-use superlatives.</text> <text x="105" y="513" font-size="15" fill="#333">License terms, weights, training data, safety controls, and ecosystem activity are separate claim families.</text> <rect x="80" y="560" width="1040" height="98" rx="8" fill="#ecf4ff" stroke="#92afd1"/> <text x="105" y="590" font-size="18" font-weight="700" fill="#111">Next visual layer</text> <text x="105" y="618" font-size="15" fill="#333">A later license-and-ecosystem matrix should split release object, commercial terms, training-data visibility, safety model, hosting burden, and downstream adaptation.</text> </g> 
</svg>