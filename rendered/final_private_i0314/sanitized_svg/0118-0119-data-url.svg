<svg xmlns=" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc"> <title id="title">Chapter 9 benchmark and adoption blocker grid</title> <desc id="desc">A grid separating supported Chapter 9 Google/Gemini claims from blocked benchmark, adoption, revenue, search economics, and TPU performance claims.</desc> <rect width="1200" height="760" fill="#fbfaf7"/> <text x="64" y="72" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#202124">The Tempting Gemini Claims Need Different Evidence</text> <text x="64" y="108" font-family="Arial, sans-serif" font-size="17" fill="#4b5563">This chapter can show conversion mechanisms; it cannot turn product posts into market proof.</text> <g font-family="Arial, sans-serif"> <rect x="64" y="156" width="502" height="92" rx="9" fill="#e6f4ea" stroke="#34a853" stroke-width="3"/> <text x="92" y="192" font-size="21" font-weight="700" fill="#137333">Supported in Chapter 9</text> <text x="92" y="222" font-size="15" fill="#374151">Transformer roots, PaLM/Pathways, Bard as Search complement, Gemini family, long context, TPU framing, thinking product language.</text> <rect x="634" y="156" width="502" height="92" rx="9" fill="#fce8e6" stroke="#ea4335" stroke-width="3"/> <text x="662" y="192" font-size="21" font-weight="700" fill="#a50e0e">Still blocked</text> <text x="662" y="222" font-size="15" fill="#374151">Benchmark superiority, adoption, revenue, Search-click effects, productivity, cloud share, and TPU cost/performance.</text> <g> <rect x="64" y="302" width="256" height="150" rx="8" fill="#fff" stroke="#d1d5db" stroke-width="2"/> <text x="92" y="338" font-size="19" font-weight="700" fill="#202124">Benchmarks</text> <text x="92" y="370" font-size="14" fill="#374151">Allowed: Google made model</text> <text x="92" y="392" font-size="14" fill="#374151">update and thinking claims.</text>  </g> <g> <rect x="344" y="302" width="256" height="150" rx="8" fill="#fff" stroke="#d1d5db" stroke-width="2"/> <text x="372" y="338" font-size="19" font-weight="700" fill="#202124">Adoption</text> <text x="372" y="370" font-size="14" fill="#374151">Allowed: product surfaces</text> <text x="372" y="392" font-size="14" fill="#374151">and access paths existed.</text>  </g> <g> <rect x="624" y="302" width="256" height="150" rx="8" fill="#fff" stroke="#d1d5db" stroke-width="2"/> <text x="652" y="338" font-size="19" font-weight="700" fill="#202124">Economics</text> <text x="652" y="370" font-size="14" fill="#374151">Allowed: route-to-market</text> <text x="652" y="392" font-size="14" fill="#374151">and pricing pages as handles.</text>  </g> <g> <rect x="904" y="302" width="232" height="150" rx="8" fill="#fff" stroke="#d1d5db" stroke-width="2"/> <text x="932" y="338" font-size="19" font-weight="700" fill="#202124">Search gravity</text> <text x="932" y="370" font-size="14" fill="#374151">Allowed: conceptual</text> <text x="932" y="392" font-size="14" fill="#374151">interface tension.</text>  </g> <g> <rect x="64" y="496" width="1072" height="112" rx="9" fill="#f1f3f4" stroke="#5f6368" stroke-width="2"/> <text x="92" y="536" font-size="21" font-weight="700" fill="#202124">Evidence needed before upgrade</text> <text x="92" y="568" font-size="15" fill="#374151">Same-scope benchmark rows, customer-side adoption or productivity evidence, filings or normalized third-party data, Search economics measurements, and hardware rows that compare TPU/GPU cost or performance.</text> </g> </g> <rect x="64" y="654" width="1072" height="48" rx="8" fill="#111827"/> 
</svg>