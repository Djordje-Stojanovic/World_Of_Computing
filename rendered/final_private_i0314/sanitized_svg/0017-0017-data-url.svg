<svg xmlns=" width="1400" height="860" viewBox="0 0 1400 860" role="img" aria-labelledby="title desc"> <title id="title">How Arena Rows Become Rank Claims</title> <desc id="desc">A sourced methodology flow showing how Arena-style human votes become filtered, date-labeled rank rows with uncertainty and caveats before chart use.</desc> <style>.bg{fill:#f7f5ef}.panel{fill:#fffdf7;stroke:#d8d2c5;stroke-width:2}.panel2{fill:#eef5f3;stroke:#216869;stroke-width:2}.gate{fill:#fff4e8;stroke:#8f5d46;stroke-width:2}.ink{fill:#151515;font-family:Arial,Helvetica,sans-serif}.muted{fill:#5e5a52;font-family:Arial,Helvetica,sans-serif}.title{font-size:42px;font-weight:800}.subtitle{font-size:24px}.step{font-size:28px;font-weight:800}.body{font-size:22px}.tiny{font-size:19px}.src{font-size:18px;font-weight:700;fill:#216869;font-family:Arial,Helvetica,sans-serif}.arrow{stroke:#151515;stroke-width:4;stroke-linecap:round;stroke-linejoin:round;fill:none}.caveat{fill:#8f5d46;font-size:19px;font-family:Arial,Helvetica,sans-serif}.tick{stroke:#151515;stroke-width:3;stroke-linecap:round}.ci{stroke:#216869;stroke-width:6;stroke-linecap:round}.dot{fill:#216869} </style> <rect class="bg" width="1400" height="860"/> <text x="70" y="74" class="ink title">How Arena Rows Become Rank Claims</text> <text x="70" y="114" class="muted subtitle">A method diagram for Chapter 13. Source spine:,,,,.</text> <text x="70" y="152" class="muted tiny">Use before reading Figure 13.x: ranks are filtered, date-bound evidence rows, not eternal model truth.</text> <rect x="70" y="205" width="220" height="210" rx="8" class="panel"/> <text x="95" y="248" class="ink step">1. Votes</text> <text x="95" y="288" class="ink body">Human preference</text> <text x="95" y="318" class="ink body">judgments enter</text> <text x="95" y="348" class="ink body">the arena pool.</text> <text x="95" y="384" class="src"></text> <path d="M305 310 H365" class="arrow"/> <path d="M365 310 l-16 -12 M365 310 l-16 12" class="arrow"/> <rect x="380" y="205" width="240" height="210" rx="8" class="panel"/> <text x="405" y="248" class="ink step">2. Filter</text> <text x="405" y="288" class="ink body">Config, split,</text> <text x="405" y="318" class="ink body">category, and date</text> <text x="405" y="348" class="ink body">select the row set.</text> <text x="405" y="384" class="src"></text> <path d="M635 310 H695" class="arrow"/> <path d="M695 310 l-16 -12 M695 310 l-16 12" class="arrow"/> <rect x="710" y="205" width="255" height="210" rx="8" class="panel2"/> <text x="735" y="248" class="ink step">3. Rating</text> <text x="735" y="288" class="ink body">Rows carry a rating</text> <text x="735" y="318" class="ink body">plus lower / upper</text> <text x="735" y="348" class="ink body">bounds.</text> <line x1="765" y1="382" x2="910" y2="382" class="ci"/> <line x1="765" y1="370" x2="765" y2="394" class="tick"/> <line x1="910" y1="370" x2="910" y2="394" class="tick"/> <circle cx="842" cy="382" r="8" class="dot"/> <path d="M980 310 H1040" class="arrow"/> <path d="M1040 310 l-16 -12 M1040 310 l-16 12" class="arrow"/> <rect x="1055" y="205" width="275" height="210" rx="8" class="panel"/> <text x="1080" y="248" class="ink step">4. Snapshot</text> <text x="1080" y="288" class="ink body">Published date and</text> <text x="1080" y="318" class="ink body">local snapshot make</text> <text x="1080" y="348" class="ink body">the row auditable.</text> <text x="1080" y="384" class="src">2026-05-19 / </text> <rect x="160" y="505" width="1080" height="170" rx="8" class="gate"/> <text x="195" y="550" class="ink step">5. Chart Permission Gate</text> <text x="195" y="592" class="ink body">Allowed: date-labeled historical leaderboard visuals with config, split, category, source ID, snapshot ID, and uncertainty.</text>  <text x="195" y="660" class="src"></text> <path d="M1192 430 V488" class="arrow"/> <path d="M1192 488 l-12 -16 M1192 488 l12 -16" class="arrow"/> <text x="70" y="742" class="muted tiny">Caption: Figure 13.y - Arena methodology flow. Companion rows: data/leaderboard_methodology_i0039.tsv.</text> <text x="70" y="774" class="muted tiny">This figure explains the evidence pipeline behind the historical LMArena chart; it does not add new rank, price, or release-status claims.</text>
</svg>