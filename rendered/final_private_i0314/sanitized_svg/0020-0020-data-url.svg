<svg xmlns=" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc"> <title id="title">Chapter 19 coding benchmark ladder</title> <desc id="desc">A ladder diagram separating small code generation, contest programming, repository repair, and live contamination-aware benchmarks, with an inference-contract caution.</desc> <rect width="1200" height="760" fill="#fbfaf7"/> <text x="64" y="72" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#202124">Coding Scores Need A Harness Story</text> <text x="64" y="108" font-family="Arial, sans-serif" font-size="17" fill="#4b5563">Code evaluation moved from small functions toward contests, repository issues, repair, and contamination-aware task streams.</text> <g font-family="Arial, sans-serif"> <rect x="94" y="170" width="242" height="112" rx="9" fill="#e8f0fe" stroke="#4285f4" stroke-width="3"/> <text x="215" y="208" text-anchor="middle" font-size="20" font-weight="700" fill="#174ea6">Small functions</text> <text x="215" y="238" text-anchor="middle" font-size="14" fill="#374151">HumanEval-style code synthesis</text> <text x="215" y="262" text-anchor="middle" font-size="13" fill="#374151"></text> <rect x="354" y="252" width="242" height="112" rx="9" fill="#e6f4ea" stroke="#34a853" stroke-width="3"/> <text x="475" y="290" text-anchor="middle" font-size="20" font-weight="700" fill="#137333">Contest systems</text> <text x="475" y="320" text-anchor="middle" font-size="14" fill="#374151">Generate, filter, rank, judge</text> <text x="475" y="344" text-anchor="middle" font-size="13" fill="#374151"></text> <rect x="614" y="334" width="242" height="112" rx="9" fill="#fef7e0" stroke="#fbbc04" stroke-width="3"/> <text x="735" y="372" text-anchor="middle" font-size="20" font-weight="700" fill="#8a5a00">Repository repair</text> <text x="735" y="402" text-anchor="middle" font-size="14" fill="#374151">Real issues in existing repos</text> <text x="735" y="426" text-anchor="middle" font-size="13" fill="#374151"></text> <rect x="874" y="416" width="242" height="112" rx="9" fill="#fce8e6" stroke="#ea4335" stroke-width="3"/> <text x="995" y="454" text-anchor="middle" font-size="20" font-weight="700" fill="#a50e0e">Fresh task streams</text> <text x="995" y="484" text-anchor="middle" font-size="14" fill="#374151">Repair, execution, contamination pressure</text> <text x="995" y="508" text-anchor="middle" font-size="13" fill="#374151"></text> <line x1="336" y1="226" x2="354" y2="282" stroke="#1f2937" stroke-width="3"/> <line x1="596" y1="308" x2="614" y2="364" stroke="#1f2937" stroke-width="3"/> <line x1="856" y1="390" x2="874" y2="446" stroke="#1f2937" stroke-width="3"/> <rect x="116" y="594" width="968" height="74" rx="9" fill="#111827"/> <text x="600" y="626" text-anchor="middle" font-size="19" font-weight="700" fill="#ffffff">Inference contract before comparison</text> <text x="600" y="654" text-anchor="middle" font-size="15" fill="#ffffff">Model, date, task set, scaffold, tool access, attempts, budget, tests, and contamination Limit.</text> </g> 
</svg>