<svg xmlns=" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc"> <title id="title">Chapter 21 Verifier and Search Loop</title> <desc id="desc">Loop diagram showing prompt, candidate reasoning paths, verifier, tool/action observation, and selected answer.</desc> <rect width="1200" height="760" fill="#f8fafc"/> <text x="70" y="72" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#0f172a">Reasoning is a loop, not a magic thought bubble</text> <text x="70" y="108" font-family="Arial, sans-serif" font-size="17" fill="#475569">Extra inference work can happen across samples, tools, verifiers, and observations.</text> <defs> <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"> <path d="M0,0 L0,6 L9,3 z" fill="#334155"/> </marker> </defs> <g font-family="Arial, sans-serif"> <rect x="80" y="305" width="180" height="105" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="3"/> <text x="115" y="348" font-size="21" font-weight="700" fill="#1e3a8a">Prompt</text> <text x="115" y="378" font-size="15" fill="#1f2937">task + context</text> <path d="M265 357 H345" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/> <rect x="350" y="240" width="230" height="235" rx="8" fill="#ffffff" stroke="#d97706" stroke-width="3"/> <text x="380" y="280" font-size="21" font-weight="700" fill="#78350f">Candidate paths</text> <text x="380" y="315" font-size="15" fill="#1f2937">chain-of-thought</text> <text x="380" y="342" font-size="15" fill="#1f2937">self-consistency samples</text> <text x="380" y="369" font-size="15" fill="#1f2937">tree/search branches</text> <text x="380" y="396" font-size="15" fill="#1f2937">tool/action steps</text> <text x="380" y="440" font-size="13" fill="#6b7280"></text> <path d="M585 357 H665" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/> <rect x="670" y="240" width="210" height="105" rx="8" fill="#ffffff" stroke="#16a34a" stroke-width="3"/> <text x="710" y="282" font-size="21" font-weight="700" fill="#14532d">Verifier</text> <text x="710" y="313" font-size="15" fill="#1f2937">score steps or answers</text> <path d="M775 350 V430" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/> <rect x="670" y="435" width="210" height="105" rx="8" fill="#ffffff" stroke="#7c3aed" stroke-width="3"/> <text x="710" y="477" font-size="21" font-weight="700" fill="#4c1d95">Observe</text> <text x="710" y="508" font-size="15" fill="#1f2937">tool, test, search, judge</text> <path d="M665 488 C600 570 455 570 465 480" fill="none" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/> <path d="M885 357 H965" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/> <rect x="970" y="305" width="160" height="105" rx="8" fill="#ffffff" stroke="#111827" stroke-width="3"/> <text x="1005" y="348" font-size="21" font-weight="700" fill="#111827">Answer</text> <text x="1005" y="378" font-size="15" fill="#1f2937">selected output</text> <rect x="80" y="585" width="1050" height="66" rx="8" fill="#111827"/>  <text x="190" y="625" font-size="16" fill="#fef3c7">majority agreement, verifier score, or long rationale does not guarantee truth, faithful explanation, or broad planning reliability.</text> </g> 
</svg>