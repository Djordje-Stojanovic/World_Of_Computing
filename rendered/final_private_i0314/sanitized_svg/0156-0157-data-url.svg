<svg xmlns=" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc"> <title id="title">Claude Model-Family Timeline</title> <desc id="desc">A cutoff-bounded Claude product-family timeline with caveats against benchmark, adoption, pricing, and productivity claims.</desc> <rect width="1200" height="720" fill="#f8f6f2"/> <text x="70" y="70" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#19212b">Claude becomes a product family</text> <text x="70" y="108" font-family="Arial, sans-serif" font-size="16" fill="#53606f">Launch surfaces and product positioning, not a leaderboard or price-quality chart.</text> <line x1="110" y1="340" x2="1090" y2="340" stroke="#263b54" stroke-width="5"/> <g font-family="Arial, sans-serif"> <g transform="translate(120,0)"> <circle cx="0" cy="340" r="18" fill="#d66b43"/> <rect x="-65" y="190" width="150" height="96" rx="8" fill="#ffffff" stroke="#d66b43" stroke-width="2"/> <text x="-45" y="225" font-size="18" font-weight="700" fill="#19212b">Claude 3</text> <text x="-45" y="253" font-size="13" fill="#53606f">Haiku / Sonnet / Opus</text> <text x="-45" y="273" font-size="12" fill="#53606f"></text> </g> <g transform="translate(360,0)"> <circle cx="0" cy="340" r="18" fill="#3f7c85"/> <rect x="-65" y="392" width="160" height="100" rx="8" fill="#ffffff" stroke="#3f7c85" stroke-width="2"/> <text x="-45" y="428" font-size="18" font-weight="700" fill="#19212b">Claude 3.5</text> <text x="-45" y="456" font-size="13" fill="#53606f">Sonnet workhorse</text> <text x="-45" y="476" font-size="12" fill="#53606f"></text> </g> <g transform="translate(600,0)"> <circle cx="0" cy="340" r="18" fill="#8a6f2a"/> <rect x="-80" y="190" width="180" height="104" rx="8" fill="#ffffff" stroke="#8a6f2a" stroke-width="2"/> <text x="-58" y="225" font-size="18" font-weight="700" fill="#19212b">Computer use</text> <text x="-58" y="253" font-size="13" fill="#53606f">Chat toward UI action</text> <text x="-58" y="273" font-size="12" fill="#53606f"></text> </g> <g transform="translate(820,0)"> <circle cx="0" cy="340" r="18" fill="#5c6b9f"/> <rect x="-82" y="392" width="190" height="104" rx="8" fill="#ffffff" stroke="#5c6b9f" stroke-width="2"/> <text x="-60" y="428" font-size="18" font-weight="700" fill="#19212b">Claude 3.7</text> <text x="-60" y="456" font-size="13" fill="#53606f">Hybrid reasoning + Code</text> <text x="-60" y="476" font-size="12" fill="#53606f"></text> </g> <g transform="translate(1040,0)"> <circle cx="0" cy="340" r="18" fill="#ad4e69"/> <rect x="-88" y="190" width="176" height="104" rx="8" fill="#ffffff" stroke="#ad4e69" stroke-width="2"/> <text x="-65" y="225" font-size="18" font-weight="700" fill="#19212b">Claude 4</text> <text x="-65" y="253" font-size="13" fill="#53606f">Opus 4 / Sonnet 4</text> <text x="-65" y="273" font-size="12" fill="#53606f"></text> </g> <rect x="70" y="590" width="1060" height="62" rx="8" fill="#19212b"/>  </g>
</svg>