<svg xmlns=" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc"> <title id="title">GTC Page 51 DSX Platform Claim Card</title> <desc id="desc">A lightweight Chapter 15 claim card derived from GTC 2026 keynote page 51, labeling DSX as NVIDIA reference-design and platform framing.</desc> <style>.bg{fill:#f5f6ef}.ink{fill:#20242a}.muted{fill:#5f6872}.panel{fill:#fff;stroke:#222831;stroke-width:2}.tag{fill:#dbeef3;stroke:#2b6573;stroke-width:2}.block{fill:#f4d7ca;stroke:#a14f34;stroke-width:2}.title{font-family:Arial,Helvetica,sans-serif;font-size:38px;font-weight:700}.label{font-family:Arial,Helvetica,sans-serif;font-size:25px;font-weight:700}.small{font-family:Arial,Helvetica,sans-serif;font-size:20px}.note{font-family:Arial,Helvetica,sans-serif;font-size:17px;fill:#5f6872}</style> <rect class="bg" width="1200" height="720"/><text class="title ink" x="60" y="70">GTC Page 51: DSX Platform Frame</text> <rect class="panel" x="70" y="150" width="500" height="350" rx="8"/><text class="label ink" x="105" y="205">What the slide can show</text><text class="small ink" x="105" y="255">NVIDIA presented DSX as an</text><text class="small ink" x="105" y="292">AI factory platform spanning</text><text class="small ink" x="105" y="329">systems, facilities, software,</text><text class="small ink" x="105" y="366">cooling, and power.</text> <rect class="tag" x="650" y="150" width="420" height="130" rx="8"/><text class="label ink" x="690" y="205">Allowed label</text><text class="small ink" x="690" y="245">announced; reference design</text> <rect class="block" x="650" y="330" width="420" height="170" rx="8"/><text class="label ink" x="690" y="385">Blocked leap</text><text class="small ink" x="690" y="427">Do not imply deployment scale</text><text class="small ink" x="690" y="462">or facility performance.</text> 
</svg>