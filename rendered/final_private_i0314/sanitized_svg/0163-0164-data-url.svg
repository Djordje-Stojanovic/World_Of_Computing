<svg xmlns=" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc"> <title id="title">Tool-Call Lifecycle</title> <desc id="desc">A Chapter 20 visual showing how a coding-agent tool call moves from proposal to permission, execution, observation, retry, and review.</desc> <style>.bg{fill:#f7f5ef}.ink{fill:#20242a}.muted{fill:#5e6670}.box{fill:#fff;stroke:#242a31;stroke-width:2}.perm{fill:#f3ead7;stroke:#9a6b20;stroke-width:3}.tool{fill:#e7f3ed;stroke:#32745c;stroke-width:3}.obs{fill:#e7eff8;stroke:#2f6392;stroke-width:3}.deny{fill:#f7e5dc;stroke:#a14f34;stroke-width:3}.line{stroke:#3f4650;stroke-width:3;fill:none;marker-end:url(#arrow)}.dash{stroke:#3f4650;stroke-width:3;fill:none;stroke-dasharray:8 7;marker-end:url(#arrow)}.title{font-family:Arial,Helvetica,sans-serif;font-size:38px;font-weight:700}.label{font-family:Arial,Helvetica,sans-serif;font-size:23px;font-weight:700}.small{font-family:Arial,Helvetica,sans-serif;font-size:17px}.tiny{font-family:Arial,Helvetica,sans-serif;font-size:14px}</style> <defs><marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 Z" fill="#3f4650"/></marker></defs> <rect class="bg" width="1200" height="760"/><text class="title ink" x="60" y="72">Tool-Call Lifecycle</text><text class="small muted" x="60" y="108">Agentic coding turns safety into an action-Limit problem: what may the model read, edit, run, and retry?</text> <rect class="box" x="70" y="178" width="180" height="105" rx="8"/><text class="label ink" x="105" y="220">Propose</text><text class="small muted" x="100" y="250">model asks to</text><text class="small muted" x="100" y="274">read/edit/run</text> <rect class="perm" x="315" y="178" width="190" height="105" rx="8"/><text class="label ink" x="350" y="220">Permission</text><text class="small muted" x="348" y="250">user or policy</text><text class="small muted" x="348" y="274">sets Limit</text> <rect class="tool" x="570" y="178" width="180" height="105" rx="8"/><text class="label ink" x="620" y="220">Execute</text><text class="small muted" x="605" y="250">file change,</text><text class="small muted" x="605" y="274">test, command</text> <rect class="obs" x="815" y="178" width="180" height="105" rx="8"/><text class="label ink" x="865" y="220">Observe</text><text class="small muted" x="850" y="250">diff, output,</text><text class="small muted" x="850" y="274">failure trace</text> <path class="line" d="M250 230 H310"/><path class="line" d="M505 230 H565"/><path class="line" d="M750 230 H810"/> <rect class="box" x="390" y="410" width="205" height="105" rx="8"/><text class="label ink" x="445" y="452">Retry</text><text class="small muted" x="425" y="482">revise plan or</text><text class="small muted" x="425" y="506">ask for scope</text> <rect class="deny" x="670" y="410" width="235" height="105" rx="8"/><text class="label ink" x="720" y="452">Review</text><text class="small muted" x="705" y="482">human owns final</text><text class="small muted" x="705" y="506">diff and risk</text> <path class="dash" d="M905 284 C900 370 650 438 600 458"/><path class="line" d="M595 462 H665"/> <rect class="deny" x="70" y="610" width="1060" height="78" rx="8"/><text class="small ink" x="100" y="650">Blocked leap: permission prompts and sandboxing do not prove universal safety; they define auditable control points.</text>
</svg>