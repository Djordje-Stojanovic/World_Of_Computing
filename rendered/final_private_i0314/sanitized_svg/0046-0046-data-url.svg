<svg xmlns=" width="1200" height="780" viewBox="0 0 1200 780" role="img" aria-labelledby="title desc"> <title id="title">Figure 24.2 - Five Conversion Gates</title> <desc id="desc">Five overlapping gates show prediction to interface, interface to product, model to platform, compute to infrastructure, and fluency to trust, with blockers that these are pressures rather than completed stages.</desc> <rect width="1200" height="780" fill="#f4f1e8"/> <text x="72" y="70" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#1f2933">Five Conversion Gates</text> <text x="72" y="106" font-family="Arial, sans-serif" font-size="17" fill="#52606d">The final chapter reads the race as overlapping conversions, not a clean timeline or a forecast.</text> <g font-family="Arial, sans-serif"> <rect x="86" y="188" width="190" height="250" rx="8" fill="#d9e8e2" stroke="#52606d" stroke-width="2"/> <rect x="286" y="230" width="190" height="250" rx="8" fill="#e8dfca" stroke="#52606d" stroke-width="2"/> <rect x="486" y="188" width="190" height="250" rx="8" fill="#d7e2ef" stroke="#52606d" stroke-width="2"/> <rect x="686" y="230" width="190" height="250" rx="8" fill="#f2d5c4" stroke="#52606d" stroke-width="2"/> <rect x="886" y="188" width="190" height="250" rx="8" fill="#e7d9ed" stroke="#52606d" stroke-width="2"/> <g font-size="23" font-weight="700" fill="#1f2933"> <text x="181" y="250" text-anchor="middle">prediction</text> <text x="181" y="282" text-anchor="middle">to interface</text> <text x="381" y="292" text-anchor="middle">interface</text> <text x="381" y="324" text-anchor="middle">to product</text> <text x="581" y="250" text-anchor="middle">model</text> <text x="581" y="282" text-anchor="middle">to platform</text> <text x="781" y="292" text-anchor="middle">compute</text> <text x="781" y="324" text-anchor="middle">to infrastructure</text> <text x="981" y="250" text-anchor="middle">fluency</text> <text x="981" y="282" text-anchor="middle">to trust work</text> </g> <g font-size="15" fill="#3e4c59"> <text x="181" y="352" text-anchor="middle">token objective becomes</text> <text x="181" y="374" text-anchor="middle">usable conversation</text> <text x="381" y="394" text-anchor="middle">chat windows become</text> <text x="381" y="416" text-anchor="middle">services and workflows</text> <text x="581" y="352" text-anchor="middle">models become APIs,</text> <text x="581" y="374" text-anchor="middle">clouds, and ecosystems</text> <text x="781" y="394" text-anchor="middle">capacity becomes</text> <text x="781" y="416" text-anchor="middle">power, cooling, routing</text> <text x="981" y="352" text-anchor="middle">answers require</text> <text x="981" y="374" text-anchor="middle">notes and audit</text> </g> </g> <path d="M280 540 C365 590, 435 590, 520 540 S675 490, 760 540 S915 590, 1000 540" fill="none" stroke="#52606d" stroke-width="4"/> <text x="600" y="602" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#1f2933">These gates overlap and feed back into one another.</text> <rect x="80" y="650" width="1040" height="64" rx="8" fill="#1f2933"/> <text x="104" y="681" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#ffffff">Blocked leap</text> <text x="232" y="681" font-family="Arial, sans-serif" font-size="16" fill="#ffffff">The gates are pressures, not completed stages, forecasts, or proof of one lab's victory.</text> <text x="104" y="706" font-family="Arial, sans-serif" font-size="14" fill="#d9e8e2">Source role: Chapter 24 scaffold rows,,.</text>
</svg>