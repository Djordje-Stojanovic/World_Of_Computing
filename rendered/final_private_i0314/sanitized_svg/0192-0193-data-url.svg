<svg xmlns=" width="1400" height="760" viewBox="0 0 1400 760" role="img" aria-labelledby="title desc"> <title id="title">Microsoft/OpenAI Partnership Chronology</title> <desc id="desc">Chapter 8 chronology from the 2019 compute partnership through GPT-3 licensing, Copilot, Azure OpenAI Service, ChatGPT on Azure, and Microsoft 365 Copilot, with Evidence limits claims.</desc> <style>.bg{fill:#f7f4ee}.ink{fill:#1f2933;font-family:Arial,Helvetica,sans-serif}.muted{fill:#5d6470;font-family:Arial,Helvetica,sans-serif}.title{font-size:38px;font-weight:800}.sub{font-size:20px}.small{font-size:16px}.tiny{font-size:13px}.date{font-size:18px;font-weight:800}.label{font-size:20px;font-weight:800}.rail{stroke:#1f2933;stroke-width:5;stroke-linecap:round}.tick{stroke:#1f2933;stroke-width:3}.compute{fill:#2563eb}.product{fill:#0f8b6f}.business{fill:#b7791f}.risk{fill:#c2412d}.card{fill:#fffdf7;stroke:#c8c1b5;stroke-width:2}.gate{fill:#fff2ec;stroke:#c2412d;stroke-width:2}.src{fill:#0f8b6f;font-family:Arial,Helvetica,sans-serif;font-size:13px;font-weight:700} </style> <rect class="bg" width="1400" height="760"/> <text class="ink title" x="70" y="70">Microsoft/OpenAI: The Cloud Bargain Timeline</text> <text class="muted sub" x="70" y="105">Read as access-route chronology, not as proof of revenue, productivity, usage volume, or customer outcomes.</text> <line class="rail" x1="110" y1="350" x2="1240" y2="350"/> <g transform="translate(110 0)"> <circle class="compute" cx="0" cy="350" r="16"/><line class="tick" x1="0" y1="350" x2="0" y2="255"/><rect class="card" x="-70" y="165" width="185" height="90" rx="8"/><text class="date ink" x="-50" y="193">2019-07</text><text class="label ink" x="-50" y="220">Compute</text><text class="small muted" x="-50" y="242">partnership</text><text class="src" x="-50" y="260"></text> <circle class="compute" cx="160" cy="350" r="16"/><line class="tick" x1="160" y1="350" x2="160" y2="455"/><rect class="card" x="85" y="455" width="210" height="92" rx="8"/><tex