<svg xmlns=" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc"> <title id="title">Chapter 22 Margin and ROI Blocker Grid</title> <desc id="desc">Grid separating visible evidence from blocked economics claims such as revenue, margin, utilization, and customer ROI.</desc> <rect width="1200" height="760" fill="#f9fafb"/> <text x="70" y="72" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#111827">The tempting economics claims are not the sourced ones</text> <text x="70" y="108" font-family="Arial, sans-serif" font-size="17" fill="#4b5563">Chapter 22 can show the market architecture without inventing the balance sheet.</text> <g font-family="Arial, sans-serif" font-size="15"> <rect x="70" y="155" width="1060" height="430" rx="8" fill="#ffffff" stroke="#d1d5db"/> <rect x="70" y="155" width="1060" height="54" rx="8" fill="#111827"/> <text x="100" y="190" font-size="16" font-weight="700" fill="#ffffff">Visible now</text> <text x="420" y="190" font-size="16" font-weight="700" fill="#ffffff">Why useful</text> <text x="790" y="190" font-size="16" font-weight="700" fill="#ffffff">Still blocked</text> <line x1="380" y1="155" x2="380" y2="585" stroke="#d1d5db"/> <line x1="760" y1="155" x2="760" y2="585" stroke="#d1d5db"/> <text x="100" y="252" font-weight="700" fill="#14532d">pricing rows</text><text x="420" y="252" fill="#111827">unit of sale and tiers</text><text x="790" y="252" fill="#881337">cost-to-serve, margin</text> <line x1="70" y1="285" x2="1130" y2="285" stroke="#e5e7eb"/> <text x="100" y="327" font-weight="700" fill="#14532d">subscription pages</text><text x="420" y="327" fill="#111827">productized access</text><text x="790" y="327" fill="#881337">paid users, revenue</text> <line x1="70" y1="360" x2="1130" y2="360" stroke="#e5e7eb"/> <text x="100" y="402" font-weight="700" fill="#14532d">cloud/product routes</text><text x="420" y="402" fill="#111827">distribution architecture</text><text x="790" y="402" fill="#881337">Azure margin, workload volume</text> <line x1="70" y1="435" x2="1130" y2="435" stroke="#e5e7eb"/> <text x="100" y="477" font-weight="700" fill="#14532d">enterprise access</text><text x="420" y="477" fill="#111827">commercial role</text><text x="790" y="477" fill="#881337">ROI, productivity, active use</text> <line x1="70" y1="510" x2="1130" y2="510" stroke="#e5e7eb"/> <text x="100" y="552" font-weight="700" fill="#14532d">rank/price audit</text><text x="420" y="552" fill="#111827">exclusion logic</text><text x="790" y="552" fill="#881337">price-quality frontier</text> </g> <rect x="70" y="630" width="1060" height="62" rx="8" fill="#fef3c7" stroke="#d97706"/> <text x="100" y="668" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#78350f">Rule:</text> <text x="155" y="668" font-family="Arial, sans-serif" font-size="16" fill="#111827">use visible rows as market-structure evidence; quarantine outcome claims until same-scope financial or customer evidence exists.</text> <text x="70" y="725" font-family="Arial, sans-serif" font-size="14" fill="#6b7280">Sources/data: /004/006/007; price_quality_join_audit_i0036.tsv.</text>
</svg>