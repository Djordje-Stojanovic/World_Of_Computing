<svg xmlns=" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc"> <title id="title">Chapter 23 Failure-Mode Map</title> <desc id="desc">A schematic map of LLM failure families with evidence sources and blocked prevalence claims.</desc> <rect width="1200" height="760" fill="#fbfaf7"/> <text x="70" y="70" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#151515">Failure modes are different claims, not one safety score</text> <text x="70" y="106" font-family="Arial, sans-serif" font-size="17" fill="#4b5563">Supported mechanism lanes from Chapter 23. Exact prevalence and deployed-product rates stay blocked.</text> <g font-family="Arial, sans-serif"> <rect x="70" y="150" width="250" height="185" rx="8" fill="#ffffff" stroke="#b91c1c" stroke-width="3"/> <text x="95" y="190" font-size="22" font-weight="700" fill="#7f1d1d">Truth failures</text> <text x="95" y="224" font-size="16" fill="#1f2937">Hallucination</text> <text x="95" y="250" font-size="16" fill="#1f2937">Mimicked falsehoods</text> <text x="95" y="276" font-size="16" fill="#1f2937">Unsupported citations</text> <text x="95" y="310" font-size="13" fill="#6b7280"></text> <rect x="355" y="150" width="250" height="185" rx="8" fill="#ffffff" stroke="#c2410c" stroke-width="3"/> <text x="380" y="190" font-size="22" font-weight="700" fill="#7c2d12">Social failures</text> <text x="380" y="224" font-size="16" fill="#1f2937">Sycophancy</text> <text x="380" y="250" font-size="16" fill="#1f2937">User-leading answers</text> <text x="380" y="276" font-size="16" fill="#1f2937">Polite overconfidence</text> <text x="380" y="310" font-size="13" fill="#6b7280"></text> <rect x="640" y="150" width="250" height="185" rx="8" fill="#ffffff" stroke="#9333ea" stroke-width="3"/> <text x="665" y="190" font-size="22" font-weight="700" fill="#581c87">Adversarial failures</text> <text x="665" y="224" font-size="16" fill="#1f2937">Jailbreak suffixes</text> <text x="665" y="250" font-size="16" fill="#1f2937">Prompt injection</text> <text x="665" y="276" font-size="16" fill="#1f2937">Instruction/data confusion</text> <text x="665" y="310" font-size="13" fill="#6b7280"></text> <rect x="70" y="385" width="250" height="185" rx="8" fill="#ffffff" stroke="#0369a1" stroke-width="3"/> <text x="95" y="425" font-size="22" font-weight="700" fill="#0c4a6e">Proxy failures</text> <text x="95" y="459" font-size="16" fill="#1f2937">Reward tampering</text> <text x="95" y="485" font-size="16" fill="#1f2937">Specification gaming</text> <text x="95" y="511" font-size="16" fill="#1f2937">Optimizing the wrong target</text> <text x="95" y="545" font-size="13" fill="#6b7280"></text> <rect x="355" y="385" width="250" height="185" rx="8" fill="#ffffff" stroke="#15803d" stroke-width="3"/> <text x="380" y="425" font-size="22" font-weight="700" fill="#14532d">Evidence failures</text> <text x="380" y="459" font-size="16" fill="#1f2937">Wrong retrieval</text> <text x="380" y="485" font-size="16" fill="#1f2937">Stale passages</text> <text x="380" y="511" font-size="16" fill="#1f2937">Citation without support</text> <text x="380" y="545" font-size="13" fill="#6b7280"></text> <rect x="640" y="385" width="250" height="185" rx="8" fill="#ffffff" stroke="#475569" stroke-width="3"/> <text x="665" y="425" font-size="22" font-weight="700" fill="#334155">Measurement failures</text> <text x="665" y="459" font-size="16" fill="#1f2937">Narrow benchmark slices</text> <text x="665" y="485" font-size="16" fill="#1f2937">Contamination</text> <text x="665" y="511" font-size="16" fill="#1f2937">Harness mismatch</text> <text x="665" y="545" font-size="13" fill="#6b7280"></text> <rect x="925" y="150" width="205" height="420" rx="8" fill="#111827"/> <text x="950" y="190" font-size="22" font-weight="700" fill="#ffffff">Blocked leaps</text> <text x="950" y="230" font-size="15" fill="#fef3c7">No exact rates</text> <text x="950" y="260" font-size="15" fill="#fef3c7">No product prevalence</text> <text x="950" y="290" font-size="15" fill="#fef3c7">No solved safety</text> <text x="950" y="320" font-size="15" fill="#fef3c7">No incident generalization</text> <text x="950" y="350" font-size="15" fill="#fef3c7">No mitigation victory</text> <line x1="950" y1="386" x2="1105" y2="386" stroke="#6b7280"/> <text x="950" y="425" font-size="15" fill="#d1d5db">Each lane needs its own</text> <text x="950" y="450" font-size="15" fill="#d1d5db">source, scope, date,</text> <text x="950" y="475" font-size="15" fill="#d1d5db">system, and evaluator.</text> </g> 
