<svg xmlns=" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc"> <title id="title">Price-Quality Exclusion Map</title> <desc id="desc">A Chapter 13 diagram showing why the current evidence supports exclusion and permission gates, not a final price-quality frontier chart.</desc> <style>.bg{fill:#f7f5ef}.ink{fill:#20242a}.muted{fill:#5e6670}.panel{fill:#ffffff;stroke:#242a31;stroke-width:2}.gate{fill:#e8f1f4;stroke:#2b6573;stroke-width:2}.deny{fill:#f7e5dc;stroke:#a14f34;stroke-width:2}.ok{fill:#e7f1e5;stroke:#4b7a44;stroke-width:2}.line{stroke:#4b5560;stroke-width:3;fill:none;marker-end:url(#arrow)}.small{font-family:Arial, Helvetica, sans-serif;font-size:22px}.label{font-family:Arial, Helvetica, sans-serif;font-size:26px;font-weight:700}.title{font-family:Arial, Helvetica, sans-serif;font-size:38px;font-weight:700}.note{font-family:Arial, Helvetica, sans-serif;font-size:18px;fill:#5e6670} </style> <defs> <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"> <path d="M0,0 L12,6 L0,12 Z" fill="#4b5560"/> </marker> </defs> <rect class="bg" x="0" y="0" width="1200" height="760"/> <text class="title ink" x="60" y="70">Price-Quality Chart Gate</text> <text class="small muted" x="60" y="108">Allowed now: an exclusion/permission map. Blocked for now: a frontier curve or cheapest-best claim.</text> <rect class="panel" x="60" y="150" width="300" height="420" rx="8"/> <text class="label ink" x="90" y="195">Candidate row only if</text> <text class="small ink" x="90" y="245">Rank snapshot is dated</text> <text class="small ink" x="90" y="290">Exact model/version matches</text> <text class="small ink" x="90" y="335">Cutoff-compatible price exists</text> <text class="small ink" x="90" y="380">Pricing basis is comparable</text> <text class="small ink" x="90" y="425">Tier, cache, batch, and output</text> <text class="small ink" x="90" y="455">rules stay labeled</text> <text class="small ink" x="90" y="505">Reasoning/fine-tune/deprecated</text> <text class="small ink" x="90" y="535">rows are filtered</text> <path class="line" d="M380 360 H485"/> <rect class="gate" x="500" y="238" width="260" height="244" rx="8"/> <text class="label ink" x="535" y="290">Evidence gate</text> <text class="small ink" x="535" y="340">Join rows only when</text> <text class="small ink" x="535" y="374">rank, model scope,</text> <text class="small ink" x="535" y="408">date, and price basis</text> <text class="small ink" x="535" y="442">line up.</text> <path class="line" d="M775 300 H880"/> <path class="line" d="M775 420 H880"/> <rect class="ok" x="900" y="210" width="240" height="160" rx="8"/> <text class="label ink" x="930" y="260">Allowed now</text> <text class="small ink" x="930" y="306">Exclusion map</text> <text class="small ink" x="930" y="340">Candidate-row audit</text> <rect class="deny" x="900" y="405" width="240" height="190" rx="8"/> <text class="label ink" x="930" y="455">Blocked now</text> <text class="small ink" x="930" y="500">Price-quality frontier</text> <text class="small ink" x="930" y="535">Cheapest-best claim</text> <text class="small ink" x="930" y="570">Live ranking inference</text> <rect class="deny" x="60" y="610" width="1080" height="72" rx="8"/> <text class="small ink" x="90" y="655">Exclusions: fine-tuning price, batch/cache tier mismatch, reasoning-only scope, deprecated row, missing price, version mismatch, post-cutoff price capture.</text> 
</svg>