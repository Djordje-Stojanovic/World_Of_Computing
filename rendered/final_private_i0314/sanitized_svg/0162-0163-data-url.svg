<svg xmlns=" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc"> <title id="title">Coding Benchmark Caveat Matrix</title> <desc id="desc">A Chapter 20 matrix separating supported benchmark uses from blocked live-ranking and productivity inferences.</desc> <style>.bg{fill:#f7f5ef}.ink{fill:#20242a}.muted{fill:#5e6670}.head{fill:#242a31}.headtext{fill:#fff}.ok{fill:#e7f1e5;stroke:#4b7a44;stroke-width:2}.gate{fill:#e8f1f4;stroke:#2b6573;stroke-width:2}.deny{fill:#f7e5dc;stroke:#a14f34;stroke-width:2}.cell{fill:#fff;stroke:#c7c1b7;stroke-width:1.5}.title{font-family:Arial,Helvetica,sans-serif;font-size:38px;font-weight:700}.label{font-family:Arial,Helvetica,sans-serif;font-size:21px;font-weight:700}.small{font-family:Arial,Helvetica,sans-serif;font-size:17px}.tiny{font-family:Arial,Helvetica,sans-serif;font-size:14px}</style> <rect class="bg" width="1200" height="760"/><text class="title ink" x="60" y="70">Coding Benchmark Caveat Matrix</text><text class="small muted" x="60" y="108">Use benchmarks as lenses, not crowns. Each row needs scope before it can support a claim.</text> <rect class="head" x="60" y="150" width="1080" height="54" rx="6"/><text class="label headtext" x="90" y="184">Benchmark</text><text class="label headtext" x="315" y="184">What it can support</text><text class="label headtext" x="640" y="184">Must label</text><text class="label headtext" x="900" y="184">Blocked leap</text> <g class="small"> <rect class="cell" x="60" y="204" width="230" height="105"/><text class="label ink" x="90" y="246">SWE-bench</text><text class="tiny muted" x="90" y="274"></text> <rect class="ok" x="290" y="204" width="320" height="105"/><text x="315" y="236" class="small ink">Real issue and repo</text><text x="315" y="264" class="small ink">repair framing</text> <rect class="gate" x="610" y="204" width="260" height="105"/><text x="635" y="236" class="small ink">repo set, issue set,</text><text x="635" y="264" class="small ink">scaffold, tests</text> <rect class="deny" x="870" y="204" width="270" height="105"/><text x="895" y="236" class="small ink">best coding model</text><text x="895" y="264" class="small ink">or productivity proof</text> <rect class="cell" x="60" y="309" width="230" height="105"/><text class="label ink" x="90" y="351">LiveCodeBench</text><text class="tiny muted" x="90" y="379"></text> <rect class="ok" x="290" y="309" width="320" height="105"/><text x="315" y="341" class="small ink">Contamination-aware</text><text x="315" y="369" class="small ink">code-eval framing</text> <rect class="gate" x="610" y="309" width="260" height="105"/><text x="635" y="341" class="small ink">date window, task</text><text x="635" y="369" class="small ink">type, model setting</text> <rect class="deny" x="870" y="309" width="270" height="105"/><text x="895" y="341" class="small ink">live rank without</text><text x="895" y="369" class="small ink">snapshot</text> <rect class="cell" x="60" y="414" width="230" height="105"/><text class="label ink" x="90" y="456">Terminal tasks</text><text class="tiny muted" x="90" y="484"></text> <rect class="ok" x="290" y="414" width="320" height="105"/><text x="315" y="446" class="small ink">tool-use and shell</text><text x="315" y="474" class="small ink">environment signal</text> <rect class="gate" x="610" y="414" width="260" height="105"/><text x="635" y="446" class="small ink">permissions, tools,</text><text x="635" y="474" class="small ink">retry budget</text> <rect class="deny" x="870" y="414" width="270" height="105"/><text x="895" y="446" class="small ink">agent can safely</text><text x="895" y="474" class="small ink">own work</text> <rect class="cell" x="60" y="519" width="230" height="105"/><text class="label ink" x="90" y="561">Product metrics</text><text class="tiny muted" x="90" y="589">blocked</text> <rect class="ok" x="290" y="519" width="320" height="105"/><text x="315" y="551" class="small ink">not supported by</text><text x="315" y="579" class="small ink">benchmark alone</text> <rect class="gate" x="610" y="519" width="260" height="105"/><text x="635" y="551" class="small ink">needs customer-side</text><text x="635" y="579" class="small ink">task/outcome data</text> <rect class="deny" x="870" y="519" width="270" height="105"/><text x="895" y="551" class="small ink">revenue, adoption,</text><text x="895" y="579" class="small ink">productivity</text> </g> 
