<svg xmlns=" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc"> <title id="title">Agent loop prototype</title> <desc id="desc">A visual grammar prototype for coding-agent and tool-use workflow diagrams in Next Token.</desc> <rect width="1200" height="675" fill="#f7f4ee"/> <text x="80" y="80" font-family="Arial, Helvetica, sans-serif" font-size="34" fill="#1f2933" font-weight="700">Repository Task Lifecycle</text> <text x="80" y="118" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#52606d">Use for Claude Code, Codex, tool-use, RAG, and agent workflow figures.</text> <defs> <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"> <path d="M0,0 L10,4 L0,8 Z" fill="#1f2933"/> </marker> </defs> <g font-family="Arial, Helvetica, sans-serif" font-size="18"> <rect x="90" y="230" width="160" height="82" rx="6" fill="#ffffff" stroke="#b7791f" stroke-width="3"/> <text x="128" y="264" fill="#1f2933" font-weight="700">Human</text> <text x="118" y="290" fill="#52606d" font-size="15">frames task</text> <rect x="330" y="210" width="170" height="122" rx="6" fill="#ffffff" stroke="#2563eb" stroke-width="3"/> <text x="378" y="250" fill="#1f2933" font-weight="700">Model</text> <text x="358" y="278" fill="#52606d" font-size="15">plans + edits</text> <text x="358" y="300" fill="#52606d" font-size="15">under context</text> <rect x="580" y="210" width="170" height="122" rx="6" fill="#ffffff" stroke="#0f8b6f" stroke-width="3"/> <text x="628" y="250" fill="#1f2933" font-weight="700">Tools</text> <text x="608" y="278" fill="#52606d" font-size="15">files + shell</text> <text x="608" y="300" fill="#52606d" font-size="15">tests + logs</text> <rect x="830" y="230" width="180" height="82" rx="6" fill="#ffffff" stroke="#c2412d" stroke-width="3"/> <text x="874" y="264" fill="#1f2933" font-weight="700">Review</text> <text x="856" y="290" fill="#52606d" font-size="15">diff survives?</text> </g> <path d="M250 271 H330" stroke="#1f2933" stroke-width="3" fill="none" marker-end="url(#arrow)"/> <path d="M500 271 H580" stroke="#1f2933" stroke-width="3" fill="none" marker-end="url(#arrow)"/> <path d="M750 271 H830" stroke="#1f2933" stroke-width="3" fill="none" marker-end="url(#arrow)"/> <path d="M920 312 C900 470 410 485 405 335" stroke="#1f2933" stroke-width="3" fill="none" marker-end="url(#arrow)" stroke-dasharray="8 7"/> <rect x="115" y="470" width="970" height="76" fill="none" stroke="#c8c1b5" stroke-width="2"/> <text x="145" y="503" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#52606d">Evidence hooks: allowed commands, files changed, tests run, failures observed, human approvals, final diff.</text> <text x="145" y="528" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#52606d">Caveat: a passing local check is not proof of architectural correctness.</text>
</svg>