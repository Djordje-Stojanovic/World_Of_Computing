<svg xmlns=" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc"> <title id="title">Computer Use, MCP, And Claude Code Bridge</title> <desc id="desc">A bridge diagram connecting chat, computer use, MCP connectors, Claude Code, permissions, tests, and human review.</desc> <rect width="1200" height="720" fill="#f5f7f4"/> <text x="70" y="70" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#17232d">From assistant to action surface</text> <text x="70" y="108" font-family="Arial, sans-serif" font-size="16" fill="#50616e">Computer use, MCP, and Claude Code are tool-connected surfaces, not proof of general autonomy.</text> <defs> <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"> <path d="M0,0 L8,3 L0,6 Z" fill="#365f70"/> </marker> </defs> <g font-family="Arial, sans-serif"> <rect x="75" y="250" width="170" height="100" rx="8" fill="#ffffff" stroke="#365f70" stroke-width="3"/> <text x="105" y="288" font-size="20" font-weight="700" fill="#17232d">Chat</text> <text x="105" y="318" font-size="14" fill="#50616e">Language interface</text> <rect x="310" y="180" width="190" height="100" rx="8" fill="#ffffff" stroke="#6c8b3d" stroke-width="3"/> <text x="335" y="218" font-size="20" font-weight="700" fill="#17232d">Computer use</text> <text x="335" y="248" font-size="14" fill="#50616e">UI observation/action</text> <rect x="310" y="360" width="190" height="100" rx="8" fill="#ffffff" stroke="#6c8b3d" stroke-width="3"/> <text x="335" y="398" font-size="20" font-weight="700" fill="#17232d">MCP</text> <text x="335" y="428" font-size="14" fill="#50616e">Tool/data connectors</text> <rect x="575" y="250" width="190" height="100" rx="8" fill="#ffffff" stroke="#a46a3f" stroke-width="3"/> <text x="600" y="288" font-size="20" font-weight="700" fill="#17232d">Claude Code</text> <text x="600" y="318" font-size="14" fill="#50616e">Repository workflow</text> <rect x="840" y="175" width="220" height="90" rx="8" fill="#fff8df" stroke="#b7933b" stroke-width="3"/> <text x="865" y="210" font-size="19" font-weight="700" fill="#17232d">Permission Limit</text> <text x="865" y="238" font-size="14" fill="#50616e">What may be seen or done?</text> <rect x="840" y="315" width="220" height="90" rx="8" fill="#ffffff" stroke="#365f70" stroke-width="3"/> <text x="865" y="350" font-size="19" font-weight="700" fill="#17232d">Tests and traces</text> <text x="865" y="378" font-size="14" fill="#50616e">Evidence, logs, diffs</text> <rect x="840" y="455" width="220" height="90" rx="8" fill="#f7e7e3" stroke="#b65d4a" stroke-width="3"/> <text x="865" y="490" font-size="19" font-weight="700" fill="#17232d">Human review</text> <text x="865" y="518" font-size="14" fill="#50616e">Approve, reject, supervise</text> <line x1="245" y1="300" x2="302" y2="238" stroke="#365f70" stroke-width="3" marker-end="url(#arrow)"/> <line x1="245" y1="310" x2="302" y2="405" stroke="#365f70" stroke-width="3" marker-end="url(#arrow)"/> <line x1="500" y1="230" x2="568" y2="285" stroke="#365f70" stroke-width="3" marker-end="url(#arrow)"/> <line x1="500" y1="410" x2="568" y2="322" stroke="#365f70" stroke-width="3" marker-end="url(#arrow)"/> <line x1="765" y1="300" x2="832" y2="220" stroke="#365f70" stroke-width="3" marker-end="url(#arrow)"/> <line x1="765" y1="310" x2="832" y2="360" stroke="#365f70" stroke-width="3" marker-end="url(#arrow)"/> <line x1="950" y1="405" x2="950" y2="447" stroke="#365f70" stroke-width="3" marker-end="url(#arrow)"/> <rect x="70" y="610" width="1060" height="56" rx="8" fill="#17232d"/>  </g>
