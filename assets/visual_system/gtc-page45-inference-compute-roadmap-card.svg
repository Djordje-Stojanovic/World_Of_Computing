<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">GTC Page 45 Inference Compute Roadmap Claim Card</title>
  <desc id="desc">A lightweight Chapter 15 claim card derived from GTC 2026 keynote page 45, labeling Groq 3 LPX and 2H26 claims as roadmap and availability evidence.</desc>
  <style>.bg{fill:#f5f3ee}.ink{fill:#20242a}.muted{fill:#5f6872}.panel{fill:#fff;stroke:#222831;stroke-width:2}.tag{fill:#e4edf7;stroke:#3c6382;stroke-width:2}.block{fill:#f4d7ca;stroke:#a14f34;stroke-width:2}.title{font-family:Arial,Helvetica,sans-serif;font-size:38px;font-weight:700}.label{font-family:Arial,Helvetica,sans-serif;font-size:25px;font-weight:700}.small{font-family:Arial,Helvetica,sans-serif;font-size:20px}.note{font-family:Arial,Helvetica,sans-serif;font-size:17px;fill:#5f6872}</style>
  <rect class="bg" width="1200" height="720"/><text class="title ink" x="60" y="70">GTC Page 45: Inference Compute Roadmap</text><text class="small muted" x="60" y="108">Slide-derived claim card. Source asset A-0005; local keynote page 45.</text>
  <rect class="panel" x="70" y="150" width="500" height="350" rx="8"/><text class="label ink" x="105" y="205">What the slide can show</text><text class="small ink" x="105" y="255">NVIDIA presented Groq 3 LPX</text><text class="small ink" x="105" y="292">inference compute specs and</text><text class="small ink" x="105" y="329">an Available 2H26 line.</text>
  <rect class="tag" x="650" y="150" width="420" height="130" rx="8"/><text class="label ink" x="690" y="205">Allowed label</text><text class="small ink" x="690" y="245">roadmap; availability; performance</text>
  <rect class="block" x="650" y="330" width="420" height="170" rx="8"/><text class="label ink" x="690" y="385">Blocked leap</text><text class="small ink" x="690" y="427">Do not treat specs or 2H26</text><text class="small ink" x="690" y="462">as shipped independent fact.</text>
  <text class="note" x="60" y="665">Sources: S-0001; S-0067; A-0005. C-0047 remains active.</text>
</svg>
