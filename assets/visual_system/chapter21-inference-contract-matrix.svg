<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Chapter 21 Inference Contract Matrix</title>
  <desc id="desc">Matrix listing the fields required before using reasoning benchmark numbers or comparisons.</desc>
  <rect width="1200" height="760" fill="#fffdf8"/>
  <text x="70" y="72" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#111827">A reasoning score needs an inference contract</text>
  <text x="70" y="108" font-family="Arial, sans-serif" font-size="17" fill="#4b5563">Without the contract, a benchmark number is a teaser, not evidence.</text>
  <g font-family="Arial, sans-serif">
    <rect x="70" y="150" width="1060" height="440" rx="8" fill="#ffffff" stroke="#d1d5db"/>
    <rect x="70" y="150" width="1060" height="55" rx="8" fill="#111827"/>
    <text x="105" y="185" font-size="16" font-weight="700" fill="#ffffff">Contract field</text>
    <text x="400" y="185" font-size="16" font-weight="700" fill="#ffffff">Why it matters</text>
    <text x="835" y="185" font-size="16" font-weight="700" fill="#ffffff">Blocked without it</text>
    <line x1="360" y1="150" x2="360" y2="590" stroke="#d1d5db"/>
    <line x1="800" y1="150" x2="800" y2="590" stroke="#d1d5db"/>
    <g font-size="15" fill="#111827">
      <text x="105" y="242" font-weight="700">model + date</text><text x="400" y="242">aliases and products change</text><text x="835" y="242">live rank</text>
      <line x1="70" y1="270" x2="1130" y2="270" stroke="#e5e7eb"/>
      <text x="105" y="307" font-weight="700">task set</text><text x="400" y="307">math, code, chat, and tools differ</text><text x="835" y="307">all-domain superiority</text>
      <line x1="70" y1="335" x2="1130" y2="335" stroke="#e5e7eb"/>
      <text x="105" y="372" font-weight="700">tool access</text><text x="400" y="372">search, code, browser, retrieval change the object</text><text x="835" y="372">raw-model claim</text>
      <line x1="70" y1="400" x2="1130" y2="400" stroke="#e5e7eb"/>
      <text x="105" y="437" font-weight="700">sample count + retries</text><text x="400" y="437">one guess differs from many attempts</text><text x="835" y="437">cheap single-pass comparison</text>
      <line x1="70" y1="465" x2="1130" y2="465" stroke="#e5e7eb"/>
      <text x="105" y="502" font-weight="700">verifier + scoring rule</text><text x="400" y="502">the judge can narrow or distort the target</text><text x="835" y="502">general usefulness</text>
      <line x1="70" y1="530" x2="1130" y2="530" stroke="#e5e7eb"/>
      <text x="105" y="567" font-weight="700">contamination scope</text><text x="400" y="567">public tasks and traces can leak into training</text><text x="835" y="567">clean frontier claim</text>
    </g>
  </g>
  <rect x="70" y="625" width="1060" height="64" rx="8" fill="#fef3c7" stroke="#d97706"/>
  <text x="100" y="665" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#78350f">Caption rule:</text>
  <text x="220" y="665" font-family="Arial, sans-serif" font-size="16" fill="#111827">if a figure cannot state the contract, it should be a permission map, not a ranking chart.</text>
  <text x="70" y="720" font-family="Arial, sans-serif" font-size="14" fill="#6b7280">Sources: C-0121; C-0130; S-0035; S-0036; S-0037; CH21REASON-010.</text>
</svg>
