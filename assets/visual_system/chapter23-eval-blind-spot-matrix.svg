<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Chapter 23 Evaluation Blind-Spot Matrix</title>
  <desc id="desc">Matrix showing what common evaluation families can see and what they cannot prove.</desc>
  <rect width="1200" height="760" fill="#fffdf8"/>
  <text x="70" y="72" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#111827">Every evaluation casts a shadow</text>
  <text x="70" y="108" font-family="Arial, sans-serif" font-size="17" fill="#4b5563">A benchmark can be useful and still fail to license global trust claims.</text>
  <g font-family="Arial, sans-serif" font-size="15">
    <rect x="70" y="150" width="1060" height="450" rx="8" fill="#ffffff" stroke="#d1d5db"/>
    <rect x="70" y="150" width="1060" height="55" rx="8" fill="#111827"/>
    <text x="95" y="185" font-size="16" font-weight="700" fill="#ffffff">Eval family</text>
    <text x="310" y="185" font-size="16" font-weight="700" fill="#ffffff">Can illuminate</text>
    <text x="630" y="185" font-size="16" font-weight="700" fill="#ffffff">Blind spot</text>
    <text x="930" y="185" font-size="16" font-weight="700" fill="#ffffff">Claim blocker</text>
    <line x1="280" y1="150" x2="280" y2="600" stroke="#d1d5db"/>
    <line x1="600" y1="150" x2="600" y2="600" stroke="#d1d5db"/>
    <line x1="900" y1="150" x2="900" y2="600" stroke="#d1d5db"/>
    <g fill="#111827">
      <text x="95" y="250" font-weight="700">TruthfulQA</text>
      <text x="310" y="240">mimicked falsehood</text><text x="310" y="265">pressure</text>
      <text x="630" y="240">not a universal live</text><text x="630" y="265">trust measure</text>
      <text x="930" y="240">no all-model</text><text x="930" y="265">truthfulness crown</text>
      <line x1="70" y1="295" x2="1130" y2="295" stroke="#e5e7eb"/>
      <text x="95" y="340" font-weight="700">Arena preference</text>
      <text x="310" y="330">human preference</text><text x="310" y="355">signal</text>
      <text x="630" y="330">style, sample, and</text><text x="630" y="355">task mix effects</text>
      <text x="930" y="330">no safety or</text><text x="930" y="355">usefulness proof</text>
      <line x1="70" y1="385" x2="1130" y2="385" stroke="#e5e7eb"/>
      <text x="95" y="430" font-weight="700">SWE-bench</text>
      <text x="310" y="420">repo issue repair</text><text x="310" y="445">under a harness</text>
      <text x="630" y="420">scaffold, tests, and</text><text x="630" y="445">retry budgets matter</text>
      <text x="930" y="420">no productivity</text><text x="930" y="445">or job claim</text>
      <line x1="70" y1="475" x2="1130" y2="475" stroke="#e5e7eb"/>
      <text x="95" y="520" font-weight="700">LiveCodeBench</text>
      <text x="310" y="510">fresher code tasks</text><text x="310" y="535">and repair skills</text>
      <text x="630" y="510">still task-shaped,</text><text x="630" y="535">not production work</text>
      <text x="930" y="510">no current</text><text x="930" y="535">leaderboard claim</text>
    </g>
  </g>
  <rect x="70" y="635" width="1060" height="55" rx="6" fill="#fef3c7" stroke="#d97706"/>
  <text x="95" y="670" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#78350f">Inference contract:</text>
  <text x="250" y="670" font-family="Arial, sans-serif" font-size="16" fill="#111827">model, date, task set, scaffold, tools, attempts, budget, contamination boundary, evaluator.</text>
  <text x="70" y="720" font-family="Arial, sans-serif" font-size="14" fill="#6b7280">Sources: S-0164; S-0036; S-0035; S-0037; CH23TRUST-002/008.</text>
</svg>
