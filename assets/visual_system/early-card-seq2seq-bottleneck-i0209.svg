<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Seq2Seq Turned Sentences Into A Bottleneck</title>
  <desc id="desc">Chapter 2 source card for encoder-decoder sequence transduction before attention.</desc>
  <style>.bg{fill:#f3f5ef}.ink{fill:#20242a}.muted{fill:#5f6872}.box{fill:#fff;stroke:#222831;stroke-width:2}.mid{fill:#f1e1cb;stroke:#a45a28;stroke-width:2}.risk{fill:#f7e1df;stroke:#9f4b45;stroke-width:2}.line{stroke:#4b5560;stroke-width:4;fill:none;marker-end:url(#arrow)}.title{font-family:Arial,Helvetica,sans-serif;font-size:38px;font-weight:700}.label{font-family:Arial,Helvetica,sans-serif;font-size:25px;font-weight:700}.small{font-family:Arial,Helvetica,sans-serif;font-size:20px}.note{font-family:Arial,Helvetica,sans-serif;font-size:17px;fill:#5f6872}</style>
  <defs><marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 Z" fill="#4b5560"/></marker></defs>
  <rect class="bg" width="1200" height="760"/>
  <text class="title ink" x="60" y="72">Seq2Seq Turned Sentences Into A Bottleneck</text>
  <text class="small muted" x="60" y="112">Encoder-decoder models made sequence transduction visible; attention enters when one vector has to carry too much.</text>
  <rect class="box" x="85" y="245" width="250" height="155" rx="8"/><text class="label ink" x="125" y="300">Input sequence</text><text class="small ink" x="125" y="340">tokens over time</text>
  <path class="line" d="M350 322 H465"/>
  <rect class="mid" x="480" y="225" width="240" height="195" rx="8"/><text class="label ink" x="520" y="285">Fixed vector</text><text class="small ink" x="520" y="330">compressed state</text><text class="small ink" x="520" y="365">useful, but pressured</text>
  <path class="line" d="M735 322 H850"/>
  <rect class="box" x="865" y="245" width="250" height="155" rx="8"/><text class="label ink" x="905" y="300">Output sequence</text><text class="small ink" x="905" y="340">generated step by step</text>
  <rect class="risk" x="175" y="545" width="850" height="70" rx="8"/><text class="small ink" x="210" y="588">Block: exact BLEU scores, translation superiority, modern agent capability, or architecture inevitability.</text>
  <text class="note" x="60" y="725">Source: S-0106. Original mechanism card; no source figure geometry or result table copied.</text>
</svg>
