<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Chinchilla Makes Scale A Balance Problem</title>
  <desc id="desc">Chapter 4 source card for compute-optimal training as a model/data/compute balance, not a universal recipe.</desc>
  <style>.bg{fill:#f3f5ef}.ink{fill:#20242a}.muted{fill:#5f6872}.node{fill:#e4edf7;stroke:#3c6382;stroke-width:2}.data{fill:#e3f0de;stroke:#47733f;stroke-width:2}.risk{fill:#f7e1df;stroke:#9f4b45;stroke-width:2}.line{stroke:#4b5560;stroke-width:4;fill:none}.title{font-family:Arial,Helvetica,sans-serif;font-size:38px;font-weight:700}.label{font-family:Arial,Helvetica,sans-serif;font-size:25px;font-weight:700}.small{font-family:Arial,Helvetica,sans-serif;font-size:20px}.note{font-family:Arial,Helvetica,sans-serif;font-size:17px;fill:#5f6872}</style>
  <rect class="bg" width="1200" height="760"/>
  <text class="title ink" x="60" y="72">Chinchilla Makes Scale A Balance Problem</text>
  <text class="small muted" x="60" y="112">The correction is not "bigger is always better"; it is that model size, data, and compute are coupled.</text>
  <circle class="node" cx="310" cy="310" r="105"/><text class="label ink" x="255" y="300">Model</text><text class="small ink" x="245" y="340">parameters</text>
  <circle class="data" cx="600" cy="310" r="105"/><text class="label ink" x="560" y="300">Data</text><text class="small ink" x="548" y="340">tokens</text>
  <circle class="node" cx="890" cy="310" r="105"/><text class="label ink" x="845" y="300">Compute</text><text class="small ink" x="835" y="340">budget</text>
  <path class="line" d="M415 310 H495 M705 310 H785"/>
  <rect class="risk" x="155" y="545" width="890" height="70" rx="8"/><text class="small ink" x="190" y="588">Block: exact optimum outside scope, later-lab behavior, product guarantee, price claim, or data legality claim.</text>
  <text class="note" x="60" y="725">Sources: S-0015, S-0190. Original source-card SVG; pairs with A-0148 after page/formula refs.</text>
</svg>
