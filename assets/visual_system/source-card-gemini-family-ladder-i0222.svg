<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc"><title id="title">Gemini arrived as a family</title><desc id="desc">Paraphrase-first source card for Chapter 9 showing Gemini launch and model-card surfaces as product-family evidence with mutable-page caveats.</desc><style>.bg{fill:#f8f6ee}.ink{fill:#20242a}.muted{fill:#5f6872}.band{fill:#293241}.panel{fill:#fffdf7;stroke:#d8d2c5;stroke-width:2}.tab{fill:#eaf1ff;stroke:#3f6fb5;stroke-width:2}.warn{fill:#fff0ec;stroke:#c2412d;stroke-width:2}.title{font-family:Arial,Helvetica,sans-serif;font-size:38px;font-weight:700}.label{font-family:Arial,Helvetica,sans-serif;font-size:23px;font-weight:700}.small{font-family:Arial,Helvetica,sans-serif;font-size:18px}.tiny{font-family:Arial,Helvetica,sans-serif;font-size:14px}</style><rect class="bg" width="1200" height="760"/><rect class="band" width="1200" height="46"/><text class="tiny" x="60" y="30" fill="#ffffff">SOURCE CARD / CHAPTER 9 / DIRECT QUOTE: NO</text><text class="title ink" x="60" y="95">Gemini arrived as a family</text><text class="small muted" x="60" y="132">The launch source is a product ladder; the model-card surface is a disclosure lane.</text><rect class="panel" x="70" y="185" width="1060" height="320" rx="8"/><rect class="tab" x="110" y="230" width="260" height="115" rx="8"/><text class="label ink" x="145" y="276">Launch</text><text class="small muted" x="145" y="310">Family framing</text><text class="small muted" x="145" y="336">and product roles.</text><rect class="tab" x="420" y="230" width="260" height="115" rx="8"/><text class="label ink" x="455" y="276">Cards</text><text class="small muted" x="455" y="310">Disclosure with</text><text class="small muted" x="455" y="336">mutable caveats.</text><rect class="tab" x="730" y="230" width="260" height="115" rx="8"/><text class="label ink" x="765" y="276">Chapter job</text><text class="small muted" x="765" y="310">Show Google's</text><text class="small muted" x="765" y="336">conversion task.</text><rect class="tab" x="110" y="388" width="880" height="78" rx="8"/><text class="small ink" x="145" y="434">A family name is not a benchmark result; it is a packaging decision.</text><rect class="warn" x="70" y="555" width="1060" height="82" rx="8"/><text class="small ink" x="100" y="590">Blocker: catching up, adoption, model-card completeness, and benchmark crowns.</text><text class="tiny muted" x="100" y="617">Sources: S-0121, S-0120. Paraphrase-only card; separate launch post from mutable model-card page.</text></svg>
