<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc"><title id="title">ChatGPT starts as a public threshold</title><desc id="desc">Paraphrase-first source card for Chapter 7 showing ChatGPT launch and Plus posts as interface-history evidence, not adoption or revenue evidence.</desc><style>.bg{fill:#f8f6ee}.ink{fill:#20242a}.muted{fill:#5f6872}.band{fill:#263238}.panel{fill:#fffdf7;stroke:#d8d2c5;stroke-width:2}.tab{fill:#e8f2f1;stroke:#168477;stroke-width:2}.warn{fill:#fff0ec;stroke:#c2412d;stroke-width:2}.title{font-family:Arial,Helvetica,sans-serif;font-size:38px;font-weight:700}.label{font-family:Arial,Helvetica,sans-serif;font-size:23px;font-weight:700}.small{font-family:Arial,Helvetica,sans-serif;font-size:18px}.tiny{font-family:Arial,Helvetica,sans-serif;font-size:14px}</style><rect class="bg" width="1200" height="760"/><rect class="band" width="1200" height="46"/><text class="tiny" x="60" y="30" fill="#ffffff">SOURCE CARD / CHAPTER 7 / DIRECT QUOTE: NO</text><text class="title ink" x="60" y="95">ChatGPT starts as a public threshold</text><text class="small muted" x="60" y="132">A research-preview launch becomes a paid, persistent interface lane.</text><rect class="panel" x="70" y="185" width="1060" height="320" rx="8"/><rect class="tab" x="110" y="230" width="250" height="115" rx="8"/><text class="label ink" x="145" y="276">Launch post</text><text class="small muted" x="145" y="310">The model meets</text><text class="small muted" x="145" y="336">the public as chat.</text><rect class="tab" x="415" y="230" width="250" height="115" rx="8"/><text class="label ink" x="450" y="276">Plus post</text><text class="small muted" x="450" y="310">Capacity becomes</text><text class="small muted" x="450" y="336">a product tier.</text><rect class="tab" x="720" y="230" width="250" height="115" rx="8"/><text class="label ink" x="755" y="276">History job</text><text class="small muted" x="755" y="310">Show threshold,</text><text class="small muted" x="755" y="336">not user totals.</text><rect class="tab" x="110" y="388" width="860" height="78" rx="8"/><text class="small ink" x="145" y="434">Use the source texture for the door opening, not for crowd-size proof.</text><rect class="warn" x="70" y="555" width="1060" height="82" rx="8"/><text class="small ink" x="100" y="590">Blocker: adoption, revenue, national panic, and current product state need separate evidence.</text><text class="tiny muted" x="100" y="617">Sources: S-0006, S-0078. Paraphrase-only card; no source text, screenshots, or UI copied.</text></svg>
