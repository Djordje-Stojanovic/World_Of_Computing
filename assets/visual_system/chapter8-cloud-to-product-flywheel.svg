<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Cloud-to-Product Flywheel</title>
  <desc id="desc">A Chapter 8 flywheel showing how Azure capacity, OpenAI models, Microsoft surfaces, user demand, and enterprise controls reinforce each other with blocked outcome caveats.</desc>
  <style>
    .bg{fill:#f7f4ee}.ink{fill:#1f2933;font-family:Arial,Helvetica,sans-serif}.muted{fill:#5d6470;font-family:Arial,Helvetica,sans-serif}.title{font-size:38px;font-weight:800}.sub{font-size:19px}.label{font-size:22px;font-weight:800}.small{font-size:16px}.tiny{font-size:13px}.card{fill:#fffdf7;stroke:#c8c1b5;stroke-width:2}.compute{fill:#e7efff;stroke:#2563eb;stroke-width:3}.model{fill:#e8f5ef;stroke:#0f8b6f;stroke-width:3}.surface{fill:#fff3d8;stroke:#b7791f;stroke-width:3}.risk{fill:#fff0ec;stroke:#c2412d;stroke-width:3}.line{fill:none;stroke:#1f2933;stroke-width:4;marker-end:url(#arrow)}
  </style>
  <defs><marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 Z" fill="#1f2933"/></marker></defs>
  <rect class="bg" width="1200" height="760"/>
  <text class="ink title" x="60" y="72">Cloud-To-Product Flywheel</text>
  <text class="muted sub" x="60" y="108">Chapter 8 mechanism: cloud capacity becomes product distribution, then demand pressure returns to infrastructure.</text>
  <rect class="compute" x="470" y="150" width="260" height="105" rx="10"/><text class="ink label" x="505" y="188">Azure capacity</text><text class="ink small" x="505" y="216">supercomputer, serving,</text><text class="ink small" x="505" y="238">enterprise cloud route</text><text class="muted tiny" x="505" y="258">S-0125; S-0126; S-0129</text>
  <rect class="model" x="785" y="320" width="270" height="110" rx="10"/><text class="ink label" x="820" y="358">OpenAI models</text><text class="ink small" x="820" y="386">GPT-3 license, ChatGPT,</text><text class="ink small" x="820" y="408">API/model primitives</text><text class="muted tiny" x="820" y="428">S-0127; S-0130; S-0133</text>
  <rect class="surface" x="470" y="505" width="285" height="112" rx="10"/><text class="ink label" x="505" y="543">Microsoft surfaces</text><text class="ink small" x="505" y="571">GitHub, Azure, Microsoft 365,</text><text class="ink small" x="505" y="593">work graph and customers</text><text class="muted tiny" x="505" y="613">S-0131; S-0132; S-0133</text>
  <rect class="risk" x="150" y="320" width="285" height="110" rx="10"/><text class="ink label" x="185" y="358">Demand pressure</text><text class="ink small" x="185" y="386">latency, reliability, governance,</text><text class="ink small" x="185" y="408">cost and trust requirements</text><text class="muted tiny" x="185" y="428">CH8MS-009/010/011 blocked</text>
  <path class="line" d="M725 205 C860 220 945 260 925 315"/>
  <path class="line" d="M910 432 C875 515 800 560 760 560"/>
  <path class="line" d="M468 562 C335 540 260 480 285 435"/>
  <path class="line" d="M295 318 C310 240 405 205 465 203"/>
  <rect class="card" x="105" y="655" width="990" height="54" rx="8"/>
  <text class="ink small" x="130" y="685">Use rule: flywheel shows strategic mechanism only. It does not prove Azure revenue, model margins, customer ROI, productivity gains, or adoption.</text>
  <text class="muted tiny" x="130" y="705">Figure A-0057. Source IDs and blockers in data/chapter8_microsoft_openai_visual_package_i0118.tsv.</text>
</svg>
