<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Chapter 9 Gemini long-context lane</title>
  <desc id="desc">A schematic lane diagram showing Gemini 1.5 long-context product and developer access paths with caution labels about what long context does not prove.</desc>
  <rect width="1200" height="760" fill="#fbfaf7"/>
  <text x="64" y="72" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#202124">Long Context Became A Product Grammar</text>
  <text x="64" y="110" font-family="Arial, sans-serif" font-size="17" fill="#4b5563">Gemini 1.5 made context length a Google theme, but more input is not the same as guaranteed understanding.</text>
  <g font-family="Arial, sans-serif">
    <rect x="88" y="178" width="1024" height="96" rx="12" fill="#e8f0fe" stroke="#4285f4" stroke-width="3"/>
    <text x="116" y="216" font-size="22" font-weight="700" fill="#174ea6">Technical report lane</text>
    <text x="116" y="248" font-size="16" fill="#374151">Gemini 1.5 frames multimodal understanding over very long contexts. Source: S-0117.</text>
    <rect x="88" y="324" width="1024" height="96" rx="12" fill="#e6f4ea" stroke="#34a853" stroke-width="3"/>
    <text x="116" y="362" font-size="22" font-weight="700" fill="#137333">Consumer assistant lane</text>
    <text x="116" y="394" font-size="16" fill="#374151">Gemini Advanced product framing includes a one-million-token context path. Source: S-0123.</text>
    <rect x="88" y="470" width="1024" height="96" rx="12" fill="#ccfbf1" stroke="#0f766e" stroke-width="3"/>
    <text x="116" y="508" font-size="22" font-weight="700" fill="#115e59">Developer and cloud lane</text>
    <text x="116" y="540" font-size="16" fill="#374151">AI Studio and Vertex AI updates discuss Gemini 1.5 Pro/Flash and a two-million-token access path. Source: S-0124.</text>
    <line x1="160" y1="600" x2="1040" y2="600" stroke="#1f2937" stroke-width="5"/>
    <circle cx="248" cy="600" r="16" fill="#4285f4"/>
    <circle cx="514" cy="600" r="16" fill="#34a853"/>
    <circle cx="794" cy="600" r="16" fill="#0f766e"/>
    <text x="248" y="642" font-size="15" font-weight="700" fill="#202124" text-anchor="middle">Read more material</text>
    <text x="514" y="642" font-size="15" font-weight="700" fill="#202124" text-anchor="middle">Expose product context</text>
    <text x="794" y="642" font-size="15" font-weight="700" fill="#202124" text-anchor="middle">Shift serving economics</text>
  </g>
  <rect x="88" y="684" width="1024" height="44" rx="8" fill="#111827"/>
  <text x="108" y="712" font-family="Arial, sans-serif" font-size="15" fill="#ffffff">Blocked: solved retrieval, memory, legal review, codebase understanding, enterprise knowledge work, latency, and cost claims.</text>
</svg>
