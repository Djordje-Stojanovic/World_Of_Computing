<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc"><title id="title">Claude Code is a terminal contract</title><desc id="desc">Paraphrase-first source card for Chapter 20 showing Claude Code launch and docs as workflow-control evidence rather than autonomous-engineer proof.</desc><style>.bg{fill:#f8f6ee}.ink{fill:#20242a}.muted{fill:#5f6872}.band{fill:#40342a}.panel{fill:#fffdf7;stroke:#d8d2c5;stroke-width:2}.tab{fill:#fff4e1;stroke:#b66a18;stroke-width:2}.warn{fill:#fff0ec;stroke:#c2412d;stroke-width:2}.title{font-family:Arial,Helvetica,sans-serif;font-size:38px;font-weight:700}.label{font-family:Arial,Helvetica,sans-serif;font-size:23px;font-weight:700}.small{font-family:Arial,Helvetica,sans-serif;font-size:18px}.tiny{font-family:Arial,Helvetica,sans-serif;font-size:14px}</style><rect class="bg" width="1200" height="760"/><rect class="band" width="1200" height="46"/><text class="tiny" x="60" y="30" fill="#ffffff">SOURCE CARD / CHAPTER 20 / DIRECT QUOTE: NO</text><text class="title ink" x="60" y="95">Claude Code is a terminal contract</text><text class="small muted" x="60" y="132">The interesting source story is permissions, context, commands, review, and repository hygiene.</text><rect class="panel" x="70" y="185" width="1060" height="320" rx="8"/><rect class="tab" x="110" y="230" width="260" height="115" rx="8"/><text class="label ink" x="145" y="276">Context</text><text class="small muted" x="145" y="310">The agent works</text><text class="small muted" x="145" y="336">inside a repo.</text><rect class="tab" x="420" y="230" width="260" height="115" rx="8"/><text class="label ink" x="455" y="276">Permission</text><text class="small muted" x="455" y="310">Commands need</text><text class="small muted" x="455" y="336">control surfaces.</text><rect class="tab" x="730" y="230" width="260" height="115" rx="8"/><text class="label ink" x="765" y="276">Review</text><text class="small muted" x="765" y="310">Diffs still need</text><text class="small muted" x="765" y="336">judgment.</text><rect class="tab" x="110" y="388" width="880" height="78" rx="8"/><text class="small ink" x="145" y="434">A terminal agent is a social contract with files, tests, logs, and humans.</text><rect class="warn" x="70" y="555" width="1060" height="82" rx="8"/><text class="small ink" x="100" y="590">Blocker: developer replacement, secure code, productivity lift, and autonomous engineering.</text><text class="tiny muted" x="100" y="617">Sources: S-0048, S-0049, S-0050, S-0051. Paraphrase-only; no commands copied.</text></svg>
