<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc"><title id="title">GPT-2 made absence visible</title><desc id="desc">Paraphrase-first source card for Chapter 5 using GPT-2 release framing as evidence for staged release and misuse concern, not capability rank.</desc><style>.bg{fill:#f8f6ee}.ink{fill:#20242a}.muted{fill:#5f6872}.band{fill:#2d3445}.panel{fill:#fffdf7;stroke:#d8d2c5;stroke-width:2}.tab{fill:#eef0ff;stroke:#5b5ea6;stroke-width:2}.warn{fill:#fff0ec;stroke:#c2412d;stroke-width:2}.title{font-family:Arial,Helvetica,sans-serif;font-size:38px;font-weight:700}.label{font-family:Arial,Helvetica,sans-serif;font-size:23px;font-weight:700}.small{font-family:Arial,Helvetica,sans-serif;font-size:18px}.tiny{font-family:Arial,Helvetica,sans-serif;font-size:14px}</style><rect class="bg" width="1200" height="760"/><rect class="band" width="1200" height="46"/><text class="tiny" x="60" y="30" fill="#ffffff">SOURCE CARD / CHAPTER 5 / DIRECT QUOTE: NO</text><text class="title ink" x="60" y="95">GPT-2 made absence visible</text><text class="small muted" x="60" y="132">The missing full release became part of the historical artifact.</text><rect class="panel" x="70" y="185" width="1060" height="320" rx="8"/><rect class="tab" x="110" y="230" width="260" height="115" rx="8"/><text class="label ink" x="145" y="276">Post</text><text class="small muted" x="145" y="310">Research framing</text><text class="small muted" x="145" y="336">with restraint.</text><rect class="tab" x="420" y="230" width="260" height="115" rx="8"/><text class="label ink" x="455" y="276">Signal</text><text class="small muted" x="455" y="310">Not all progress</text><text class="small muted" x="455" y="336">was shipped whole.</text><rect class="tab" x="730" y="230" width="260" height="115" rx="8"/><text class="label ink" x="765" y="276">Story use</text><text class="small muted" x="765" y="310">Safety enters</text><text class="small muted" x="765" y="336">the plot.</text><rect class="tab" x="110" y="388" width="880" height="78" rx="8"/><text class="small ink" x="145" y="434">Withholding is evidence of institutional caution, not evidence of actual harm.</text><rect class="warn" x="70" y="555" width="1060" height="82" rx="8"/><text class="small ink" x="100" y="590">Blocker: misuse prevalence, hidden architecture, and model-rank claims remain unsupported here.</text><text class="tiny muted" x="100" y="617">Source: S-0012. Paraphrase-only card; no source text or page image copied.</text></svg>
