<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Power is a process lane</title>
  <desc id="desc">Paraphrase-first source card for power and data-center infrastructure reports, separating planning constraints from delivered electricity claims.</desc>
  <style>.bg{fill:#f7f5ef}.ink{fill:#20242a}.muted{fill:#5f6872}.band{fill:#4a2d24}.panel{fill:#fffdf7;stroke:#d8d2c5;stroke-width:2}.box{fill:#f7e5dc;stroke:#c2412d;stroke-width:2}.warn{fill:#fff0ec;stroke:#c2412d;stroke-width:2}.title{font-family:Arial,Helvetica,sans-serif;font-size:38px;font-weight:700}.label{font-family:Arial,Helvetica,sans-serif;font-size:23px;font-weight:700}.small{font-family:Arial,Helvetica,sans-serif;font-size:18px}.tiny{font-family:Arial,Helvetica,sans-serif;font-size:14px}</style>
  <rect class="bg" width="1200" height="760"/><rect class="band" width="1200" height="46"/><text class="tiny" x="60" y="30" fill="#ffffff">SOURCE CARD / CHAPTER 16 / DIRECT QUOTE: NO</text>
  <text class="title ink" x="60" y="95">Power is a process lane</text>
  <text class="small muted" x="60" y="132">Infrastructure reports turn electricity into queues, coordination, backup, flexibility, and siting constraints.</text>
  <rect class="panel" x="70" y="190" width="1060" height="318" rx="8"/>
  <rect class="box" x="120" y="240" width="220" height="115" rx="8"/><text class="label ink" x="155" y="286">Interconnect</text><text class="small muted" x="155" y="318">queue and grid</text>
  <rect class="box" x="380" y="240" width="220" height="115" rx="8"/><text class="label ink" x="415" y="286">Backup</text><text class="small muted" x="415" y="318">resilience choices</text>
  <rect class="box" x="640" y="240" width="220" height="115" rx="8"/><text class="label ink" x="675" y="286">Flexibility</text><text class="small muted" x="675" y="318">load response</text>
  <rect class="box" x="120" y="385" width="740" height="70" rx="8"/><text class="small ink" x="155" y="428">A power exhibit should teach process friction, not promise solved scale.</text>
  <rect class="warn" x="70" y="555" width="1060" height="82" rx="8"/><text class="small ink" x="100" y="590">Blocker: no delivered electrons, fuel mix, emissions, named-campus delay, or LLM-only workload claim.</text><text class="tiny muted" x="100" y="617">Sources: S-0086, S-0087. Paraphrase-only card; exact report pages still required before quotations.</text>
</svg>
