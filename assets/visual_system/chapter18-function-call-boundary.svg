<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Function-Call Boundary</title>
  <desc id="desc">A Chapter 18 diagram separating model-proposed structured tool calls from application validation, permission checks, execution, and logging.</desc>
  <style>
    .bg{fill:#f7f4ee}.ink{fill:#1f2933;font-family:Arial,Helvetica,sans-serif}.muted{fill:#5d6470;font-family:Arial,Helvetica,sans-serif}.title{font-size:38px;font-weight:800}.sub{font-size:19px}.label{font-size:20px;font-weight:800}.small{font-size:15px}.tiny{font-size:12px}.model{fill:#e7efff;stroke:#2563eb;stroke-width:3}.app{fill:#fff3d8;stroke:#b7791f;stroke-width:3}.safe{fill:#e8f5ef;stroke:#0f8b6f;stroke-width:3}.risk{fill:#fff0ec;stroke:#c2412d;stroke-width:3}.box{fill:#fffdf7;stroke:#c8c1b5;stroke-width:2}.line{fill:none;stroke:#1f2933;stroke-width:4;marker-end:url(#arrow)}.dash{fill:none;stroke:#c2412d;stroke-width:3;stroke-dasharray:8 8}
  </style>
  <defs><marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 Z" fill="#1f2933"/></marker></defs>
  <rect class="bg" width="1200" height="760"/>
  <text class="ink title" x="60" y="72">Function-Call Boundary</text>
  <text class="muted sub" x="60" y="108">The model proposes typed arguments. The application decides what is valid, allowed, and executable.</text>
  <rect class="model" x="80" y="190" width="245" height="160" rx="10"/><text class="ink label" x="115" y="230">LLM router</text><text class="muted small" x="115" y="260">maps natural language</text><text class="muted small" x="115" y="282">to a structured call</text><text class="muted tiny" x="115" y="320">untrusted proposal</text>
  <rect class="risk" x="395" y="190" width="230" height="160" rx="10"/><text class="ink label" x="435" y="230">Boundary</text><text class="muted small" x="430" y="260">schema validation</text><text class="muted small" x="430" y="282">policy checks</text><text class="muted small" x="430" y="304">human confirmation</text>
  <rect class="app" x="695" y="190" width="200" height="160" rx="10"/><text class="ink label" x="738" y="230">Tool/API</text><text class="muted small" x="730" y="260">database, calendar,</text><text class="muted small" x="730" y="282">code, service</text>
  <rect class="safe" x="965" y="190" width="155" height="160" rx="10"/><text class="ink label" x="1005" y="230">Log</text><text class="muted small" x="998" y="260">result, error,</text><text class="muted small" x="998" y="282">audit trail</text>
  <path class="line" d="M325 270 H388"/><path class="line" d="M625 270 H688"/><path class="line" d="M895 270 H958"/>
  <line class="dash" x1="360" y1="145" x2="360" y2="408"/><text class="ink small" x="375" y="425">Do not cross as trust.</text>
  <rect class="box" x="170" y="485" width="860" height="72" rx="8"/><text class="ink small" x="205" y="515">Allowed claim: function calling made language a control surface for developer-defined tools.</text><text class="muted tiny" x="205" y="540">Blocked claim: model-generated arguments are safe commands or proof of reliable tool execution.</text>
  <rect class="box" x="170" y="610" width="860" height="54" rx="8"/><text class="muted tiny" x="205" y="642">Figure A-0061. Sources: S-0134; S-0044; CH18AGENT-002. Local exact-schema quotation remains blocked until source capture is normalized.</text>
</svg>
