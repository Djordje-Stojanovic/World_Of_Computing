<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Raw crawl becomes filtered corpus</title>
  <desc id="desc">Paraphrase-first source card for Common Crawl and FineWeb showing corpus transformation without asserting closed-model training composition or legality.</desc>
  <style>.bg{fill:#f7f5ef}.ink{fill:#20242a}.muted{fill:#5f6872}.band{fill:#14352f}.panel{fill:#fffdf7;stroke:#d8d2c5;stroke-width:2}.box{fill:#e7f3ed;stroke:#0f8b6f;stroke-width:2}.warn{fill:#fff0ec;stroke:#c2412d;stroke-width:2}.title{font-family:Arial,Helvetica,sans-serif;font-size:38px;font-weight:700}.label{font-family:Arial,Helvetica,sans-serif;font-size:23px;font-weight:700}.small{font-family:Arial,Helvetica,sans-serif;font-size:18px}.tiny{font-family:Arial,Helvetica,sans-serif;font-size:14px}</style>
  <rect class="bg" width="1200" height="760"/><rect class="band" width="1200" height="46"/><text class="tiny" x="60" y="30" fill="#ffffff">SOURCE CARD / CHAPTER 17 / DIRECT QUOTE: NO</text>
  <text class="title ink" x="60" y="95">Raw crawl becomes filtered corpus</text>
  <text class="small muted" x="60" y="132">A web crawl is only the beginning; filtering and dataset construction are separate evidence surfaces.</text>
  <rect class="panel" x="70" y="190" width="1060" height="318" rx="8"/>
  <rect class="box" x="130" y="245" width="300" height="125" rx="8"/><text class="label ink" x="165" y="292">Crawl surface</text><text class="small muted" x="165" y="325">broad web capture</text>
  <rect class="box" x="500" y="245" width="300" height="125" rx="8"/><text class="label ink" x="535" y="292">Filter recipe</text><text class="small muted" x="535" y="325">quality and dedup steps</text>
  <text class="small ink" x="130" y="435">The story is transformation: source material becomes a training candidate only through choices.</text>
  <rect class="warn" x="70" y="555" width="1060" height="82" rx="8"/><text class="small ink" x="100" y="590">Blocker: no closed-model composition, legality, consent, representativeness, or quality superiority claim.</text><text class="tiny muted" x="100" y="617">Sources: S-0261, S-0262. Paraphrase-only card; final source snapshots needed before public layout.</text>
</svg>
