<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Clean Procurement Is Not Physical Supply</title>
  <desc id="desc">A Chapter 16 diagram separating corporate clean-power procurement instruments from the physical hourly electricity supply serving a data-centre load.</desc>
  <style>
    .bg{fill:#f3f5ef}.ink{fill:#20242a}.muted{fill:#5f6872}.box{fill:#fff;stroke:#222831;stroke-width:2}.proc{fill:#e3f0de;stroke:#47733f;stroke-width:2}.phys{fill:#f1e1cb;stroke:#a45a28;stroke-width:2}.load{fill:#e4edf7;stroke:#3c6382;stroke-width:2}.line{stroke:#4b5560;stroke-width:3;fill:none;marker-end:url(#arrow)}.dash{stroke:#6f7780;stroke-width:3;stroke-dasharray:8 8;fill:none;marker-end:url(#arrow)}.title{font-family:Arial,Helvetica,sans-serif;font-size:38px;font-weight:700}.label{font-family:Arial,Helvetica,sans-serif;font-size:25px;font-weight:700}.small{font-family:Arial,Helvetica,sans-serif;font-size:20px}.note{font-family:Arial,Helvetica,sans-serif;font-size:17px;fill:#5f6872}
  </style>
  <defs><marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 Z" fill="#4b5560"/></marker></defs>
  <rect class="bg" width="1200" height="760"/>
  <text class="title ink" x="60" y="70">Clean Procurement Is Not Physical Supply</text>
  <text class="small muted" x="60" y="108">A contract can be real while the facility still runs on the grid available at its place and hour.</text>
  <rect class="proc" x="85" y="175" width="295" height="210" rx="8"/>
  <text class="label ink" x="120" y="225">Corporate procurement</text>
  <text class="small ink" x="120" y="270">PPAs</text>
  <text class="small ink" x="120" y="305">certificates</text>
  <text class="small ink" x="120" y="340">new clean generation claims</text>
  <path class="dash" d="M395 280 H520"/>
  <rect class="load" x="535" y="210" width="230" height="140" rx="8"/>
  <text class="label ink" x="570" y="260">Data-centre load</text>
  <text class="small ink" x="570" y="305">specific site</text>
  <text class="small ink" x="570" y="335">specific hour</text>
  <path class="line" d="M780 280 H900"/>
  <rect class="phys" x="915" y="175" width="240" height="210" rx="8"/>
  <text class="label ink" x="950" y="225">Physical supply</text>
  <text class="small ink" x="950" y="270">renewables</text>
  <text class="small ink" x="950" y="305">gas and coal near term</text>
  <text class="small ink" x="950" y="340">storage, grid, backup</text>
  <rect class="box" x="150" y="470" width="900" height="105" rx="8"/>
  <text class="label ink" x="185" y="515">Chapter rule</text>
  <text class="small ink" x="185" y="552">Keep procurement accounting, physical hourly supply, backup power, grid upgrades, and flexibility in separate lanes.</text>
  <rect class="phys" x="240" y="625" width="720" height="56" rx="8"/>
  <text class="small ink" x="270" y="660">IEA supply-mix projections are forecasts; DOE-SEAB flexibility options are responses, not routine practice.</text>
  <text class="note" x="60" y="725">Sources: S-0083, S-0087; rows CH16Q-011 and CH16Q-012. Do not equate clean contracts with delivered electrons.</text>
</svg>
