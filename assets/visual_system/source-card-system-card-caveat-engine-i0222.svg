<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc"><title id="title">System cards are caveat engines</title><desc id="desc">Paraphrase-first source card showing system and model cards as disclosure and warning surfaces rather than certificates of model safety.</desc><style>.bg{fill:#f8f6ee}.ink{fill:#20242a}.muted{fill:#5f6872}.band{fill:#20352f}.panel{fill:#fffdf7;stroke:#d8d2c5;stroke-width:2}.tab{fill:#e7f3ed;stroke:#0f8b6f;stroke-width:2}.warn{fill:#fff0ec;stroke:#c2412d;stroke-width:2}.title{font-family:Arial,Helvetica,sans-serif;font-size:38px;font-weight:700}.label{font-family:Arial,Helvetica,sans-serif;font-size:23px;font-weight:700}.small{font-family:Arial,Helvetica,sans-serif;font-size:18px}.tiny{font-family:Arial,Helvetica,sans-serif;font-size:14px}</style><rect class="bg" width="1200" height="760"/><rect class="band" width="1200" height="46"/><text class="tiny" x="60" y="30" fill="#ffffff">SOURCE CARD / CHAPTERS 6 AND 12 / DIRECT QUOTE: NO</text><text class="title ink" x="60" y="95">System cards are caveat engines</text><text class="small muted" x="60" y="132">A model card is most useful when it says what the source does not prove.</text><rect class="panel" x="70" y="185" width="1060" height="320" rx="8"/><rect class="tab" x="110" y="230" width="260" height="115" rx="8"/><text class="label ink" x="145" y="276">Risk lanes</text><text class="small muted" x="145" y="310">Policy, evals,</text><text class="small muted" x="145" y="336">and mitigations.</text><rect class="tab" x="420" y="230" width="260" height="115" rx="8"/><text class="label ink" x="455" y="276">Disclosure</text><text class="small muted" x="455" y="310">A map of tested</text><text class="small muted" x="455" y="336">boundaries.</text><rect class="tab" x="730" y="230" width="260" height="115" rx="8"/><text class="label ink" x="765" y="276">Not proof</text><text class="small muted" x="765" y="310">No certificate</text><text class="small muted" x="765" y="336">of safety.</text><rect class="tab" x="110" y="388" width="880" height="78" rx="8"/><text class="small ink" x="145" y="434">The card teaches caution better than any triumphant benchmark row.</text><rect class="warn" x="70" y="555" width="1060" height="82" rx="8"/><text class="small ink" x="100" y="590">Blocker: safety success, full disclosure, and comparable superiority require separate evidence.</text><text class="tiny muted" x="100" y="617">Sources: S-0076, S-0077, S-0245, S-0246. Paraphrase-only; PDF page refs pending.</text></svg>
