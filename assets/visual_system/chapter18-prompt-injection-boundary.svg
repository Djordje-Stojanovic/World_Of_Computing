<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Prompt Injection Boundary</title>
  <desc id="desc">A Chapter 18 threat model showing untrusted retrieved content trying to cross from data into instructions for a tool-using model.</desc>
  <style>
    .bg{fill:#f7f4ee}.ink{fill:#1f2933;font-family:Arial,Helvetica,sans-serif}.muted{fill:#5d6470;font-family:Arial,Helvetica,sans-serif}.title{font-size:38px;font-weight:800}.sub{font-size:19px}.label{font-size:20px;font-weight:800}.small{font-size:15px}.tiny{font-size:12px}.trusted{fill:#e7efff;stroke:#2563eb;stroke-width:3}.data{fill:#e8f5ef;stroke:#0f8b6f;stroke-width:3}.risk{fill:#fff0ec;stroke:#c2412d;stroke-width:3}.box{fill:#fffdf7;stroke:#c8c1b5;stroke-width:2}.line{fill:none;stroke:#1f2933;stroke-width:4;marker-end:url(#arrow)}.attack{fill:none;stroke:#c2412d;stroke-width:4;stroke-dasharray:9 7;marker-end:url(#hot)}
  </style>
  <defs><marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 Z" fill="#1f2933"/></marker><marker id="hot" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 Z" fill="#c2412d"/></marker></defs>
  <rect class="bg" width="1200" height="760"/>
  <text class="ink title" x="60" y="72">Prompt Injection Boundary</text>
  <text class="muted sub" x="60" y="108">The same context can carry instructions and data. Agent safety depends on keeping authority separate.</text>
  <rect class="trusted" x="95" y="185" width="250" height="105" rx="10"/><text class="ink label" x="135" y="225">Trusted instructions</text><text class="muted small" x="135" y="253">system, developer, user</text>
  <rect class="data" x="95" y="410" width="250" height="105" rx="10"/><text class="ink label" x="135" y="450">Untrusted content</text><text class="muted small" x="135" y="478">web page, email, doc</text>
  <rect class="box" x="455" y="275" width="270" height="150" rx="10"/><text class="ink label" x="528" y="318">LLM context</text><text class="muted small" x="500" y="348">tokens from both streams</text><text class="muted small" x="500" y="374">must not grant authority</text>
  <rect class="risk" x="835" y="275" width="250" height="150" rx="10"/><text class="ink label" x="898" y="318">Tool action</text><text class="muted small" x="885" y="348">send, edit, query,</text><text class="muted small" x="885" y="374">run, retrieve</text>
  <path class="line" d="M345 238 C395 250 420 285 450 325"/>
  <path class="attack" d="M345 462 C425 458 430 385 450 362"/>
  <path class="line" d="M725 350 H828"/>
  <rect class="box" x="188" y="600" width="824" height="70" rx="8"/><text class="ink small" x="220" y="630">Allowed claim: prompt injection is an instruction/data boundary risk for tool-using systems.</text><text class="muted tiny" x="220" y="653">Blocked: prevalence, universal unmitigability, or product-incident history without stronger security rows.</text>
  <text class="muted tiny" x="220" y="690">Figure A-0063. Sources: S-0137; CH18AGENT-006. Later trust/failure chapter should add OWASP/NCSC/vendor rows.</text>
</svg>
