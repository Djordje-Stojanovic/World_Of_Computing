  <text class="title ink" x="60" y="72">Word Vectors Made Scale Feel Trainable</text>
  <text class="small muted" x="60" y="112">The exhibit job is to connect embeddings to efficient training pressure, not to claim vectors understand.</text>
  <rect class="src" x="95" y="180" width="455" height="250" rx="8"/><text class="label ink" x="135" y="235">Source surface</text><text class="small ink" x="135" y="282">Mikolov et al., 2013</text><text class="small ink" x="135" y="322">efficient word representations</text><text class="small ink" x="135" y="362">large-corpus training frame</text>
  <rect class="mech" x="650" y="180" width="455" height="250" rx="8"/><text class="label ink" x="690" y="235">Mechanism card</text><text class="small ink" x="690" y="282">words become coordinates</text><text class="small ink" x="690" y="322">similar contexts pull nearby</text><text class="small ink" x="690" y="362">geometry is evidence-limited</text>
  <rect class="risk" x="160" y="545" width="880" height="70" rx="8"/><text class="small ink" x="195" y="588">Block: understanding, universal analogies, complete semantic geometry, modern chatbot reliability, or data legality claims.</text>
