<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Chapter 23 Trust Stack</title>
  <desc id="desc">Layered trust stack for LLM systems from source selection through audit and incident memory.</desc>
  <rect width="1200" height="760" fill="#f8fafc"/>
  <text x="80" y="72" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#0f172a">Trust is a stack, not a mood</text>
  <text x="80" y="108" font-family="Arial, sans-serif" font-size="17" fill="#475569">Chapter 23 turns reliability into visible controls: evidence, authority, evaluation, and audit.</text>
  <g font-family="Arial, sans-serif">
    <rect x="170" y="585" width="760" height="62" rx="6" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
    <text x="205" y="624" font-size="20" font-weight="700" fill="#0c4a6e">1. Evidence selection</text>
    <text x="540" y="624" font-size="15" fill="#0f172a">retrieval, source freshness, permissions</text>
    <rect x="170" y="512" width="760" height="62" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text x="205" y="551" font-size="20" font-weight="700" fill="#14532d">2. Evidence use</text>
    <text x="540" y="551" font-size="15" fill="#0f172a">grounding, citation discipline, contradiction handling</text>
    <rect x="170" y="439" width="760" height="62" rx="6" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
    <text x="205" y="478" font-size="20" font-weight="700" fill="#78350f">3. Authority boundary</text>
    <text x="540" y="478" font-size="15" fill="#0f172a">system, developer, user, tool, retrieved text</text>
    <rect x="170" y="366" width="760" height="62" rx="6" fill="#fce7f3" stroke="#db2777" stroke-width="2"/>
    <text x="205" y="405" font-size="20" font-weight="700" fill="#831843">4. Evaluation</text>
    <text x="540" y="405" font-size="15" fill="#0f172a">benchmarks, red teams, calibration, regression tests</text>
    <rect x="170" y="293" width="760" height="62" rx="6" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
    <text x="205" y="332" font-size="20" font-weight="700" fill="#4c1d95">5. Permission and action</text>
    <text x="540" y="332" font-size="15" fill="#0f172a">tool gates, confirmations, logs, rollback paths</text>
    <rect x="170" y="220" width="760" height="62" rx="6" fill="#e5e7eb" stroke="#475569" stroke-width="2"/>
    <text x="205" y="259" font-size="20" font-weight="700" fill="#1f2937">6. Audit memory</text>
    <text x="540" y="259" font-size="15" fill="#0f172a">snapshots, incidents, model versions, policy changes</text>
    <path d="M970 615 L1040 615 L1040 250 L970 250" fill="none" stroke="#334155" stroke-width="3"/>
    <text x="965" y="188" font-size="20" font-weight="700" fill="#0f172a">Trust cost</text>
    <text x="965" y="220" font-size="15" fill="#475569">Verification, logging, review,</text>
    <text x="965" y="244" font-size="15" fill="#475569">and incident response are</text>
    <text x="965" y="268" font-size="15" fill="#475569">part of the price of use.</text>
    <rect x="70" y="220" width="70" height="427" rx="8" fill="#0f172a"/>
    <text x="100" y="580" font-size="14" fill="#ffffff" transform="rotate(-90 100 580)">system controls</text>
  </g>
  <text x="80" y="700" font-family="Arial, sans-serif" font-size="14" fill="#64748b">Sources: S-0038; S-0076; S-0077; S-0110; S-0137; CH23TRUST-003/007/009. Schematic stack, not proof of complete safety.</text>
</svg>
