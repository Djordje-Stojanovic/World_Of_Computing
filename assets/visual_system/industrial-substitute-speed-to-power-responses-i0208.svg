<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Speed To Power Has Several Imperfect Routes</title>
  <desc id="desc">A rights-safe Chapter 16 matrix replacing unverified gas turbine and power photos with a neutral response taxonomy.</desc>
  <style>
    .bg{fill:#f3f5ef}.ink{fill:#20242a}.muted{fill:#5f6872}.fast{fill:#f1e1cb;stroke:#a45a28;stroke-width:2}.clean{fill:#e3f0de;stroke:#47733f;stroke-width:2}.grid{fill:#e4edf7;stroke:#3c6382;stroke-width:2}.risk{fill:#f7e1df;stroke:#9f4b45;stroke-width:2}.title{font-family:Arial,Helvetica,sans-serif;font-size:38px;font-weight:700}.label{font-family:Arial,Helvetica,sans-serif;font-size:24px;font-weight:700}.small{font-family:Arial,Helvetica,sans-serif;font-size:19px}.note{font-family:Arial,Helvetica,sans-serif;font-size:17px;fill:#5f6872}
  </style>
  <rect class="bg" width="1200" height="760"/>
  <text class="title ink" x="60" y="70">Speed To Power Has Several Imperfect Routes</text>
  <text class="small muted" x="60" y="108">The visual job is to show the menu of responses, not crown one as sufficient, clean, cheap, or proven.</text>
  <rect class="fast" x="70" y="165" width="320" height="150" rx="8"/>
  <text class="label ink" x="105" y="212">Gas / backup generation</text>
  <text class="small ink" x="105" y="252">speed and dispatchability</text>
  <text class="small ink" x="105" y="286">need permits, fuel, emissions proof</text>
  <rect class="grid" x="440" y="165" width="320" height="150" rx="8"/>
  <text class="label ink" x="475" y="212">Grid upgrades</text>
  <text class="small ink" x="475" y="252">substations, transmission, studies</text>
  <text class="small ink" x="475" y="286">lead times and local constraints</text>
  <rect class="clean" x="810" y="165" width="320" height="150" rx="8"/>
  <text class="label ink" x="845" y="212">Clean procurement</text>
  <text class="small ink" x="845" y="252">PPAs, certificates, new projects</text>
  <text class="small ink" x="845" y="286">not identical to hourly supply</text>
  <rect class="clean" x="70" y="375" width="320" height="150" rx="8"/>
  <text class="label ink" x="105" y="422">Storage</text>
  <text class="small ink" x="105" y="462">batteries and flexibility</text>
  <text class="small ink" x="105" y="496">duration and site use need proof</text>
  <rect class="grid" x="440" y="375" width="320" height="150" rx="8"/>
  <text class="label ink" x="475" y="422">Flexible load</text>
  <text class="small ink" x="475" y="462">scheduling, routing, curtailment</text>
  <text class="small ink" x="475" y="496">routine practice not assumed</text>
  <rect class="fast" x="810" y="375" width="320" height="150" rx="8"/>
  <text class="label ink" x="845" y="422">Nuclear / long contracts</text>
  <text class="small ink" x="845" y="462">durable supply narrative</text>
  <text class="small ink" x="845" y="496">delivered electrons need evidence</text>
  <rect class="risk" x="180" y="610" width="840" height="62" rx="8"/>
  <text class="small ink" x="215" y="648">Caption firewall: no turbine count, runtime, MW, emissions, PPA fulfillment, cost, or workload attribution.</text>
  <text class="note" x="60" y="725">Sources: S-0083, S-0086, S-0087 and data/power_source_image_package_i0176.tsv; substitute for A-0141.</text>
</svg>
