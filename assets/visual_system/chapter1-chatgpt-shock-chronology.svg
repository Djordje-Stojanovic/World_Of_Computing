<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">ChatGPT Shock Chronology</title>
  <desc id="desc">A Chapter 1 chronology showing the ChatGPT launch, early one-million-user post, Reuters UBS Similarweb estimate, and the blocked adoption claims that cannot be inferred.</desc>
  <style>
    .bg{fill:#f7f4ee}.ink{fill:#1f2933;font-family:Arial,Helvetica,sans-serif}.muted{fill:#5d6470;font-family:Arial,Helvetica,sans-serif}.title{font-size:38px;font-weight:800}.sub{font-size:18px}.label{font-size:20px;font-weight:800}.small{font-size:15px}.tiny{font-size:12px}.card{fill:#fffdf7;stroke:#c8c1b5;stroke-width:2}.launch{fill:#e7efff;stroke:#2563eb;stroke-width:3}.adopt{fill:#e8f5ef;stroke:#0f8b6f;stroke-width:3}.block{fill:#fff0ec;stroke:#c2412d;stroke-width:3}.line{stroke:#1f2933;stroke-width:5;stroke-linecap:round}.tick{stroke:#1f2933;stroke-width:4}.dot{fill:#1f2933}
  </style>
  <rect class="bg" width="1200" height="760"/>
  <text class="ink title" x="56" y="72">ChatGPT Shock Chronology</text>
  <text class="muted sub" x="56" y="108">The launch story is a sequence of distinct evidence types, not one clean adoption number.</text>

  <line class="line" x1="110" y1="290" x2="1085" y2="290"/>
  <line class="tick" x1="170" y1="266" x2="170" y2="314"/><circle class="dot" cx="170" cy="290" r="9"/>
  <line class="tick" x1="470" y1="266" x2="470" y2="314"/><circle class="dot" cx="470" cy="290" r="9"/>
  <line class="tick" x1="805" y1="266" x2="805" y2="314"/><circle class="dot" cx="805" cy="290" r="9"/>

  <rect class="launch" x="72" y="155" width="285" height="104" rx="8"/>
  <text class="ink label" x="100" y="192">Nov. 30, 2022</text>
  <text class="muted small" x="100" y="221">OpenAI introduces ChatGPT</text>
  <text class="muted tiny" x="100" y="243">Allowed: launch chronology. Source: S-0006.</text>

  <rect class="adopt" x="375" y="330" width="300" height="118" rx="8"/>
  <text class="ink label" x="405" y="368">Launch-week signal</text>
  <text class="muted small" x="405" y="397">Altman post: crossed one</text>
  <text class="muted small" x="405" y="417">million users; metric undefined</text>
  <text class="muted tiny" x="405" y="440">Allowed only with label. Source: S-0092.</text>

  <rect class="adopt" x="695" y="155" width="355" height="118" rx="8"/>
  <text class="ink label" x="725" y="193">Jan. 2023 estimate</text>
  <text class="muted small" x="725" y="222">Reuters citing UBS/Similarweb:</text>
  <text class="muted small" x="725" y="242">100M MAU estimate, 13M daily unique</text>
  <text class="muted tiny" x="725" y="265">Attributed secondary chain. Sources: S-0098; S-0102.</text>

  <rect class="block" x="112" y="530" width="925" height="100" rx="8"/>
  <text class="ink label" x="142" y="568">Blocked headline lane</text>
  <text class="muted small" x="142" y="596">Do not turn these rows into fastest-growing-app narration, OpenAI-confirmed 100M users, paid users,</text>
  <text class="muted small" x="142" y="618">retention, revenue, productivity, or one merged adoption metric.</text>

  <rect class="card" x="78" y="666" width="1040" height="48" rx="8"/>
  <text class="ink small" x="105" y="694">Use rule: show speed and source lineage; keep user, MAU, and daily-unique visitor labels separate.</text>
  <text class="muted tiny" x="105" y="712">Figure A-0068. Sources: S-0006; S-0092; S-0098; S-0102. Claim rows: CH1SHOCK-001; CH1SHOCK-004.</text>
</svg>
