<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="860" viewBox="0 0 1400 860" role="img" aria-labelledby="title desc">
  <title id="title">ReAct Reason Action Observation Loop</title>
  <desc id="desc">An original ReAct-style loop diagram separating reasoning traces, actions, observations, and trust boundaries without copying source prompt examples.</desc>
  <rect width="1400" height="860" fill="#fbfaf7"/>
  <text x="70" y="72" font-family="Arial, sans-serif" font-size="36" font-weight="700" fill="#111827">Agents are loops with observations, not magic autonomy</text>
  <text x="70" y="110" font-family="Arial, sans-serif" font-size="18" fill="#4b5563">Source lane: S-0135. Original schematic; prompt traces and source examples remain uncopied.</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#365e8c"/></marker>
    <style>.label{font-family:Arial,sans-serif;font-size:21px;font-weight:700;fill:#111827}.sub{font-family:Arial,sans-serif;font-size:15px;fill:#4b5563}</style>
  </defs>
  <g font-family="Arial, sans-serif">
    <circle cx="700" cy="420" r="245" fill="#ffffff" stroke="#c8c1b5" stroke-width="3"/>
    <rect x="585" y="185" width="230" height="84" rx="8" fill="#eef5ff" stroke="#365e8c" stroke-width="3"/>
    <text x="628" y="219" class="label">Reason</text><text x="628" y="246" class="sub">intermediate plan text</text>
    <rect x="930" y="376" width="230" height="84" rx="8" fill="#fff4d8" stroke="#c99a3a" stroke-width="3"/>
    <text x="973" y="410" class="label">Act</text><text x="973" y="437" class="sub">query, tool, or environment step</text>
    <rect x="585" y="574" width="230" height="84" rx="8" fill="#e8f1ec" stroke="#5f8c78" stroke-width="3"/>
    <text x="628" y="608" class="label">Observe</text><text x="628" y="635" class="sub">external result returns</text>
    <rect x="240" y="376" width="230" height="84" rx="8" fill="#ffffff" stroke="#6b7280" stroke-width="3"/>
    <text x="283" y="410" class="label">Update</text><text x="283" y="437" class="sub">next step is conditioned</text>
    <path d="M815 226 C940 252 1004 308 1035 372" fill="none" stroke="#365e8c" stroke-width="4" marker-end="url(#arrow)"/>
    <path d="M1045 460 C1008 548 920 606 819 616" fill="none" stroke="#365e8c" stroke-width="4" marker-end="url(#arrow)"/>
    <path d="M585 616 C482 604 402 548 365 464" fill="none" stroke="#365e8c" stroke-width="4" marker-end="url(#arrow)"/>
    <path d="M355 376 C404 282 472 232 581 226" fill="none" stroke="#365e8c" stroke-width="4" marker-end="url(#arrow)"/>
    <rect x="95" y="665" width="1210" height="78" rx="8" fill="#111827"/>
    <text x="130" y="697" font-size="20" font-weight="700" fill="#ffffff">Trust boundary</text>
    <text x="280" y="698" font-size="15" fill="#fde68a">Observation quality, tool permissions, environment state, hidden prompts, and evaluator scope decide what the loop can legitimately prove.</text>
  </g>
  <text x="70" y="812" font-family="Arial, sans-serif" font-size="14" fill="#6b7280">Caption contract: cite S-0135; block production autonomy, tool safety, planning reliability, and productivity unless same-scope deployment evidence exists.</text>
</svg>
