<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="920" viewBox="0 0 1400 920" role="img" aria-labelledby="title desc">
  <title id="title">Recurring motif atlas</title>
  <desc id="desc">A visual atlas for seven recurring motifs in Next Token: token, prompt, time, chip, power, context, and agency, with blocked-claim reminders.</desc>
  <style>.bg{fill:#f7f5ef}.ink{fill:#20242a}.muted{fill:#5f6872}.band{fill:#263238}.card{fill:#fffdf7;stroke:#d8d2c5;stroke-width:2}.token{fill:#e7f3ed;stroke:#0f8b6f;stroke-width:3}.prompt{fill:#eaf1ff;stroke:#2563eb;stroke-width:3}.time{fill:#fff4e1;stroke:#b7791f;stroke-width:3}.chip{fill:#eef0ff;stroke:#2563eb;stroke-width:3}.power{fill:#fff4e1;stroke:#c2412d;stroke-width:3}.context{fill:#f0edff;stroke:#6d5bd0;stroke-width:3}.agency{fill:#fff0ec;stroke:#c2412d;stroke-width:3}.title{font-family:Arial,Helvetica,sans-serif;font-size:42px;font-weight:700}.h{font-family:Arial,Helvetica,sans-serif;font-size:24px;font-weight:700}.body{font-family:Arial,Helvetica,sans-serif;font-size:17px}.tiny{font-family:Arial,Helvetica,sans-serif;font-size:14px}</style>
  <rect class="bg" width="1400" height="920"/>
  <rect class="band" width="1400" height="50"/>
  <text class="tiny" x="60" y="32" fill="#ffffff">VISUAL SYSTEM / I-0224 / MOTIFS ARE CLAIM-CONTROL DEVICES</text>
  <text class="title ink" x="60" y="108">Recurring Motif Atlas</text>
  <text class="body muted" x="60" y="142">Use these shapes only when they clarify mechanism, chronology, source boundary, or blocked inference.</text>
  <rect class="card" x="60" y="190" width="380" height="180" rx="8"/>
  <rect class="token" x="95" y="230" width="82" height="34" rx="17"/><rect class="token" x="130" y="278" width="82" height="34" rx="17"/>
  <text class="h ink" x="220" y="252">Token</text><text class="body muted" x="220" y="286">Nexts, context, pricing.</text><text class="tiny muted" x="220" y="320">Block: truth or exact tokenizer output.</text>
  <rect class="card" x="510" y="190" width="380" height="180" rx="8"/>
  <path class="prompt" d="M575 238 h90 M575 238 v92 M575 330 h90" fill="none"/><text class="h ink" x="690" y="252">Prompt</text><text class="body muted" x="690" y="286">Instruction boundary.</text><text class="tiny muted" x="690" y="320">Block: reliable control or safety.</text>
  <rect class="card" x="960" y="190" width="380" height="180" rx="8"/>
  <line class="time" x1="1010" y1="282" x2="1135" y2="282"/><line class="time" x1="1045" y1="250" x2="1045" y2="315"/><line class="time" x1="1100" y1="250" x2="1100" y2="315"/>
  <text class="h ink" x="1160" y="252">Time</text><text class="body muted" x="1160" y="286">Release order, cutoff.</text><text class="tiny muted" x="1160" y="320">Block: future as history.</text>
  <rect class="card" x="60" y="420" width="380" height="180" rx="8"/>
  <rect class="chip" x="95" y="460" width="78" height="78" rx="8"/><rect class="chip" x="115" y="480" width="78" height="78" rx="8"/><line class="chip" x1="107" y1="450" x2="107" y2="438"/><line class="chip" x1="137" y1="450" x2="137" y2="438"/><line class="chip" x1="167" y1="450" x2="167" y2="438"/>
  <text class="h ink" x="220" y="482">Chip</text><text class="body muted" x="220" y="516">Silicon to system.</text><text class="tiny muted" x="220" y="550">Block: performance crown or supply share.</text>
  <rect class="card" x="510" y="420" width="380" height="180" rx="8"/>
  <path class="power" d="M590 455 L545 525 H595 L560 575 L660 495 H608 Z"/><text class="h ink" x="690" y="482">Power</text><text class="body muted" x="690" y="516">Electricity, grid, cooling.</text><text class="tiny muted" x="690" y="550">Block: delivered electrons or emissions.</text>
  <rect class="card" x="960" y="420" width="380" height="180" rx="8"/>
  <rect class="context" x="1010" y="462" width="125" height="92" rx="8"/><line class="context" x1="1030" y1="490" x2="1115" y2="490"/><line class="context" x1="1030" y1="520" x2="1090" y2="520"/>
  <text class="h ink" x="1160" y="482">Context</text><text class="body muted" x="1160" y="516">Inside/outside view.</text><text class="tiny muted" x="1160" y="550">Block: complete memory or grounding.</text>
  <rect class="card" x="60" y="650" width="380" height="180" rx="8"/>
  <circle class="agency" cx="115" cy="720" r="28"/><circle class="agency" cx="195" cy="720" r="28"/><path class="agency" d="M143 720 H167 M167 720 l-10 -8 M167 720 l-10 8" fill="none"/><path class="agency" d="M195 748 C165 790 95 775 105 735" fill="none"/>
  <text class="h ink" x="240" y="705">Agency</text><text class="body muted" x="240" y="739">Tools, checks, handoff.</text><text class="tiny muted" x="240" y="773">Block: autonomous engineer.</text>
  <rect class="card" x="510" y="650" width="830" height="180" rx="8"/>
  <text class="h ink" x="550" y="704">Production Rule</text>
  <text class="body muted" x="550" y="742">A motif must carry a job: clarify a mechanism, date a claim, expose a boundary, or block an inference.</text>
  <text class="body muted" x="550" y="774">If it merely makes a page look designed, remove it.</text>
  <text class="tiny muted" x="550" y="812">Sources and blockers live in data/recurring_motif_system_i0224.tsv. This atlas is original SVG planning art, not page proof.</text>
</svg>
